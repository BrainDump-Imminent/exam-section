const EXAM_UNITS=[{id:"u0",label:"Unit 0 — Research Methods",color:"#9490a8",tag:"Unit 0"},{id:"u1",label:"Unit 1 — Biological Bases of Behavior",color:"#22D3EE",tag:"Unit 1"},{id:"u2",label:"Unit 2 — Cognition",color:"#00b3a4",tag:"Unit 2"},{id:"u3",label:"Unit 3 — Development & Learning",color:"#f0A500",tag:"Unit 3"},{id:"u4",label:"Unit 4 — Social Psychology & Personality",color:"#e0513a",tag:"Unit 4"},{id:"u5",label:"Unit 5 — Mental & Physical Health",color:"#3daa6e",tag:"Unit 5"}],EXAM_MCQS={u0:[{skill:"2.A",lo:"1.0.A: Determine the type of research design used.",topic:"Research Methods — Experimental Design",stem:"A school counselor wants to know whether mindfulness exercises reduce student anxiety. She randomly assigns 60 students to either a mindfulness group or a control group and measures anxiety scores before and after the six-week program. Which of the following best describes the research method used?",choices:["A correlational study, because the counselor is measuring the relationship between mindfulness and anxiety.","A quasi-experiment, because the participants were not randomly selected from the student population.","A true experiment, because the counselor manipulated the independent variable and used random assignment.","A naturalistic observation, because the counselor is observing student behavior in their natural school setting."],answer:"C",rationales:{A:"Incorrect. A correlation measures the relationship between two variables but does not involve manipulation of an IV or random assignment.",B:"Incorrect. A quasi-experiment lacks random assignment; this study used random assignment to groups.",C:"Correct. A true experiment requires manipulation of the IV (mindfulness exercises) and random assignment to conditions, both present here.",D:"Incorrect. Naturalistic observation involves watching behavior without any manipulation, which did not occur here."}},{skill:"2.B",lo:"1.0.B: Evaluate research design elements in experimental methodology.",topic:"Research Methods — Control",stem:"In a study examining whether background music improves math test scores, the researcher controls for noise level, lighting, and room temperature across both conditions. These controlled variables are best described as:",choices:["Independent variables, because the researcher is actively managing them.","Dependent variables, because they influence the outcome of the study.","Confounding variables that the researcher is attempting to eliminate.","Operational definitions of the dependent variable."],answer:"C",rationales:{A:"Incorrect. The IV is the presence/absence of music; these are not what the researcher is manipulating to test an effect.",B:"Incorrect. The DV is math test scores. Noise, lighting, and temperature are not being measured as outcomes.",C:"Correct. Potential confounds are variables other than the IV that could affect the DV. Controlling them helps ensure internal validity.",D:"Incorrect. Operational definitions specify how variables are measured, not what environmental factors are being held constant."}},{skill:"1.A",lo:"1.0.C: Apply psychological research concepts to a scenario.",topic:"Research Methods — Sampling",stem:"A researcher studying college student sleep habits surveys every third student on a dormitory mailing list. This method of selecting participants is best described as:",choices:["Convenience sampling, because the researcher is choosing participants based on ease of access.","Stratified sampling, because the population is divided before selection occurs.","Systematic sampling, because participants are chosen at regular intervals from a list.","Random sampling, because each participant has a chance of being selected."],answer:"C",rationales:{A:"Incorrect. Convenience sampling selects whoever is most accessible without a systematic interval process.",B:"Incorrect. Stratified sampling divides the population into subgroups and samples from each subgroup separately.",C:"Correct. Systematic sampling selects every nth individual from a list, which is exactly what this researcher is doing.",D:"Incorrect. While there is some randomness, this is technically systematic, not pure random sampling."}},{skill:"3.B",lo:"1.0.D: Calculate and interpret statistical measures.",topic:"Research Methods — Descriptive Statistics",stem:"A researcher reports that the mean test score for her sample is 78, and the standard deviation is 12. A student scored 90. Which of the following conclusions is most accurate?",choices:["The student scored below average because 90 is close to the mean.","The student scored one standard deviation above the mean.","The student scored two standard deviations above the mean.","The student's score is an outlier because it exceeds the mean."],answer:"B",rationales:{A:"Incorrect. 90 is above the mean of 78, not below it.",B:"Correct. One standard deviation above the mean = 78 + 12 = 90. The student's score places them exactly at +1 SD.",C:"Incorrect. Two standard deviations above would be 78 + 24 = 102.",D:"Incorrect. A score one SD above the mean is within the normal range; this is not an outlier by statistical convention."}},{skill:"2.C",lo:"1.0.E: Evaluate non-experimental research design elements.",topic:"Research Methods — Correlation",stem:"A researcher finds a strong positive correlation (r = +0.82) between hours of television watched per day and BMI in a sample of adults. Which of the following conclusions is best supported by this finding?",choices:["Watching television causes an increase in BMI due to physical inactivity.","There is a strong positive relationship between TV-watching hours and BMI in this sample.","Adults with higher BMI choose to watch more television to cope with health challenges.","Reducing television viewing is an effective intervention for reducing BMI."],answer:"B",rationales:{A:"Incorrect. Correlation does not allow causal conclusions; this is the third-variable or directionality problem.",B:"Correct. A correlational finding can only describe the direction and strength of the relationship, not establish causation.",C:"Incorrect. This proposes a specific causal direction — also not supported by correlational data alone.",D:"Incorrect. An intervention recommendation requires experimental evidence, not correlation."}},{skill:"2.D",lo:"1.0.F: Evaluate ethical procedures in research.",topic:"Research Methods — Ethics",stem:"Researchers at a university are studying stress responses by asking participants to complete a timed mathematics test in front of an audience. Participants are told beforehand that the study involves a problem-solving task but are not told an audience will be present. At the study's conclusion, researchers explain the true purpose. Which ethical procedure is illustrated by this conclusion step?",choices:["Informed consent, because researchers are giving participants information about the study.","Debriefing, because researchers are explaining the actual purpose and any deception after participation.","Confidentiality, because researchers are protecting participant information at study's end.","Institutional review, because an oversight board approved the study design."],answer:"B",rationales:{A:"Incorrect. Informed consent occurs before the study begins; this step occurs after the study ends.",B:"Correct. Debriefing involves explaining the true purpose of a study and clarifying any deceptions used, which happens after participation.",C:"Incorrect. Confidentiality refers to protecting participant data privacy, not explaining study purpose.",D:"Incorrect. Institutional review is conducted before the study, not after. It is not illustrated by the conclusion step."}},{skill:"3.C",lo:"1.0.G: Interpret data from graphs and figures.",topic:"Research Methods — Data Interpretation",stem:"A bar graph shows that students who slept 8 hours averaged a score of 85 on a memory test, while students who slept 4 hours averaged 68. The error bars for both groups overlap only slightly. Which conclusion is most appropriate?",choices:["Sleeping more hours causes better memory performance because the scores differ.","The difference in scores between the two sleep groups appears to be statistically meaningful.","Both groups performed essentially the same because the error bars overlap.","The results cannot be interpreted without knowing the correlation coefficient."],answer:"B",rationales:{A:"Incorrect. Bar graph data from a correlational study cannot support a causal claim; we do not know the research design here.",B:"Correct. Minimal overlap in error bars suggests the difference between means is likely statistically significant.",C:"Incorrect. Slight overlap does not mean the groups performed the same — it suggests the difference may be meaningful.",D:"Incorrect. Correlation coefficients apply to scatter plots, not bar graphs comparing group means."}},{skill:"1.B",lo:"1.0.H: Identify cognitive biases in research contexts.",topic:"Research Methods — Bias",stem:"After hearing that her college friends who exercised all got good grades, Tamara concludes that exercise must improve academic performance. Which cognitive bias best explains Tamara's reasoning?",choices:["Hindsight bias, because she is judging outcomes after they have already occurred.","Confirmation bias, because she is selectively noticing examples that match her pre-existing belief.","Availability heuristic, because memorable examples of exercising friends are easily retrieved.","Overconfidence, because she is overstating the reliability of her personal observation."],answer:"C",rationales:{A:'Incorrect. Hindsight bias involves claiming you "knew it all along" after learning an outcome, not selectively using anecdotes.',B:"Incorrect. Confirmation bias involves seeking out information that confirms beliefs — here she is not ignoring disconfirming evidence, she is using vivid examples as evidence.",C:"Correct. The availability heuristic leads people to judge likelihood based on how easily examples come to mind. Tamara's exercising friends are a vivid, memorable sample.",D:"Incorrect. Overconfidence involves overestimating knowledge or ability — she is making an inference from examples, not overestimating her knowledge."}},{skill:"2.A",lo:"1.0.I: Determine appropriate research design.",topic:"Research Methods — Design Selection",stem:"A developmental psychologist wants to study whether personality traits remain stable from age 20 to age 60 in the same individuals. Which research design is most appropriate?",choices:["Cross-sectional, because it allows comparison of different age groups efficiently.","Longitudinal, because the same participants need to be studied over a long period of time.","Quasi-experimental, because random assignment is not possible with age groups.","Naturalistic observation, because personality is best measured in natural environments."],answer:"B",rationales:{A:"Incorrect. Cross-sectional compares different people at one point in time, so it cannot track the same individuals over 40 years.",B:"Correct. Longitudinal design studies the same participants repeatedly over time, making it ideal for tracking changes within individuals.",C:"Incorrect. Quasi-experiments involve manipulating an IV without random assignment; this study is observational, not experimental.",D:"Incorrect. Naturalistic observation records behavior in natural settings but is not designed to track the same individuals across decades."}},{skill:"1.A",lo:"1.0.J: Apply statistical significance to findings.",topic:"Research Methods — Statistical Significance",stem:"A researcher reports that the difference in anxiety scores between her treatment and control groups is statistically significant (p = 0.03). Which interpretation is most accurate?",choices:["The treatment had a very large practical effect on anxiety scores.","There is only a 3% chance the observed difference is due to random chance if there is truly no effect.","The treatment is guaranteed to reduce anxiety in all future patients.","The effect is trivially small because the p-value is less than 0.05."],answer:"B",rationales:{A:"Incorrect. Statistical significance does not indicate the size of the effect; effect size is a separate calculation.",B:"Correct. A p-value of 0.03 means that if the null hypothesis were true, the probability of getting this result by chance is 3%, suggesting the difference is statistically meaningful.",C:"Incorrect. Statistical significance does not guarantee future results or allow generalizations beyond the study's sample.",D:"Incorrect. A p-value below 0.05 indicates significance, not trivialness; effect size (not p-value) indicates practical importance."}},{skill:"2.B",lo:"1.0.K: Evaluate experimental design elements.",topic:"Research Methods — Double-Blind Procedure",stem:"In a clinical trial for a new antidepressant, neither the patients nor the clinicians who assess their progress know which participants received the drug versus the placebo. This procedure is used to control for which of the following?",choices:["Sampling bias and lack of random selection.","The placebo effect and experimenter bias simultaneously.","Institutional review board requirements for ethical research.","Social desirability bias from participant self-reporting."],answer:"B",rationales:{A:"Incorrect. Double-blind procedure addresses knowledge of condition assignment, not sampling procedures.",B:"Correct. By keeping both patients and evaluators unaware of group assignment, double-blind controls for both the placebo effect (patients) and experimenter bias (evaluators).",C:"Incorrect. IRB requirements are about ethical oversight, not about awareness of group assignments.",D:"Incorrect. Social desirability bias (participants reporting what they think is expected) is different from placebo effects; double-blind does not directly address it."}},{skill:"3.A",lo:"1.0.L: Identify research concepts in scenarios.",topic:"Research Methods — Operational Definitions",stem:'A researcher studying academic performance defines "success" as scoring 80% or above on the final course examination. This is an example of:',choices:["A hypothesis, because it predicts the expected outcome of the study.","An independent variable, because it is what the researcher is testing.","An operational definition, because it provides a precise measurable definition of the variable.","A confounding variable, because it could influence the dependent variable."],answer:"C",rationales:{A:"Incorrect. A hypothesis is a testable prediction about the relationship between variables, not a definition of a variable.",B:'Incorrect. An IV is what the researcher manipulates; "success" here is the outcome being measured, not what is being manipulated.',C:'Correct. An operational definition states exactly how a concept will be measured in this specific study, allowing replication. Defining "success" as 80%+ is precisely that.',D:"Incorrect. A confound is an extraneous variable that may affect results; this is a definitional decision, not an uncontrolled external factor."}},{skill:"2.C",lo:"1.0.M: Evaluate non-experimental methodology limitations.",topic:"Research Methods — Case Study Limitations",stem:"A psychologist publishes an in-depth case study of a single patient who recovered from severe amnesia after a novel therapeutic approach. A critic argues the results cannot be applied to other patients. The critic is concerned about:",choices:["Internal validity, because the study lacks a control group.","Generalizability, because findings from one atypical case may not represent the broader population.","Reliability, because the study would produce different results if repeated.","Experimenter bias, because the psychologist is reporting on their own patient."],answer:"B",rationales:{A:"Incorrect. Internal validity concerns causal claims within the study, not whether results apply to other people.",B:"Correct. Case studies provide rich detail about one individual but cannot be reliably generalized to others, especially from an unusual case.",C:"Incorrect. Reliability concerns consistency of results across replications, not applicability to different populations.",D:"Incorrect. Experimenter bias is a concern, but the critic's stated concern is specifically about applying the findings to other patients."}},{skill:"1.A",lo:"1.0.N: Apply ethics to research scenarios.",topic:"Research Methods — Informed Consent & Assent",stem:"A researcher wants to study reading comprehension in 10-year-old children. She obtains written agreement from the children themselves that they are willing to participate. This ethical procedure is called:",choices:["Debriefing, because the researcher is explaining the procedure to participants.","Informed consent, because the participants are agreeing to take part in the research.","Informed assent, because the participants are minors who are legally unable to provide full consent.","Institutional review, because an oversight board must approve research with children."],answer:"C",rationales:{A:"Incorrect. Debriefing occurs after the study and involves explaining the purpose, not obtaining agreement to participate.",B:"Incorrect. Informed consent refers to legally binding agreement from adults who can consent; 10-year-olds cannot legally consent.",C:"Correct. Informed assent is the agreement from minors (who cannot legally consent) to participate, in addition to parental consent.",D:"Incorrect. IRB review is required, but what is described here is the participant agreement process, not oversight board approval."}},{skill:"3.B",lo:"1.0.O: Interpret measures of central tendency.",topic:"Research Methods — Mean, Median, Mode",stem:'A set of exam scores reads: 55, 60, 72, 72, 80, 92, 98. Which measure of central tendency best represents the "typical" student score, and why?',choices:["The mean, because it accounts for every score in the distribution.","The median, because it is not distorted by the extreme scores at either end.","The mode, because 72 appears most frequently and is the most common score.","The range, because it captures the full spread of scores in the distribution."],answer:"B",rationales:{A:"Incorrect. While the mean uses all scores, in a skewed distribution with extreme scores (55, 98) the mean can misrepresent the typical value.",B:'Correct. The median (72) is the midpoint of the distribution and is resistant to extreme values, making it the best measure of "typical" when outliers are present.',C:"Incorrect. The mode (72) only reflects the most frequent score, not necessarily the best single representation of all scores.",D:'Incorrect. The range is a measure of variability, not central tendency — it does not represent the "typical" score.'}}],u1:[{skill:"1.A",lo:"1.1.A: Explain the relationship between heredity and environment.",topic:"1.1: Interaction of Heredity and Environment",stem:"Research on identical twins raised in different households shows that they share similar levels of extraversion despite very different upbringings. However, environmental factors such as socioeconomic status are also found to influence their social behavior. This finding is most consistent with which perspective?",choices:["The strict nature view, because genetic factors are entirely responsible for personality traits.","The strict nurture view, because different environments should produce completely different outcomes.","An interactionist perspective, in which genes establish tendencies and environment shapes their expression.","The evolutionary perspective, because extraversion increases survival and reproductive success."],answer:"C",rationales:{A:"Incorrect. If genes alone determined personality, twins would be identical regardless of environment — but environmental differences do still matter.",B:"Incorrect. A pure nurture view would predict very different outcomes from different environments, which is not what twin research typically shows.",C:"Correct. The interactionist view holds that genes create predispositions that environments then influence — precisely what this finding demonstrates.",D:"Incorrect. The evolutionary perspective focuses on natural selection, not on untangling gene-environment interactions within twins."}},{skill:"1.A",lo:"1.2.A: Differentiate subsystems of the human nervous system.",topic:"1.2: Overview of the Nervous System",stem:"Mia is studying for a difficult exam when she suddenly hears a car crash outside. Her heart races, her palms sweat, and she feels unable to focus on her textbook. Which division of the nervous system is primarily responsible for these immediate physical changes?",choices:["The somatic nervous system, because Mia is voluntarily responding to an environmental event.","The parasympathetic nervous system, because her body is attempting to restore normal functioning.","The sympathetic nervous system, because it activates the body's arousal response to a perceived threat.","The central nervous system, because the brain is directing all of the physical responses described."],answer:"C",rationales:{A:"Incorrect. The somatic NS controls voluntary skeletal movement, not the automatic arousal responses described.",B:"Incorrect. The parasympathetic NS calms the body after stress; it does not initiate the fight-or-flight response.",C:"Correct. The sympathetic NS activates the fight-or-flight response — increased heart rate, sweating, and heightened arousal are classic sympathetic responses.",D:"Incorrect. While the CNS is involved in processing, the described physiological responses are specifically products of sympathetic ANS activation."}},{skill:"1.A",lo:"1.3.A: Explain neuron structure and the basic process of neural firing.",topic:"1.3: The Neuron and Neural Firing",stem:"A neuron at resting potential receives repeated stimulation from neighboring neurons. Once the cumulative stimulation reaches a critical level, the neuron fires a full action potential. This illustrates which principle of neural firing?",choices:["Reuptake, because the neurotransmitters are being absorbed after stimulation.","The all-or-nothing principle, because the neuron either fires completely or not at all once threshold is exceeded.","Long-term potentiation, because the repeated stimulation strengthens the synaptic connection.","The refractory period, because the neuron cannot fire immediately after receiving stimulation."],answer:"B",rationales:{A:"Incorrect. Reuptake is the process by which neurotransmitters are reabsorbed after crossing the synapse — it is not the principle being illustrated.",B:"Correct. The all-or-nothing principle states that once a neuron's threshold is reached, it fires a full action potential regardless of how much extra stimulation it received.",C:"Incorrect. Long-term potentiation is a lasting strengthening of synaptic connections through repeated activation — not the same as a single firing event.",D:"Incorrect. The refractory period is the recovery phase after firing — here we are describing what happens when threshold is first exceeded."}},{skill:"1.A",lo:"1.3.B: Explain how neurotransmitters affect behavior.",topic:"1.3: The Neuron and Neural Firing",stem:"After a long run, Priya notices she feels a sense of euphoria and reduced sensitivity to pain. Which neurotransmitter is most likely responsible for these effects?",choices:["Dopamine, because it is primarily involved in reward and pleasure.","Serotonin, because it regulates mood and emotional well-being.","GABA, because it inhibits neural activity and produces calming effects.","Endorphins, because they are natural opioid-like chemicals that reduce pain and produce positive feelings."],answer:"D",rationales:{A:'Incorrect. Dopamine is associated with reward, motivation, and movement — not specifically with the pain relief and "runner\'s high" experienced after exercise.',B:"Incorrect. Serotonin regulates mood, sleep, and appetite — not the acute euphoria and analgesia produced by strenuous exercise.",C:"Incorrect. GABA is the main inhibitory neurotransmitter and is associated with calming and anti-anxiety effects, not exercise-induced euphoria.",D:"Correct. Endorphins are the brain's natural opioid-like neurotransmitters released during sustained exercise, producing analgesia (pain reduction) and a sense of euphoria."}},{skill:"1.A",lo:"1.3.B: Explain how neurotransmitters and drugs affect behavior.",topic:"1.3: The Neuron and Neural Firing",stem:"A drug that blocks the reuptake of dopamine at the synapse would most likely result in which of the following?",choices:["Decreased dopamine activity, because less dopamine would remain in the synapse.","Increased dopamine activity, because more dopamine would accumulate in the synaptic gap.","No change in dopamine activity, because the postsynaptic receptors are unaffected.","Decreased postsynaptic receptor sensitivity, because excess dopamine causes receptor downregulation."],answer:"B",rationales:{A:"Incorrect. Blocking reuptake prevents dopamine from being removed from the synapse, meaning MORE dopamine stays active.",B:"Correct. Reuptake inhibitors prevent the sending neuron from reabsorbing neurotransmitters, causing them to accumulate in the synapse and increase activity. Cocaine works this way.",C:"Incorrect. Dopamine that remains in the synapse continues to bind to receptors, so activity does increase.",D:"Incorrect. While chronic overstimulation can lead to receptor downregulation over time, this is a secondary effect and not the immediate direct result."}},{skill:"1.A",lo:"1.4.A: Explain how brain structures and functions apply to behavior.",topic:"1.4: The Brain",stem:"A patient with damage to the hippocampus can carry on a normal conversation, recall events from years before their injury, and perform well-learned skills. However, they cannot form memories of anything that happened after the brain injury. This pattern of symptoms is most consistent with:",choices:["Retrograde amnesia, because the patient cannot remember events from before the injury.","Anterograde amnesia, because the patient cannot form new memories after the injury.","Broca's aphasia, because the patient shows deficits in language production.","Loss of procedural memory, because the patient's working memory is impaired."],answer:"B",rationales:{A:"Incorrect. Retrograde amnesia is the loss of memories formed before the injury; this patient retains pre-injury memories.",B:"Correct. Anterograde amnesia is the inability to form new long-term memories after brain damage — exactly what this patient demonstrates. Patient H.M. is the classic example.",C:"Incorrect. Broca's aphasia involves impaired speech production; this patient has no described language difficulties.",D:"Incorrect. The patient's procedural memory (well-learned skills) is intact; working memory appears functional since they can converse."}},{skill:"1.A",lo:"1.4.A: Explain how brain structures apply to behavior.",topic:"1.4: The Brain",stem:"Following a stroke, Mr. Park can understand spoken language perfectly and can hear fine, but he produces speech that is fluent yet incoherent — filled with made-up words and confused sentences. Damage to which brain area most likely explains his condition?",choices:["Broca's area, because it controls the production of fluent, meaningful speech.","Wernicke's area, because damage impairs the ability to produce comprehensible language.","The motor cortex, because speech requires voluntary muscle movements.","The occipital lobe, because visual processing is needed for reading and communication."],answer:"B",rationales:{A:"Incorrect. Damage to Broca's area produces halting, effortful speech — not fluent but incoherent speech.",B:"Correct. Wernicke's aphasia results from damage to Wernicke's area (left temporal lobe) and produces fluent but meaningless speech — exactly as described.",C:"Incorrect. Motor cortex damage affects movement; his speech is fluent (not impaired in production) but meaningless.",D:"Incorrect. The occipital lobe processes visual information; his deficit is in language comprehension and production, not vision."}},{skill:"1.A",lo:"1.4.A: Explain how brain structure applies to behavior.",topic:"1.4: The Brain",stem:"After surviving a serious car accident, Sophie shows dramatically changed behavior — she is impulsive, makes poor decisions, and struggles to plan for the future, though her memories, language, and sensory perception are all intact. Which brain region most likely sustained damage?",choices:["The cerebellum, because it is responsible for coordination and motor control.","The amygdala, because it regulates emotional memories and fear responses.","The prefrontal cortex, because it is involved in planning, impulse control, and decision-making.","The thalamus, because it routes sensory information to the appropriate cortical areas."],answer:"C",rationales:{A:"Incorrect. Cerebellar damage produces motor coordination deficits, not changes in personality, planning, or impulse control.",B:"Incorrect. Amygdala damage affects emotional processing (especially fear) but would not typically cause the full profile of executive dysfunction described.",C:"Correct. The prefrontal cortex (front of frontal lobe) is essential for executive functions: planning, impulse control, and decision-making. This pattern is consistent with the famous Phineas Gage case.",D:"Incorrect. The thalamus is the brain's sensory relay station; damage would impair sensory routing, not executive functions."}},{skill:"1.A",lo:"1.5.A: Explain how the sleep/wake cycle affects behavior.",topic:"1.5: Sleep",stem:"A researcher studying sleep deprivation finds that after 48 hours without sleep, participants spend significantly more time in REM sleep during their recovery night than they normally would. This phenomenon is called:",choices:["Sleep apnea, because the participants' breathing was interrupted during sleep.","Sleep consolidation, because the hippocampus is transferring memories during REM.","REM rebound, because the brain compensates for lost REM sleep by increasing it during recovery.","Narcolepsy, because the participants are experiencing sudden intrusions of REM sleep into waking life."],answer:"C",rationales:{A:"Incorrect. Sleep apnea is a breathing disorder during sleep, not a compensatory increase in a specific sleep stage.",B:"Incorrect. Sleep consolidation refers to the role of sleep in strengthening memory — not the specific compensatory pattern after REM deprivation.",C:"Correct. REM rebound occurs when the brain compensates for missed REM sleep by dramatically increasing time in REM during the next sleep period.",D:"Incorrect. Narcolepsy involves sudden, involuntary REM sleep attacks during waking hours, not a compensatory increase during a recovery night."}},{skill:"1.A",lo:"1.5.A: Explain theories of dreaming.",topic:"1.5: Sleep",stem:"According to the activation-synthesis theory of dreaming, dreams occur because:",choices:["Dreams symbolically represent unconscious wishes and unresolved conflicts from waking life.","The sleeping brain attempts to make sense of random neural signals activated during REM sleep.","Dreams rehearse evolutionarily relevant survival scenarios that increase fitness.","The hippocampus replays the day's experiences to consolidate them into long-term memory."],answer:"B",rationales:{A:"Incorrect. This describes Freud's psychoanalytic theory of dreams — not the activation-synthesis hypothesis.",B:"Correct. Activation-synthesis (Hobson & McCarley) proposes that the brain stem randomly activates during REM, and the cortex synthesizes these signals into a narrative — producing dreams.",C:"Incorrect. This describes threat simulation theory or evolutionary theories of dreaming, not activation-synthesis.",D:"Incorrect. This describes the memory consolidation theory of sleep — focused on the hippocampus and learning, not the production of dream content."}},{skill:"1.A",lo:"1.6.A: Explain how sensory systems detect stimuli.",topic:"1.6: Sensation",stem:"While studying in a familiar room, Kenji stops noticing the hum of the air conditioning after a few minutes. This illustrates:",choices:["Signal detection, because Kenji is evaluating whether a stimulus is present in a noisy environment.","Sensory adaptation, because his sensitivity to the constant stimulus decreases over time.","The absolute threshold, because the sound has fallen below the minimum detectable level.","Weber's Law, because a constant stimulus requires a proportionally larger change to be noticed."],answer:"B",rationales:{A:"Incorrect. Signal detection theory concerns how people decide whether a stimulus is present given internal noise — not the gradual reduction in response to a constant stimulus.",B:"Correct. Sensory adaptation is the diminishing sensitivity to a constant, unchanging stimulus — exactly what Kenji is experiencing with the hum.",C:"Incorrect. The air conditioning is still producing sound above absolute threshold; Kenji's brain has simply stopped registering it.",D:"Incorrect. Weber's Law explains just noticeable differences — it is not what causes Kenji to stop noticing the sound."}},{skill:"1.A",lo:"1.6.B: Explain how the visual sensory system functions.",topic:"1.6: Sensation",stem:"A person with damage to only the cone cells in the retina would most likely experience which of the following?",choices:["Total blindness, because cones are the only cells that detect light.","Difficulty seeing in dim light, because cones are responsible for night vision.","Loss of color vision and fine detail, because cones process color and high-acuity visual information.","Impaired depth perception, because cones are responsible for integrating binocular cues."],answer:"C",rationales:{A:"Incorrect. Rods remain intact and allow the person to detect light and movement — total blindness would not result from cone damage alone.",B:"Incorrect. Rods (not cones) are responsible for dim-light and peripheral vision; cone damage would not impair night vision.",C:"Correct. Cones are concentrated in the fovea and are responsible for color detection and fine detail (high visual acuity). Their absence would impair both.",D:"Incorrect. Depth perception using binocular cues is processed at higher visual areas, not by cones vs. rods distinction at the retinal level."}},{skill:"2.A",lo:"1.1.A: Determine research type related to biological bases.",topic:"1.1: Heredity and Environment — Research Design",stem:"Scientists compare personality similarity between identical twins (who share 100% of their genes) and fraternal twins (who share ~50%) raised in the same household. The researchers find that identical twins are consistently more similar than fraternal twins on measures of conscientiousness. This study is best described as:",choices:["An experiment, because the researchers manipulated the genetic similarity of the groups.","A correlational study comparing the relationship between family environment and personality.","A behavior genetics study using twin methodology to estimate genetic contributions to personality.","A cross-sectional study comparing different populations at a single point in time."],answer:"C",rationales:{A:"Incorrect. Researchers cannot manipulate genetics; twin similarity is a naturally occurring condition, not an experimental manipulation.",B:"Incorrect. While correlation is involved, this is more specifically a behavior genetics design using twins to parse hereditary vs. environmental influences.",C:"Correct. Behavior genetics research uses twin studies, adoption studies, and family studies to estimate heritability of traits. This is a classic twin methodology design.",D:"Incorrect. Cross-sectional studies compare different age groups at one time; this study compares genetically different twin pairs on personality."}},{skill:"1.B",lo:"1.4.A: Explain how cultural norms apply to brain and behavior.",topic:"1.4: The Brain — Plasticity",stem:"Research has shown that London taxi drivers have a measurably larger hippocampus compared to non-taxi drivers, with the size correlating with years of experience navigating the city. This finding best demonstrates:",choices:["That the hippocampus controls spatial navigation because of its genetic blueprint.","Neuroplasticity, because experience can physically alter the structure and function of the brain.","Contralateral organization, because navigation activates the opposite hemisphere of the brain.","That intelligence is innate, because larger hippocampal volume correlates with better spatial reasoning."],answer:"B",rationales:{A:"Incorrect. This implies genetic determination — but the correlation with years of experience suggests the change is experience-driven, not predetermined.",B:"Correct. Neuroplasticity is the brain's ability to reorganize and change in response to experience. More navigation experience → greater hippocampal development.",C:"Incorrect. Contralateral organization refers to the brain's cross-wiring of body sides — unrelated to hippocampal enlargement in taxi drivers.",D:"Incorrect. The data show the size changed with experience, suggesting environmental input, not that larger size is innate."}},{skill:"1.A",lo:"1.2.A: Differentiate nervous system subsystems.",topic:"1.2: Overview of the Nervous System",stem:"After finishing a stressful presentation, Danielle's heart rate slows, her breathing deepens, and her digestion resumes. These changes reflect the activation of which nervous system division?",choices:["The sympathetic nervous system, because it is restoring homeostasis after physical activity.","The somatic nervous system, because Danielle is voluntarily relaxing after her presentation.","The parasympathetic nervous system, because it calms the body and conserves energy after stress.","The central nervous system, because her brain is sending signals to reduce arousal."],answer:"C",rationales:{A:"Incorrect. The sympathetic NS activates the body for stress — after the stressor ends, it is the parasympathetic NS that takes over.",B:"Incorrect. The somatic NS controls voluntary skeletal muscle movement — the heart, breathing, and digestion are involuntary functions.",C:'Correct. The parasympathetic NS is the "rest-and-digest" branch that returns the body to baseline after sympathetic activation.',D:"Incorrect. While the CNS is involved in all processes, the specific involuntary calming pattern described is the domain of the parasympathetic NS."}}],u2:[{skill:"1.A",lo:"2.1.A: Explain how internal and external factors influence perception.",topic:"2.1: Perception",stem:"Amira is an experienced ornithologist (bird expert) who can immediately identify bird species from brief glimpses that novice birdwatchers miss entirely. Amira's superior ability to notice and categorize birds illustrates:",choices:["Bottom-up processing, because she is analyzing each individual feature of the bird from raw sensory data.","Top-down processing, because her knowledge and expectations guide what she notices and how she interprets it.","Signal detection, because she has a lower criterion for reporting a bird stimulus than novices do.","Sensory adaptation, because experience reduces her sensitivity to bird stimuli that novices still find novel."],answer:"B",rationales:{A:"Incorrect. Bottom-up processing builds perception from individual sensory details upward — Amira is using prior knowledge to guide perception, which is top-down.",B:"Correct. Top-down processing involves using prior knowledge, schemas, and expectations to interpret sensory input. Amira's expertise creates schemas that guide perception.",C:"Incorrect. Signal detection theory concerns how we decide whether a stimulus is present — while related, this scenario specifically describes schema-driven interpretation.",D:"Incorrect. Sensory adaptation decreases responsiveness to constant stimuli; Amira's ability is increased by expertise, not reduced."}},{skill:"1.A",lo:"2.1.B: Explain how visual perceptual processes work.",topic:"2.1: Perception",stem:"Looking at a distant building, you can tell it is far away because it appears much smaller than nearby buildings and its features are less distinct. You are using which type of depth cues?",choices:["Binocular cues, because both eyes are working together to assess the distance to the building.","Monocular cues, because relative size and clarity are depth cues available to a single eye.","Retinal disparity, because the difference between each eye's image creates depth information.","Convergence, because your eye muscles adjust to focus on the distant object."],answer:"B",rationales:{A:"Incorrect. Binocular cues (retinal disparity, convergence) require two eyes and are most effective at close distances.",B:"Correct. Relative size (smaller = farther) and atmospheric perspective (less distinct = farther) are monocular cues — they work with one eye and are effective at great distances.",C:"Incorrect. Retinal disparity is a specific binocular cue based on the slightly different images each eye receives — it is less effective at very long distances.",D:"Incorrect. Convergence is the binocular cue from eye muscles turning inward for near objects — not relevant to a distant building."}},{skill:"1.A",lo:"2.2.A: Explain how theories account for thinking, problem-solving, and decision-making.",topic:"2.2: Thinking, Problem-Solving",stem:"After seeing a news report about a local carjacking, Marcus becomes convinced that carjackings are extremely common in his city, even though crime statistics show they are rare. This is best explained by:",choices:["Confirmation bias, because Marcus is now seeking out information about carjackings to confirm his new belief.","The representativeness heuristic, because Marcus is comparing his city to a prototype of a dangerous city.","The availability heuristic, because the recent, vivid memory of the report makes carjackings feel common.","Functional fixedness, because Marcus cannot imagine his city without crime after seeing the report."],answer:"C",rationales:{A:"Incorrect. Confirmation bias involves actively seeking confirming information — Marcus is drawing a probability judgment, not filtering information.",B:"Incorrect. The representativeness heuristic involves judging likelihood based on resemblance to a prototype, not based on ease of recall.",C:"Correct. The availability heuristic leads people to judge the frequency of events by how easily examples come to mind. A vivid, recent news report makes carjackings highly available.",D:"Incorrect. Functional fixedness involves being unable to see alternative uses for objects — it has nothing to do with probability judgments about crime."}},{skill:"1.A",lo:"2.2.A: Explain thinking and decision-making.",topic:"2.2: Thinking, Problem-Solving",stem:"Elena is writing a story and spends hours checking whether every sentence is grammatically perfect before moving to the next one. Her perfectionistic approach — though it guarantees correctness — slows her writing dramatically. This approach is best described as:",choices:["Using a heuristic, because she is applying a mental shortcut to evaluate each sentence.","Using an algorithm, because she is systematically checking every possible element before proceeding.","Experiencing functional fixedness, because she cannot think of the story in terms of anything other than grammar.","Exhibiting confirmation bias, because she focuses only on sentences that match her preferred style."],answer:"B",rationales:{A:"Incorrect. Heuristics are quick, approximate shortcuts — Elena's exhaustive checking is the opposite of a shortcut.",B:"Correct. Algorithms are systematic step-by-step procedures that guarantee correctness. Checking every sentence thoroughly before proceeding is an algorithmic approach.",C:"Incorrect. Functional fixedness involves inability to use objects in novel ways — irrelevant here.",D:"Incorrect. Confirmation bias involves looking for information that confirms prior beliefs — not a description of the systematic process of checking grammar."}},{skill:"1.A",lo:"2.3.A: Explain how types and structures of memory work.",topic:"2.3: Introduction to Memory",stem:"While driving to a new restaurant, James uses his knowledge of how the city is organized to make educated guesses about which turns to take. However, he cannot recall the specific occasion when he first drove down each street. James is drawing on:",choices:["Episodic memory, because he is navigating based on specific past experiences.","Semantic memory, because he is drawing on general knowledge about the city's layout without specific event memories.","Procedural memory, because driving involves an automatic skill.","Working memory, because he is holding the directions in mind while driving."],answer:"B",rationales:{A:'Incorrect. Episodic memory stores specific autobiographical events (e.g., "I remember the time I drove to the park"). James explicitly cannot recall the specific episodes.',B:"Correct. Semantic memory contains general world knowledge without ties to specific events or episodes — knowing the city's layout without remembering how one learned it.",C:"Incorrect. Procedural memory is for motor skills and habits (like driving itself) — it does not explain spatial knowledge of the city.",D:"Incorrect. Working memory holds information temporarily in awareness, but the scenario describes retrieved general knowledge, not temporary mental storage."}},{skill:"1.A",lo:"2.4.A: Explain how encoding processes work.",topic:"2.4: Encoding Memories",stem:"A psychology student memorizes her vocabulary list by creating a vivid story that connects each term to a funny personal experience. Compared to simply rereading the list, this strategy will most likely improve retention because:",choices:["The story creates maintenance rehearsal, which keeps information in short-term memory longer.","The personal associations produce deeper, semantic processing that creates stronger long-term memory traces.","The fictional narrative prevents proactive interference from previously learned terms.","Chunking the terms into a story increases the capacity of short-term memory."],answer:"B",rationales:{A:"Incorrect. Maintenance rehearsal involves simple repetition to keep information in STM — it is less effective for long-term retention than elaborative rehearsal.",B:"Correct. Creating meaningful personal associations is elaborative rehearsal that produces deep semantic processing — the deepest level of the Levels of Processing framework, which produces the strongest memories.",C:"Incorrect. While interference is a real concern, the mechanism described here is about depth of processing, not interference prevention.",D:"Incorrect. Chunking organizes information into units to expand effective memory capacity — the story here is using personal meaning (semantic encoding), not grouping for capacity."}},{skill:"1.A",lo:"2.5.A: Explain how memory storage processes retain information.",topic:"2.5: Storing Memories",stem:"A brief visual stimulus flashes on a screen for 50 milliseconds. A participant can report its content if tested immediately but not after 3 seconds have passed and no rehearsal occurred. Which memory store best accounts for this finding?",choices:["Working memory, because this system holds information for up to 20 seconds.","Echoic memory, because it stores auditory information for approximately 3–4 seconds.","Iconic memory, because it briefly retains a visual image for less than one second.","Long-term memory, because the image was not rehearsed and therefore not consolidated."],answer:"C",rationales:{A:"Incorrect. Working memory lasts up to ~20 seconds with capacity of ~7±2 chunks — the extremely brief 50ms presentation and rapid decay suggest an earlier sensory store.",B:"Incorrect. Echoic memory stores sounds (auditory information) for 3–4 seconds — the stimulus here is visual.",C:"Correct. Iconic memory (visual sensory memory) retains a fleeting visual image for less than one second. It explains why the image is briefly available but quickly lost without rehearsal.",D:"Incorrect. Long-term memory consolidation requires rehearsal and time — the question is explaining the initial brief storage, not the failure to consolidate."}},{skill:"1.A",lo:"2.6.A: Explain how memory retrieval processes work.",topic:"2.6: Retrieving Memories",stem:"A researcher has participants study a list of words in a cold room. Later, half are tested in the same cold room and half in a warm room. Participants tested in the cold room recall significantly more words. This finding demonstrates:",choices:["The testing effect, because the act of retrieval itself strengthens the memory trace.","Mood-congruent memory, because emotional states during encoding match emotional states during retrieval.","Context-dependent memory, because the physical environment during encoding matches the retrieval environment.","State-dependent memory, because participants' internal physiological states during encoding match retrieval."],answer:"C",rationales:{A:"Incorrect. The testing effect concerns how retrieval practice improves retention — here the variable is environment, not the act of being tested.",B:"Incorrect. Mood-congruent memory involves emotional states (happy memories easier to recall when happy) — the cold room is a physical, not emotional, context.",C:"Correct. Context-dependent memory holds that retrieval is best when the physical environment at retrieval matches the encoding environment — which is exactly demonstrated here.",D:"Incorrect. State-dependent memory involves internal physiological or pharmacological states (e.g., sober vs. intoxicated) — room temperature is an external environmental cue."}},{skill:"1.A",lo:"2.7.A: Explain possible reasons why memory failure or errors occur.",topic:"2.7: Forgetting and Memory Challenges",stem:"After spending six months studying Mandarin, Héctor finds that Spanish words he used to know fluently now feel harder to retrieve. This is best explained by:",choices:["Proactive interference, because old Spanish memories are blocking his ability to learn new Mandarin words.","Retroactive interference, because his new Mandarin learning is disrupting his ability to retrieve older Spanish memories.","Source amnesia, because Héctor cannot remember where he originally learned his Spanish vocabulary.","The forgetting curve, because all memories naturally decay at the same rate over time."],answer:"B",rationales:{A:"Incorrect. Proactive interference is when OLD learning interferes with NEW learning (Spanish blocking Mandarin) — the reverse of what is described.",B:"Correct. Retroactive interference occurs when NEW learning (Mandarin) interferes with the retrieval of OLDER memories (Spanish).",C:"Incorrect. Source amnesia is forgetting where information was learned — Héctor is not forgetting the source of his Spanish knowledge, just struggling to retrieve words.",D:"Incorrect. The forgetting curve describes the rapid decay of memories over time — but here the cause is specifically the interference from new learning, not passive decay."}},{skill:"1.A",lo:"2.7.A: Explain why memory errors occur.",topic:"2.7: Forgetting and Memory Challenges",stem:'Witnesses to a staged theft were later asked either "Did you see the man with a mustache?" or "Did you see the man?" Significantly more witnesses who received the first question "remembered" a mustache — even though the thief had no mustache. This effect is called:',choices:["Source amnesia, because the witnesses forgot where they saw the mustache.","The misinformation effect, because leading questions introduced false information into the memory.","Proactive interference, because witnesses' general knowledge about thieves distorted their memory.","Constructive memory, because the witnesses are actively rebuilding a memory that was never stored."],answer:"B",rationales:{A:"Incorrect. Source amnesia is forgetting the origin of a piece of information — the witnesses are not confused about where they saw information; the information was implanted.",B:"Correct. The misinformation effect (Loftus) demonstrates how post-event information (the leading question about a mustache) can distort or implant false details into existing memories.",C:"Incorrect. Proactive interference involves old memories disrupting new ones — here the distortion comes from a post-event question, not from prior knowledge.",D:"Incorrect. While memory is always constructive, the specific mechanism here is misinformation from an external source altering the stored memory."}},{skill:"1.A",lo:"2.8.B: Explain how intelligence is measured.",topic:"2.8: Intelligence and Achievement",stem:"An IQ test is revised by testing it on 1,000 people representative of the national population, and scores are then reported relative to this group's distribution. This process is called:",choices:["Reliability testing, because the test is being checked for consistency across administrations.","Validity assessment, because the test is being evaluated for whether it measures intelligence.","Standardization, because the test is being administered uniformly and norms are being established.","The Flynn Effect, because IQ scores are being compared across a large representative sample."],answer:"C",rationales:{A:"Incorrect. Reliability testing examines whether the same person gets a similar score across multiple administrations — not norm development.",B:"Incorrect. Validity concerns whether the test measures what it claims to measure — not the process of establishing population norms.",C:"Correct. Standardization involves administering the test under uniform conditions and establishing norms from a representative sample, so individual scores can be compared to the population.",D:"Incorrect. The Flynn Effect refers to rising average IQ scores across generations, not to the process of establishing norms."}},{skill:"1.B",lo:"2.8.D: Explain how cultural norms affect achievement measures.",topic:"2.8: Intelligence and Achievement",stem:'Research finds that women score lower on a standardized math test when they are reminded beforehand of the stereotype that "women are bad at math." When the reminder is absent, their scores are equivalent to men\'s. This finding specifically demonstrates:',choices:["Confirmation bias, because the women are seeking out negative information about female math ability.","The Flynn Effect, because stereotype-related stress artificially inflates scores in some groups.","Stereotype threat, because awareness of a negative group stereotype impairs performance on stereotype-relevant tasks.","Learned helplessness, because repeated exposure to stereotype messaging leads to giving up."],answer:"C",rationales:{A:"Incorrect. Confirmation bias involves seeking out stereotype-consistent information — not the performance impairment seen in testing situations.",B:"Incorrect. The Flynn Effect refers to generational increases in IQ — unrelated to situational stereotype effects.",C:"Correct. Stereotype threat occurs when a person is aware of a negative stereotype about their group, causing anxiety that interferes with performance on the stereotyped task.",D:"Incorrect. Learned helplessness involves giving up after repeated uncontrollable negative outcomes — this is a situational performance effect from a single reminder, not repeated helplessness."}},{skill:"3.C",lo:"2.3.A: Interpret data related to memory.",topic:"2.3: Introduction to Memory",stem:"A researcher presents participants with a list of 20 words and then tests recall. The data shows highest recall for words 1–4 (first items) and 17–20 (last items), with words 5–16 recalled least often. This pattern is best described as:",choices:["The spacing effect, because words at different positions were encoded at different time intervals.","The serial position effect, demonstrating primacy for the first items and recency for the last items.","Proactive interference, because the first words prevent the middle words from being encoded.","The levels of processing effect, because the first and last words were processed more deeply."],answer:"B",rationales:{A:"Incorrect. The spacing effect concerns the advantage of distributing study sessions over time — not the position of items in a single list.",B:"Correct. The serial position effect produces the classic U-shaped curve: primacy (first items rehearsed more → LTM) and recency (last items still in working memory). Middle items are forgotten most.",C:"Incorrect. Proactive interference is when old memories block new ones — a different phenomenon from position-based recall patterns.",D:"Incorrect. Levels of processing predicts that deeply processed (semantic) items are better remembered — but here the effect is purely positional, not based on processing depth."}},{skill:"2.A",lo:"2.1.A: Determine research design in perception studies.",topic:"2.1: Perception",stem:"A researcher studies whether medical experience affects pain perception by comparing pain ratings between groups of nurses, medical students, and people with no medical background. No variables are manipulated; participants simply rate pain from standardized images. This study is best classified as:",choices:["An experiment, because different groups with different training are being compared.","A correlational study, because the researcher is examining the relationship between experience and pain ratings.","A naturalistic observation, because the researcher is watching participants in a medical setting.","A case study, because the researcher is studying the detailed experience of individual participants."],answer:"B",rationales:{A:"Incorrect. An experiment requires active manipulation of an IV and random assignment — neither is present here.",B:"Correct. This is a correlational study: two naturally occurring variables (medical experience level and pain ratings) are being measured to see if they are related, without manipulation.",C:"Incorrect. Naturalistic observation involves watching behavior in natural settings without intervention — here participants are actively rating images in a controlled setting.",D:"Incorrect. A case study is an in-depth examination of one individual — this study has multiple groups."}},{skill:"1.A",lo:"2.8.A: Explain theories of intelligence.",topic:"2.8: Intelligence and Achievement",stem:"Howard Gardner proposed that a person who struggles with traditional academic subjects but excels in composing and playing music likely possesses high:",choices:["General intelligence (g), because musical ability reflects the same underlying cognitive capacity as academic achievement.","Fluid intelligence, because musical improvisation requires rapid novel problem-solving.","Musical-rhythmic intelligence, because Gardner identified this as one of multiple distinct types of intelligence.","Crystallized intelligence, because musical knowledge is accumulated through years of education and experience."],answer:"C",rationales:{A:"Incorrect. Spearman's concept of general intelligence (g) proposes one underlying factor — Gardner's framework explicitly challenges this by proposing multiple independent intelligences.",B:"Incorrect. Fluid intelligence (Cattell) refers to novel problem-solving capacity — while related, it is not Gardner's specific framework.",C:"Correct. Gardner's theory of multiple intelligences includes musical-rhythmic intelligence as a distinct form — separate from linguistic or logical-mathematical intelligence.",D:"Incorrect. Crystallized intelligence (Cattell) is accumulated knowledge and skills — a different theoretical framework from Gardner's."}}],u3:[{skill:"1.A",lo:"3.1.A: Explain how enduring themes inform developmental psychology.",topic:"3.1: Themes and Methods in Developmental Psychology",stem:"A researcher follows 200 children from age 5 to age 25, assessing their social skills every three years using the same questionnaire. Which type of research design is this, and what is one major advantage?",choices:["Cross-sectional; the researcher can compare different cohorts simultaneously.","Longitudinal; the researcher can track actual developmental change within the same individuals over time.","Quasi-experimental; the researcher can infer cause and effect about social development.","Meta-analytic; the researcher is combining multiple studies on social development."],answer:"B",rationales:{A:"Incorrect. Cross-sectional studies compare different age groups at a single point in time — this study follows the same participants over 20 years.",B:"Correct. Longitudinal design studies the same individuals over an extended period, allowing researchers to observe real developmental change rather than inferring it from age group differences.",C:"Incorrect. Quasi-experiments involve manipulating an IV without random assignment — this study has no manipulation.",D:"Incorrect. Meta-analysis statistically combines data from multiple existing studies — this is a single study."}},{skill:"1.A",lo:"3.2.B: Explain how physical development in infancy and childhood applies to behavior.",topic:"3.2: Physical Development Across the Lifespan",stem:"Genie was a child who was locked in isolation until age 13 with minimal language exposure. Despite years of intensive language therapy after her rescue, Genie never developed fully normal grammar or syntax. This case is most often cited as evidence for:",choices:["The role of operant conditioning in language acquisition, because she was not reinforced for speaking.","The existence of a critical period for language development, because exposure after puberty produced limited success.","The social learning theory of language, because she lacked models to imitate during childhood.","Piaget's sensorimotor stage, because her isolation prevented normal object permanence development."],answer:"B",rationales:{A:"Incorrect. While reinforcement plays a role in language, Genie's case is specifically used to argue for a biological sensitive period, not operant conditioning.",B:"Correct. The critical period hypothesis holds that language must be acquired during a specific developmental window (before puberty). Genie's inability to fully acquire grammar after this period supports this idea.",C:"Incorrect. Social learning theory (Bandura) emphasizes modeling — while Genie lacked models, the most direct implication of her case is the critical period, not modeling.",D:"Incorrect. Object permanence is a cognitive milestone from the sensorimotor stage — unrelated to the language acquisition argument Genie's case is used to support."}},{skill:"1.A",lo:"3.4.A: Explain how theories of cognitive development apply to behavior.",topic:"3.4: Cognitive Development Across the Lifespan",stem:'A teacher pours equal amounts of water into two identical glasses, then transfers the water from one glass into a tall, thin cylinder. A 5-year-old student insists the cylinder has more water because "it\'s taller." A 9-year-old correctly says the amount is the same. Piaget would attribute this difference to:',choices:["The 5-year-old being in the formal operational stage, where abstract reasoning is still developing.","The 5-year-old lacking conservation, a skill that develops in the concrete operational stage.","The 9-year-old having achieved object permanence, which allows understanding of volume constancy.","The difference in crystallized intelligence that develops through formal schooling."],answer:"B",rationales:{A:"Incorrect. Formal operational is the stage for abstract and hypothetical thinking (age 12+), not the stage associated with conservation failure.",B:"Correct. Conservation — the understanding that quantity remains constant despite changes in appearance — is a hallmark of the concrete operational stage (ages 7–11). The 5-year-old (preoperational) lacks this.",C:"Incorrect. Object permanence (developed ~8 months) is the understanding that objects continue to exist when not seen — not the same as conservation of volume.",D:"Incorrect. Crystallized intelligence is an adult cognitive concept from Cattell — not Piaget's explanation of this developmental difference."}},{skill:"1.A",lo:"3.4.A: Explain Vygotsky's theory of cognitive development.",topic:"3.4: Cognitive Development Across the Lifespan",stem:"A university student can solve basic algebra problems independently but struggles with calculus. With the guidance of a tutor, however, she can work through calculus problems successfully. The space between what she can do alone and what she can do with guidance represents:",choices:["Scaffolding, because the tutor is providing the temporary support that enables learning.","The zone of proximal development, because it describes what a learner can achieve with appropriate guidance.","Egocentrism, because the student is focused on her own understanding rather than the tutor's perspective.","Formal operational thinking, because she is now able to engage with abstract mathematical reasoning."],answer:"B",rationales:{A:'Incorrect. Scaffolding is the support the tutor provides — but the question asks about the "space" between independent and guided ability, which is the ZPD.',B:"Correct. Vygotsky's Zone of Proximal Development (ZPD) is the distance between what a learner can do independently and what they can do with guidance from a more knowledgeable person.",C:"Incorrect. Egocentrism is Piaget's concept for young children's inability to see others' perspectives — unrelated to this adult learning scenario.",D:"Incorrect. Formal operational thinking describes abstract reasoning ability — but the question is about the gap between unassisted and guided performance."}},{skill:"1.A",lo:"3.5.B: Explain how language develops in humans.",topic:"3.5: Communication and Language Development",stem:'A 2-year-old child has recently learned the word "dog" and refers to all four-legged animals — including cats, cows, and horses — as "dog." This error reflects which aspect of language development?',choices:["Telegraphic speech, because the child is using single words to represent complex ideas.",'Overextension, because the child is applying the word "dog" to a broader category than it actually covers.',"Overgeneralization, because the child is applying a grammar rule incorrectly to an exception.","Babbling, because the child is producing sounds without yet understanding their meaning."],answer:"B",rationales:{A:'Incorrect. Telegraphic speech involves two-word combinations that leave out function words ("want cookie") — not the misapplication of a single word to too many referents.',B:'Correct. Overextension is applying a word too broadly (beyond its actual meaning). Using "dog" for all quadrupeds is classic overextension.',C:'Incorrect. Overgeneralization applies to grammar rules incorrectly applied to exceptions (e.g., "I goed" for "went") — not to semantic category errors.',D:"Incorrect. Babbling is the stage of producing language sounds without meaningful content — this child is clearly using words meaningfully, just too broadly."}},{skill:"1.A",lo:"3.6.A: Explain how social development applies to behavior.",topic:"3.6: Social-Emotional Development Across the Lifespan",stem:'Infant monkeys in Harlow\'s studies were separated from their mothers at birth and given access to two wire "mothers" — one made of wire with a bottle of milk, and one covered in soft cloth with no food. The infants spent most of their time clinging to the cloth "mother." This finding primarily supports which conclusion?',choices:["Feeding is the primary basis for infant attachment, because the wire mother provided nutrition.","Contact comfort plays a more significant role in attachment than feeding alone.","Imprinting occurs in primates because infants attached to the first object they encountered.","Operant conditioning explains attachment, because clinging was reinforced by warmth."],answer:"B",rationales:{A:"Incorrect. The monkeys preferred the cloth mother despite the wire mother having food — this directly refutes the feeding-based explanation of attachment.",B:"Correct. Harlow's research showed that comfort from soft physical contact is more important for early attachment than nutritional provision.",C:"Incorrect. Imprinting is Lorenz's concept describing rapid early attachment in birds to the first moving object — not a monkey-specific conclusion from Harlow.",D:"Incorrect. While operant conditioning could play a role, the infants' preference for comfort over food suggests a biological drive for contact that goes beyond simple reinforcement."}},{skill:"1.A",lo:"3.6.A: Explain Erikson's stages of psychosocial development.",topic:"3.6: Social-Emotional Development Across the Lifespan",stem:"A 17-year-old is experimenting with different friend groups, trying out different styles of clothing and music, and is unsure about what career path to pursue. According to Erikson, this adolescent is navigating which psychosocial stage?",choices:["Industry vs. Inferiority, because the adolescent is developing competence through activities.","Initiative vs. Guilt, because the adolescent is asserting independence in new social contexts.","Identity vs. Role Confusion, because the adolescent is exploring who they are and what values to embrace.","Intimacy vs. Isolation, because the adolescent is forming meaningful connections with peers."],answer:"C",rationales:{A:"Incorrect. Industry vs. Inferiority is the school-age stage (ages 6–12), focused on developing competence — not adolescent identity exploration.",B:"Incorrect. Initiative vs. Guilt is the preschool stage (ages 3–6), involving beginning to assert personal power through play and activity.",C:"Correct. Erikson's fifth stage — Identity vs. Role Confusion — occurs in adolescence and involves exploring and establishing a sense of personal identity, values, and life direction.",D:"Incorrect. Intimacy vs. Isolation is the young adult stage — though peers are involved here, the adolescent's behavior is about identity, not intimate pair bonding."}},{skill:"1.A",lo:"3.7.A: Explain how classical conditioning applies to behavior.",topic:"3.7: Classical Conditioning",stem:"A child receives a painful injection at a doctor's office (wearing a white coat). Weeks later, the child begins crying at the sight of any person wearing a white coat, including their dentist and a lab assistant at school. This phenomenon is best described as:",choices:["Extinction, because the conditioned response is weakening due to repeated presentations without the unconditioned stimulus.","Stimulus discrimination, because the child is responding differently to similar stimuli.","Stimulus generalization, because the conditioned response is being triggered by stimuli similar to the original conditioned stimulus.","Counterconditioning, because the conditioned response is replacing a previously neutral response."],answer:"C",rationales:{A:"Incorrect. Extinction occurs when the CS is repeatedly presented without the UCS, causing the CR to weaken — the child is still responding strongly.",B:"Incorrect. Stimulus discrimination is when an organism responds to one specific stimulus and not to similar ones — the opposite of what is described here.",C:"Correct. Stimulus generalization is when a conditioned response spreads to stimuli similar to the CS. The white coat (CS) has generalized to other people wearing white.",D:"Incorrect. Counterconditioning replaces a conditioned response with an incompatible one — no replacement is occurring here."}},{skill:"1.A",lo:"3.8.A: Explain how operant conditioning applies to behavior.",topic:"3.8: Operant Conditioning",stem:"A parent removes a child's television privileges when the child hits her sibling. The child's hitting behavior subsequently decreases. This is an example of:",choices:["Positive reinforcement, because a desirable behavior has been rewarded with something pleasant.","Negative reinforcement, because an aversive stimulus has been removed to increase behavior.","Positive punishment, because an aversive stimulus was added to decrease behavior.","Negative punishment, because a desirable stimulus was removed to decrease behavior."],answer:"D",rationales:{A:"Incorrect. Positive reinforcement involves adding something desirable to increase a behavior — not the scenario here.",B:"Incorrect. Negative reinforcement removes an aversive stimulus to INCREASE behavior — here behavior is decreasing.",C:"Incorrect. Positive punishment adds an aversive stimulus to decrease behavior — the parent removed TV privileges (a desirable thing), not added something aversive.",D:"Correct. Negative punishment involves removing a desirable stimulus to decrease an unwanted behavior. TV privileges are desirable; their removal decreases the hitting behavior."}},{skill:"1.A",lo:"3.8.A: Explain how reinforcement schedules apply to behavior.",topic:"3.8: Operant Conditioning",stem:"A sales associate receives a bonus check for every 20 sales she makes, regardless of how long it takes her to achieve those sales. This reinforcement schedule would most likely produce:",choices:["A steady, moderate response rate typical of variable interval schedules.","A high, consistent response rate with a brief pause after each reinforcement, typical of fixed ratio schedules.","The highest response rate of all schedules, because unpredictability motivates peak performance.","A scalloped response pattern of slow work followed by a burst of activity before each deadline."],answer:"B",rationales:{A:"Incorrect. Variable interval schedules produce steady moderate rates — this is a ratio (response-based) schedule, not an interval (time-based) one.",B:'Correct. Fixed ratio schedules reinforce after a set number of responses (every 20 sales), producing high, consistent rates with a brief post-reinforcement pause before the next "run."',C:"Incorrect. Variable ratio schedules (not fixed ratio) produce the highest and most persistent rates because unpredictability prevents extinction.",D:"Incorrect. The scalloped pattern (slow start, rapid acceleration near deadline) is characteristic of fixed interval schedules — not fixed ratio."}},{skill:"1.A",lo:"3.9.A: Explain how social learning applies to behavior.",topic:"3.9: Social, Cognitive, and Neurological Factors in Learning",stem:"A young boy watches his older brother receive praise and rewards for doing household chores. Without being directly asked, the boy begins doing chores himself. This is best explained by:",choices:["Latent learning, because the boy has been learning without reinforcement and now demonstrates the behavior.","Insight learning, because the boy suddenly realized that chores lead to rewards.","Vicarious conditioning, because the boy was reinforced by observing his brother's positive consequence.","Classical conditioning, because the sight of chores became associated with rewards."],answer:"C",rationales:{A:"Incorrect. Latent learning occurs when learning is hidden until incentive is introduced — the boy is acting immediately because of what he observed, not later when motivated.",B:'Incorrect. Insight learning is the sudden "aha!" solution to a problem — not the acquisition of behavior through observation of another\'s consequences.',C:"Correct. Vicarious conditioning (part of Bandura's social learning theory) occurs when one learns by observing the consequences (reinforcement) that another person receives for their behavior.",D:"Incorrect. Classical conditioning involves stimulus-response associations — the boy is not automatically responding to a neutral stimulus that was paired with an unconditioned one."}},{skill:"1.A",lo:"3.9.B: Explain how cognitive factors in learning apply to behavior.",topic:"3.9: Social, Cognitive, and Neurological Factors in Learning",stem:"Tolman placed rats in a maze for several days without providing any food reward. When food was later introduced at the goal box, the rats navigated the maze almost as efficiently as rats who had been rewarded from the beginning. This finding demonstrates:",choices:["Insight learning, because the rats suddenly solved the maze when the reward was introduced.","Classical conditioning, because the maze stimuli became associated with the food reward.","Latent learning, because learning occurred without immediate reinforcement but was demonstrated once incentive was present.","Shaping, because successive approximations to maze navigation were reinforced."],answer:"C",rationales:{A:"Incorrect. Insight learning is a sudden mental solution — not the gradual silent learning in an unrewarded maze shown to exist by Tolman.",B:"Incorrect. Classical conditioning links a neutral stimulus to an unconditioned one — the maze was associated with nothing during the latent phase.",C:"Correct. Latent learning is learning that occurs without apparent reinforcement and is not demonstrated until incentive is provided. Tolman's maze study is the classic demonstration.",D:"Incorrect. Shaping involves reinforcing successive approximations — no reinforcement was used during the latent learning phase."}},{skill:"2.D",lo:"3.7.A: Evaluate ethical procedures related to learning research.",topic:"3.7: Classical Conditioning",stem:"In Watson's Little Albert study, an 11-month-old infant was conditioned to fear a white rat by pairing the rat's presentation with a loud startling noise. The child was never deconditioned. Which ethical principle was most clearly violated?",choices:["Informed consent, because the child and parents were not told the true purpose of the study.","Nonmaleficence, because the researchers caused lasting psychological harm without undoing the conditioning.","Confidentiality, because the child's identity has been discussed in published literature.","IRB review, because the study was conducted before formal ethical oversight was established."],answer:"B",rationales:{A:"Incorrect. While informed consent is important, the most serious ethical violation is the deliberate induction and abandonment of a fear response — causing harm.",B:'Correct. Nonmaleficence means "do no harm." Watson deliberately instilled a phobia and failed to decondition Albert — a serious violation of the principle of avoiding harm.',C:"Incorrect. While the child's identity was later revealed, this is a lesser concern compared to the direct psychological harm caused by the conditioning procedure.",D:"Incorrect. IRBs were indeed not yet established, but this does not make the harm caused any less of an ethical violation by contemporary standards."}},{skill:"1.A",lo:"3.3.A: Describe how sex and gender influence socialization.",topic:"3.3: Gender and Sexual Orientation",stem:"In some cultures, men are expected to be primary caregivers and to express emotions openly, while in others this is considered unmasculine. This cultural variation in expectations for male behavior most directly demonstrates that:",choices:["Sex differences in behavior are entirely biological and genetic in origin.","Gender roles are socially constructed and vary significantly across cultures.","Natural selection has produced universal gender-role expectations across all human societies.","Gender identity and biological sex are always aligned because both are determined by chromosomes."],answer:"B",rationales:{A:"Incorrect. If gender roles were entirely biological, they would be consistent across all cultures — cross-cultural variation shows cultural shaping.",B:"Correct. The variation in gender role expectations across cultures shows that they are largely social constructions shaped by cultural norms, not universal biological mandates.",C:"Incorrect. Evolutionary psychology may explain some tendencies, but the dramatic cultural variation in caregiving roles suggests these are not universal natural-selection products.",D:"Incorrect. Gender identity (psychological sense of self) is recognized as distinct from biological sex and chromosomal composition
