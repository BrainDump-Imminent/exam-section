 — they are not always aligned."}},{skill:"3.B",lo:"3.1.B: Interpret data from developmental research.",topic:"3.1: Themes and Methods in Developmental Psychology",stem:"A cross-sectional study finds that 70-year-old adults score significantly lower on a fluid intelligence test than 25-year-old adults. A researcher argues this finding overstates the decline in intelligence with age. The most likely reason for this concern is:",choices:["The study lacks statistical significance, because the sample size is too small.","Cohort effects, because the older adults grew up in a different era with less access to formal education and technology.","The study has poor external validity, because it was conducted in a laboratory setting.","The older adults showed retrograde amnesia, which reduced their test performance."],answer:"B",rationales:{A:"Incorrect. The question does not suggest inadequate sample size; the concern is about the validity of comparing different generations.",B:"Correct. Cohort effects are a major limitation of cross-sectional research: people of different ages grew up in different historical contexts. Lower scores might reflect educational differences, not cognitive aging.",C:"Incorrect. External validity concerns generalizability to real-world settings — not the comparison between age cohorts that grew up differently.",D:"Incorrect. Retrograde amnesia is the loss of pre-injury memories — the scenario concerns normal developmental differences, not clinical memory disorders."}}],u4:[{skill:"1.A",lo:"4.1.A: Explain how attribution theory applies to behavior.",topic:"4.1: Attribution Theory",stem:'Jenna watches a classmate trip and drop all his books. She immediately thinks, "He\'s so clumsy." Later that same morning, Jenna herself trips on the same uneven floor tile and thinks, "That tile is a hazard." Jenna is demonstrating:',choices:["The self-serving bias, because she is attributing her own stumble to external factors to protect her self-esteem.","Cognitive dissonance, because her behavior conflicts with her belief that she is graceful.","The fundamental attribution error, because she attributed the classmate's stumbling to his character rather than the situation.","The actor-observer bias, because she attributes others' behavior to disposition and her own to situation."],answer:"D",rationales:{A:"Incorrect. The self-serving bias specifically involves attributing successes internally and failures externally — while present, the broader pattern described is actor-observer bias.",B:"Incorrect. Cognitive dissonance involves mental discomfort from conflicting beliefs or actions — not the attribution pattern described here.",C:"Incorrect. The FAE is part of the pattern, but the question specifically describes Jenna making one attribution about another person AND a different attribution about herself — the full actor-observer contrast.",D:"Correct. The actor-observer bias is the tendency to attribute others' behavior to disposition (he is clumsy) and one's own behavior to situation (the tile). Both components are present."}},{skill:"1.A",lo:"4.1.B: Explain how locus of control applies to behavior.",topic:"4.1: Attribution Theory",stem:"Research suggests that people who believe their health outcomes are primarily determined by their own choices and behaviors (rather than luck or fate) are more likely to exercise regularly, follow medical advice, and eat healthily. This finding is most consistent with which concept?",choices:["External locus of control, because the individuals believe external factors determine their health.","Internal locus of control, because the individuals believe they can influence their own outcomes through their behavior.","Self-serving bias, because the individuals attribute their good health to internal factors.","Learned helplessness, because the individuals have experienced success and continue healthy behaviors."],answer:"B",rationales:{A:"Incorrect. An external locus of control involves believing that outcomes are determined by luck, fate, or others — the opposite of taking personal responsibility for health behaviors.",B:"Correct. Internal locus of control is the belief that outcomes are determined by one's own actions — this predicts taking personal health-promoting action.",C:"Incorrect. Self-serving bias involves attributing successes to internal factors — but this is about ongoing behavioral motivation, not post-hoc attribution of outcomes.",D:"Incorrect. Learned helplessness involves giving up after experiencing uncontrollable failures — the opposite of the proactive health behaviors described."}},{skill:"1.A",lo:"4.2.A: Explain how stereotypes contribute to prejudice and discrimination.",topic:"4.2: Attitude Formation and Change",stem:"Studies using the Implicit Association Test (IAT) consistently show that many people who explicitly report no racial bias still show faster response times when pairing pictures of certain racial groups with negative words. These results best illustrate the existence of:",choices:["In-group bias, because participants are favoring their own racial group explicitly.","Implicit attitudes, because unconscious associations influence responses even when people deny having bias.","The just-world phenomenon, because participants believe members of certain groups deserve negative outcomes.","Belief perseverance, because participants maintain biased attitudes even after being told the test results."],answer:"B",rationales:{A:"Incorrect. In-group bias involves favoritism toward one's own group — while related, the IAT result specifically reveals unconscious automatic associations.",B:"Correct. Implicit attitudes are automatic, unconscious evaluations that influence behavior without awareness. IAT results reveal these hidden associations even when explicit self-reports show no bias.",C:"Incorrect. The just-world phenomenon is the belief that people get what they deserve — not measured by reaction time pairings.",D:"Incorrect. Belief perseverance involves maintaining beliefs after disconfirming evidence — the IAT reveals existing implicit attitudes, not resistance to changing them."}},{skill:"1.A",lo:"4.3.A: Explain how social situations affect behavior.",topic:"4.3: Psychology of Social Situations",stem:"In Asch's line-matching experiments, participants frequently agreed with the clearly wrong majority answer. Post-experiment interviews revealed that some participants genuinely came to believe the wrong answer was correct, while others simply went along despite knowing better. The former group was influenced by:",choices:["Deindividuation, because anonymity reduced their personal responsibility.","Informational influence, because they assumed the group had knowledge or insight they lacked.","Normative influence, because they wanted to be accepted and avoid social rejection.","Obedience to authority, because Asch was in a position of power over the participants."],answer:"B",rationales:{A:"Incorrect. Deindividuation involves loss of self-awareness in a crowd — Asch's participants were identifiable individuals, not an anonymous crowd.",B:"Correct. Informational influence occurs when people conform because they believe the group has better information — those who genuinely changed their perceptual belief did so for informational reasons.",C:"Incorrect. Normative influence explains participants who knew the correct answer but went along publicly to fit in — the question specifically asks about those who changed their actual belief.",D:"Incorrect. Asch was not an authority issuing commands; the pressure came from peers, not from a hierarchical authority figure."}},{skill:"1.A",lo:"4.3.A: Explain how the bystander effect applies to behavior.",topic:"4.3: Psychology of Social Situations",stem:"A student collapses in the middle of a crowded cafeteria. Despite dozens of people witnessing the collapse, several minutes pass before anyone calls for help. This delay is most directly explained by:",choices:["Social facilitation, because the presence of others increases the difficulty of performing an unfamiliar helping behavior.","Diffusion of responsibility, because each bystander assumes another person in the crowd will take action.","Deindividuation, because the presence of the crowd reduces each person's sense of individual identity.","Social loafing, because people in groups exert less effort on tasks when they believe others are also working."],answer:"B",rationales:{A:"Incorrect. Social facilitation improves performance on well-learned tasks but impairs complex ones — it is not the mechanism for failure to help in an emergency.",B:"Correct. Diffusion of responsibility is the key mechanism of the bystander effect: each person assumes someone else in the group will take action, so no one does.",C:"Incorrect. Deindividuation involves loss of personal identity in crowds, leading to antisocial behavior — not specifically the failure to help due to assumed others' responsibility.",D:"Incorrect. Social loafing is reduced individual effort on collaborative tasks — not the specific psychological mechanism explaining failure to help in emergencies."}},{skill:"1.A",lo:"4.4.A: Explain how the psychodynamic theory defines personality.",topic:"4.4: Psychodynamic and Humanistic Theories",stem:"After failing a difficult exam, a medical student spends the rest of the week volunteering extra hours at the hospital helping patients. According to Freud, channeling the frustration from academic failure into socially productive activity is an example of which defense mechanism?",choices:["Repression, because the anxiety from failing has been pushed out of conscious awareness.","Rationalization, because the student is generating a justification for their exam failure.","Displacement, because the student is redirecting negative emotions toward a substitute target.","Sublimation, because the student is redirecting an unacceptable impulse into a socially valued activity."],answer:"D",rationales:{A:"Incorrect. Repression involves unconsciously blocking anxiety-provoking material from consciousness — the student is actively channeling their response into action.",B:"Incorrect. Rationalization involves generating self-justifying explanations — the student is not explaining away the failure but redirecting energy.",C:'Incorrect. Displacement redirects emotion onto a different, often safer target (e.g., kicking the dog) — the hospital volunteering is socially valued, not a substitute "safer" target.',D:"Correct. Sublimation redirects socially unacceptable impulses or frustrations into socially constructive or valued activities — channeling exam frustration into helping patients is a classic example."}},{skill:"1.A",lo:"4.4.B: Explain how humanistic theories define personality.",topic:"4.4: Psychodynamic and Humanistic Theories",stem:"A therapist consistently validates her client's feelings and worth regardless of the client's choices or achievements, never withdrawing warmth or approval based on performance. Rogers would describe this therapeutic approach as providing:",choices:["Conditional positive regard, because the therapist is only withholding negative feedback.","Unconditional positive regard, because the therapist values the client completely without performance-based conditions.","Self-actualization, because the therapist is helping the client reach their highest potential.","The ideal self, because the therapist is modeling what the client should aspire to become."],answer:"B",rationales:{A:"Incorrect. Conditional positive regard involves giving approval only when conditions are met — the therapist here never conditions approval on achievement.",B:"Correct. Unconditional positive regard (Rogers) involves accepting and valuing a person completely regardless of their choices or outcomes — the core of person-centered therapy.",C:"Incorrect. Self-actualization is the goal of reaching one's full potential — a long-term outcome, not the specific in-session therapeutic technique described.",D:"Incorrect. The \"ideal self\" is the person one aspires to be — a concept in Rogers's self-theory, not a description of the therapist's approach."}},{skill:"1.A",lo:"4.5.B: Explain how trait theories define personality.",topic:"4.5: Social-Cognitive and Trait Theories",stem:"A researcher administers a personality inventory to 500 employees and finds that their conscientiousness scores predict their job performance ratings 18 months later better than any other personality factor. This finding is consistent with research on which model of personality?",choices:["Freud's psychodynamic model, because unconscious conflicts shape work performance.","Bandura's social-cognitive model, because self-efficacy predicts task performance.","The Big Five model, because conscientiousness is one of five empirically derived personality dimensions.","Maslow's hierarchy of needs, because esteem needs motivate workplace achievement."],answer:"C",rationales:{A:"Incorrect. Freud's model does not generate empirically measurable personality dimensions assessed by standardized inventories.",B:"Incorrect. Bandura's social-cognitive model focuses on reciprocal determinism and self-efficacy — not the Big Five trait taxonomy.",C:"Correct. The Big Five (OCEAN) model is the dominant scientific framework for personality research. Conscientiousness is consistently the best Big Five predictor of job performance.",D:"Incorrect. Maslow's hierarchy describes motivational needs, not personality traits — it is not a trait-based personality model."}},{skill:"1.A",lo:"4.6.A: Explain how motivation theories apply to behavior.",topic:"4.6: Motivation",stem:"A research study pays children a reward for every drawing they complete. Before the study, the children loved drawing. After several weeks of receiving rewards, the children stop drawing altogether once the rewards are removed. This finding best demonstrates:",choices:["The Yerkes-Dodson Law, because the reward increased arousal beyond the optimal level for creative tasks.","The overjustification effect, because external rewards shifted the children's perceived reason for drawing from internal to external.","Drive-reduction theory, because the rewards satisfied a creative drive that then no longer needed to be pursued.","Negative reinforcement, because removing rewards reduced the behavior they previously increased."],answer:"B",rationales:{A:"Incorrect. Yerkes-Dodson predicts performance at different arousal levels — not the elimination of intrinsic motivation through external reward.",B:"Correct. The overjustification effect occurs when external rewards for an intrinsically motivated behavior shift the individual's perceived cause from internal interest to external reward — and when rewards stop, so does the behavior.",C:"Incorrect. Drive-reduction theory explains motivation as reducing biological tensions (hunger, thirst) — not the social-cognitive process of perceived motivation.",D:"Incorrect. Negative reinforcement involves removing an aversive stimulus to increase behavior — the scenario involves removing a previously given reward, causing behavior to decrease."}},{skill:"1.A",lo:"4.7.A: Explain how theories of emotion apply to behavior.",topic:"4.7: Emotion",stem:"Elena is hiking alone when she notices a large bear nearby. Her heart races before she registers feeling afraid. She concludes she must be afraid because of her racing heart. Which theory of emotion does this sequence best support?",choices:["The Cannon-Bard theory, because the physiological response and emotional experience occur simultaneously.","The Two-Factor theory, because her racing heart requires a cognitive label to become a specific emotion.","The James-Lange theory, because her physiological response precedes and causes her emotional experience.","The facial-feedback hypothesis, because her facial expression of fear triggers the emotion."],answer:"C",rationales:{A:"Incorrect. Cannon-Bard proposes simultaneous physiological and emotional responses — here the physiology (heart racing) clearly precedes the emotion.",B:"Incorrect. The Two-Factor theory requires an ambiguous arousal state that is then labeled by context — Elena identifies her emotion based on internal physiology, not a cognitive search for context.",C:"Correct. James-Lange theory proposes that we experience emotions because we notice our physiological states: stimulus → physical arousal → emotion. Elena's sequence (heart races first, then she feels afraid) matches this.",D:"Incorrect. The facial-feedback hypothesis concerns how making facial expressions influences emotional experience — not physiological arousal preceding emotion."}},{skill:"1.A",lo:"4.7.A: Explain how culture influences emotional expression.",topic:"4.7: Emotion",stem:"Research on emotional expression shows that while people from different cultures show the same facial expressions when experiencing basic emotions in private, they often mask or modify these expressions in public social contexts. This cultural difference in public emotional expression is attributed to:",choices:["Display rules, which are cultural norms that govern when and how emotions should be expressed.","The Cannon-Bard theory, because emotions are expressed independently of physiological arousal.","Facial-feedback effects, because facial expressions differ by culture.","Deindividuation, because group membership changes how people express emotions."],answer:"A",rationales:{A:"Correct. Display rules are culturally learned norms about appropriate emotional expression in social contexts — Ekman's research showed these rules explain why cultural differences in public expression exist despite universal private expressions.",B:"Incorrect. Cannon-Bard theory describes the relationship between physiological arousal and emotional experience — not cross-cultural differences in expression.",C:"Incorrect. Facial-feedback theory concerns how our own facial expressions influence our emotional experience — not cross-cultural differences in social display.",D:"Incorrect. Deindividuation involves loss of identity in crowds and is not the explanation for culturally regulated emotional display."}},{skill:"2.B",lo:"4.2.B: Evaluate research design related to attitude change.",topic:"4.2: Attitude Formation and Change",stem:"A researcher randomly assigns participants to write a persuasive essay arguing against their own personally held views. The researcher later measures whether their attitudes have shifted toward the position in the essay. This study design is most directly testing:",choices:["The misinformation effect, because participants are being exposed to false information about their own views.","Cognitive dissonance theory, because performing a behavior inconsistent with one's attitude may cause attitude change.","Social learning theory, because participants are modeling the essay's persuasive techniques.","Stereotype threat, because participants may feel judged for holding their original views."],answer:"B",rationales:{A:"Incorrect. The misinformation effect concerns how post-event information distorts memories — not attitudes or essay writing.",B:"Correct. Cognitive dissonance theory predicts that behaving inconsistently with one's attitude creates discomfort, which may motivate attitude change. Writing a counter-attitudinal essay is a classic dissonance manipulation.",C:"Incorrect. Social learning theory involves observational learning — participants are not observing a model's behavior.",D:"Incorrect. Stereotype threat involves performance anxiety from negative group stereotypes — not attitude change from writing counter-attitudinal essays."}},{skill:"1.A",lo:"4.5.A: Explain reciprocal determinism.",topic:"4.5: Social-Cognitive and Trait Theories",stem:"According to Bandura's concept of reciprocal determinism, a student who believes she is bad at mathematics (personal factor) avoids math classes (behavior), which gives her fewer opportunities to improve (environmental consequence), which confirms her belief that she is bad at math (personal factor). This example illustrates:",choices:["How the id and superego interact to produce behavior through the ego's management.","How three factors — personal, behavioral, and environmental — mutually influence each other in a bidirectional cycle.","How operant conditioning shapes personality through repeated reinforcement and punishment.","How external locus of control leads to learned helplessness and avoidance of challenges."],answer:"B",rationales:{A:"Incorrect. This is a Freudian psychodynamic description — Bandura's reciprocal determinism is a social-cognitive concept, not a psychoanalytic one.",B:"Correct. Reciprocal determinism holds that personal factors (cognitions, beliefs), behavior, and environment all mutually influence each other in a continuous bidirectional loop — exactly as the math example illustrates.",C:"Incorrect. Operant conditioning explains behavior through consequence, not through the bidirectional interaction of person, behavior, and environment.",D:"Incorrect. External locus of control and learned helplessness are related but distinct concepts — the example is specifically illustrating Bandura's model of bidirectional causality."}},{skill:"2.D",lo:"4.3.A: Evaluate ethical issues in social psychology research.",topic:"4.3: Psychology of Social Situations",stem:'In a study on obedience, participants are led to believe they are administering increasingly severe electric shocks to another person. After the study, participants are informed that the shocks were not real and the "victim" was a confederate acting. This post-study procedure is an example of:',choices:["Informed consent, because the participants are finally being told all information about the study.","Debriefing, because the researchers are explaining the true purpose and clearing up the deception after participation.","Confidentiality, because the researchers are revealing that the victim's identity was kept private.","IRB approval, because the researchers are satisfying the ethical oversight requirement."],answer:"B",rationales:{A:"Incorrect. Informed consent happens before participation — this post-study revelation is debriefing.",B:"Correct. Debriefing involves explaining the actual purpose and any deceptions used to participants after a study is complete, which is exactly what is described.",C:"Incorrect. Confidentiality concerns keeping participant information private — not explaining experimental deception.",D:"Incorrect. IRB approval is obtained before the study begins, not implemented afterward."}},{skill:"3.A",lo:"4.1.A: Identify attribution theory concepts in data.",topic:"4.1: Attribution Theory",stem:"A survey asks employees to rate the causes of their most recent work success. The majority rate themselves (75%) as the primary reason for their success. When asked about a colleague's recent similar success, they rate external factors (the project, team, luck) as most important 68% of the time. This pattern best illustrates:",choices:["The fundamental attribution error, because employees underestimate situational factors for others' success.","The self-serving bias, because employees attribute their own successes internally and others' externally.","Actor-observer bias, because employees give different causal explanations for their own vs. others' behavior.","In-group bias, because employees favor themselves over their colleagues."],answer:"B",rationales:{A:"Incorrect. The FAE specifically involves overattributing others' behavior to internal (dispositional) causes and is usually applied to failures or problematic behavior.",B:"Correct. The self-serving bias involves attributing one's own successes to internal factors (ability, effort) while attributing others' successes to external factors (luck, situation).",C:"Incorrect. Actor-observer bias involves attributing one's own behavior to situation and others' to disposition — here success is attributed internally for self and externally for others, which is self-serving.",D:"Incorrect. In-group bias is preferential treatment of one's social group — while related, the described pattern specifically concerns causal attribution style."}}],u5:[{skill:"1.A",lo:"5.1.B: Explain how stress applies to behavior and mental processes.",topic:"5.1: Introduction to Health Psychology",stem:"A nurse working in an emergency department experiences extremely high workloads for six months. She initially coped well, but in recent weeks has been getting sick frequently, feels constantly exhausted, and her performance has declined. According to Selye's General Adaptation Syndrome, she is most likely in which phase?",choices:["Alarm reaction, because her body's initial fight-or-flight response has just been activated.","Resistance phase, because her body is actively coping by drawing on its remaining resources.","Exhaustion phase, because her resources are depleted and her immune system is suppressed.","Post-traumatic stress, because she has been exposed to a prolonged traumatic work environment."],answer:"C",rationales:{A:"Incorrect. The alarm phase is the initial acute stress response — the nurse has been stressed for six months, well beyond an initial alarm.",B:"Incorrect. The resistance phase is when the body actively copes with the stressor while resources are drawn down — she has passed this phase into depletion.",C:"Correct. The exhaustion phase occurs when prolonged stress has depleted the body's resources: immune suppression, fatigue, and declining performance are hallmarks.",D:"Incorrect. PTSD is a specific disorder triggered by a traumatic event, not the physiological depletion pattern described by GAS stages."}},{skill:"1.A",lo:"5.1.B: Explain coping strategies.",topic:"5.1: Introduction to Health Psychology",stem:"A student receives a failing grade on a major exam. She responds by creating a detailed study schedule, seeking a tutor, and revising her approach to the material. She is using which type of coping strategy?",choices:["Emotion-focused coping, because she is managing her feelings of disappointment and shame.","Problem-focused coping, because she is directly addressing the stressor by changing the situation.","Avoidance coping, because she is distracting herself from the failure with academic tasks.","Suppression, because she is not acknowledging her emotional response to the failure."],answer:"B",rationales:{A:"Incorrect. Emotion-focused coping manages the emotional response to stress — here the student is changing the cause of the stress, not managing feelings.",B:"Correct. Problem-focused coping directly targets the stressor: creating a study plan, seeking a tutor, and revising her approach are all aimed at solving the problem that caused the grade.",C:"Incorrect. Avoidance coping involves escaping or distracting from stress — the student is engaging directly with the stressor.",D:"Incorrect. Suppression involves not expressing or acknowledging emotion — the student is not described as suppressing feelings, but actively strategizing."}},{skill:"1.A",lo:"5.2.A: Explain how positive psychology approaches the study of behavior.",topic:"5.2: Positive Psychology",stem:"A research study finds that participants who wrote a letter describing specific things they were grateful for to someone who had helped them reported higher happiness and lower depression scores for weeks afterward compared to a control group. This study most directly supports which positive psychology concept?",choices:["Posttraumatic growth, because participants experienced a difficult event before the intervention.","Resilience, because participants recovered from negative emotional states through the exercise.","Gratitude, because acknowledging and expressing positive appreciation increased well-being.","Self-actualization, because participants fulfilled higher-order needs through the writing exercise."],answer:"C",rationales:{A:"Incorrect. Posttraumatic growth involves positive change following a traumatic struggle — no trauma is described in this study.",B:"Incorrect. Resilience is the ability to recover from adversity — the study measured increased well-being, not recovery from a specific hardship.",C:"Correct. Gratitude interventions (like writing gratitude letters) are a core positive psychology tool with documented effects on well-being. This study directly tests and supports gratitude's impact.",D:"Incorrect. Self-actualization is the fulfillment of one's potential — not the specific mechanism measured in a brief gratitude writing intervention."}},{skill:"1.A",lo:"5.3.A: Describe approaches to defining psychological disorders.",topic:"5.3: Explaining and Classifying Psychological Disorders",stem:"A clinician is determining whether a patient's behavior constitutes a psychological disorder. She considers whether the behavior causes the patient significant personal suffering, whether it impairs their ability to function at work and in relationships, and whether it is unusual relative to their cultural norms. These criteria correspond to which model?",choices:["The biomedical model, because biological markers determine the presence of a disorder.","The three D's of abnormality: Dysfunction, Distress, and Deviance from cultural norms.","The diathesis-stress model, because genetic vulnerability and environmental stress both are assessed.","The biopsychosocial model, because biological, psychological, and social factors are all considered."],answer:"B",rationales:{A:"Incorrect. The biomedical model focuses on biological/physical causes — the clinician here is assessing functioning, suffering, and cultural deviation, not biology.",B:"Correct. The three D's — Dysfunction (impairs functioning), Distress (causes suffering), and Deviance (unusual for the culture) — are the widely recognized criteria for defining psychological disorders.",C:"Incorrect. The diathesis-stress model explains how disorders develop (genetic vulnerability + stress) — not how they are defined/diagnosed.",D:"Incorrect. The biopsychosocial model explains etiology across multiple levels — the criteria described here are specifically the definitional criteria, not a causal model."}},{skill:"1.A",lo:"5.3.C: Explain how interaction models define psychological disorders.",topic:"5.3: Explaining and Classifying Psychological Disorders",stem:"Research shows that identical twins have a ~50% concordance rate for schizophrenia — meaning when one twin has it, the other has it only half the time, even though they share all their genes. This finding is best explained by:",choices:["The biopsychosocial model, suggesting that biological factors are sufficient on their own to cause schizophrenia.","The diathesis-stress model, suggesting that genetic vulnerability alone does not guarantee the disorder — environmental stressors are also needed.","The sociocultural perspective, suggesting that schizophrenia is caused entirely by cultural factors.","The behavioral perspective, suggesting that schizophrenia is a learned behavior pattern."],answer:"B",rationales:{A:"Incorrect. If biology alone were sufficient, identical twins (100% shared genes) would have 100% concordance — the 50% rate disproves a purely biological model.",B:"Correct. The diathesis-stress model holds that genetic vulnerability (diathesis) alone does not cause a disorder — environmental stressors must interact with the vulnerability. The ~50% concordance supports this interaction.",C:"Incorrect. The sociocultural perspective emphasizes social/cultural factors — this finding is specifically about the limits of genetic causation and the role of environment.",D:"Incorrect. The behavioral perspective explains disorders through conditioning — not applicable to explaining genetic concordance patterns in schizophrenia."}},{skill:"1.A",lo:"5.4.B: Describe symptoms and possible causes of schizophrenia.",topic:"5.4: Selection of Categories of Psychological Disorders",stem:"A patient with schizophrenia speaks in complete, grammatically correct sentences but shows no expression, rarely initiates conversations, and shows little interest in formerly enjoyed activities. These symptoms are best described as:",choices:["Positive symptoms, because they represent the presence of abnormal behaviors.","Negative symptoms, because they represent the absence or reduction of normal behaviors and functioning.","Mood symptoms, because they are similar to those seen in major depressive disorder.","Cognitive symptoms, because they represent impairments in thinking and executive function."],answer:"B",rationales:{A:"Incorrect. Positive symptoms are those that are present but should not be — like delusions, hallucinations, and disorganized speech. These are not present in this description.",B:"Correct. Negative symptoms are characterized by the absence or reduction of behaviors that should be present: flat affect (no expression), alogia (limited speech), avolition (reduced motivation). All three are described.",C:"Incorrect. While flat affect and avolition overlap with depression, the question asks what type of schizophrenia symptom these represent — they are classified as negative symptoms.",D:"Incorrect. Cognitive symptoms in schizophrenia include working memory and attention deficits — the described symptoms are specifically flat affect, alogia, and avolition."}},{skill:"1.A",lo:"5.4.D: Describe symptoms and causes of mood disorders.",topic:"5.4: Selection of Categories of Psychological Disorders",stem:"A patient presents with periods of extremely elevated mood, decreased need for sleep, racing thoughts, impulsive spending, and grandiose beliefs, alternating with periods of profound sadness, low energy, and loss of interest in all activities. This presentation is most consistent with:",choices:["Major Depressive Disorder, because episodes of depression are present.","Generalized Anxiety Disorder, because the elevated mood periods reflect excessive worry and agitation.","Bipolar I Disorder, because the patient experiences full manic episodes alternating with depressive episodes.","Schizophrenia, because grandiose beliefs may indicate delusions."],answer:"C",rationales:{A:"Incorrect. MDD involves only depressive episodes — the manic episodes (elevated mood, decreased sleep, grandiosity) distinguish this from MDD.",B:"Incorrect. GAD is characterized by persistent, excessive, unfocused worry — elevated mood, decreased sleep, and racing thoughts are not symptoms of GAD.",C:"Correct. Bipolar I Disorder is defined by full manic episodes (elevated mood, reduced sleep, grandiosity, impulsivity) alternating with depressive episodes — exactly as described.",D:"Incorrect. Grandiose beliefs can be delusional in schizophrenia, but the cyclical manic-depressive pattern, elevated mood, and decreased sleep are not characteristic of schizophrenia."}},{skill:"1.A",lo:"5.4.E: Describe symptoms and causes of anxiety disorders.",topic:"5.4: Selection of Categories of Psychological Disorders",stem:"A college student experiences sudden, unexpected episodes of intense terror accompanied by heart pounding, chest pain, shortness of breath, and a feeling she is going to die. She has been to the emergency room three times, but no physical cause has been found. Between episodes, she worries constantly about when the next one will strike. She most likely has:",choices:["Generalized Anxiety Disorder, because her worry is continuous and does not focus on a specific trigger.","Social Anxiety Disorder, because her episodes occur in public places where she fears scrutiny.","Panic Disorder, because she experiences unexpected panic attacks and persistent worry about future attacks.","PTSD, because her episodic distress was caused by repeated traumatic medical experiences."],answer:"C",rationales:{A:"Incorrect. GAD is characterized by chronic diffuse worry about many areas of life — not sudden discrete intense attacks.",B:"Incorrect. Social anxiety involves fear of social evaluation — her attacks are unexpected (not triggered by social situations) and she is not described as fearing others' judgment.",C:"Correct. Panic Disorder requires both recurrent unexpected panic attacks AND persistent worry about future attacks. Both criteria are clearly present.",D:"Incorrect. PTSD requires exposure to a specific traumatic event followed by flashbacks, avoidance, and hypervigilance — medical visits do not constitute the triggering trauma pattern for PTSD."}},{skill:"1.A",lo:"5.5.D: Describe techniques used in psychological therapies.",topic:"5.5: Treatment of Psychological Disorders",stem:"A therapist treating a client with a spider phobia begins by having the client imagine a spider far away, then progressively closer, at each step pairing the image with deep muscle relaxation. The ultimate goal is for the client to remain calm in the presence of a real spider. This therapy is called:",choices:["Cognitive restructuring, because the therapist is helping the client change thoughts about spiders.","Systematic desensitization, because the therapist is gradually exposing the client to the feared stimulus while pairing it with relaxation.","Token economy, because the therapist is using incremental steps and implicit rewards.","Free association, because the client is imagining spiders in an unconstrained, spontaneous way."],answer:"B",rationales:{A:"Incorrect. Cognitive restructuring targets distorted thought patterns through rational analysis — not gradual exposure paired with relaxation.",B:"Correct. Systematic desensitization (Wolpe) involves constructing a fear hierarchy, then pairing each level of exposure with relaxation (counterconditioning) to replace fear with calm.",C:"Incorrect. A token economy uses tokens as secondary reinforcers for desired behaviors in institutional settings — not relevant to phobia treatment.",D:"Incorrect. Free association is a psychoanalytic technique where clients say whatever comes to mind — not the structured, graduated exposure technique described."}},{skill:"1.A",lo:"5.5.D: Describe biological treatments for psychological disorders.",topic:"5.5: Treatment of Psychological Disorders",stem:"A patient with severe treatment-resistant depression has not responded to multiple antidepressant medications. Her psychiatrist recommends a biological treatment that involves passing electrical currents through her brain under general anesthesia to induce a brief therapeutic seizure. This treatment is:",choices:["Transcranial Magnetic Stimulation (TMS), because it uses magnetic fields to non-invasively stimulate the brain.","Electroconvulsive Therapy (ECT), because it involves a controlled electrical seizure and has high efficacy for severe depression.","Deep Brain Stimulation, because it uses implanted electrodes to deliver continuous electrical stimulation.","Lithium therapy, because it is the gold-standard mood stabilizer for treatment-resistant depression."],answer:"B",rationales:{A:"Incorrect. TMS uses magnetic fields, requires no anesthesia, and does not induce a seizure — it is a different procedure with fewer side effects.",B:"Correct. ECT involves controlled electrical currents passed through the brain under anesthesia, inducing a therapeutic seizure. It is one of the most effective treatments for severe, drug-resistant depression.",C:"Incorrect. Deep Brain Stimulation uses surgically implanted electrodes for continuous stimulation — not anesthesia-and-seizure-based ECT.",D:"Incorrect. Lithium is a mood-stabilizing drug used primarily for bipolar disorder — not a procedure involving electrical currents or seizures."}},{skill:"1.A",lo:"5.5.D: Describe psychological therapy techniques.",topic:"5.5: Treatment of Psychological Disorders",stem:'A therapist helps a client with depression identify automatic thoughts like "I am worthless" and "Nothing ever goes right for me," then challenges their accuracy and replaces them with more balanced thoughts. This therapeutic approach primarily reflects:',choices:["Psychoanalytic therapy, because the therapist is uncovering unconscious beliefs through interpretive work.","Humanistic therapy, because the therapist is providing unconditional positive regard to challenge negative self-views.","Cognitive therapy, because the therapist is directly targeting and restructuring maladaptive thought patterns.","Behavioral therapy, because the therapist is using reinforcement to modify dysfunctional behaviors."],answer:"C",rationales:{A:"Incorrect. Psychoanalytic therapy focuses on unconscious conflicts and uses free association and dream analysis — not the structured challenging of conscious automatic thoughts.",B:"Incorrect. Humanistic therapy (Rogers) focuses on providing acceptance and fostering growth — not systematically identifying and challenging specific automatic thoughts.",C:"Correct. Cognitive therapy (Beck) specifically targets the negative cognitive triad (negative views of self, world, future) by identifying and restructuring maladaptive automatic thoughts.",D:"Incorrect. Behavioral therapy focuses on changing behaviors through conditioning — not on identifying and modifying thought content."}},{skill:"2.A",lo:"5.1.A: Determine research type in health psychology.",topic:"5.1: Introduction to Health Psychology",stem:"Researchers find that individuals who report higher levels of chronic stress also show significantly more markers of inflammation in their blood. No variables were manipulated; both stress and inflammation were measured at the same time in the same participants. This study design is best classified as:",choices:["An experiment, because both stress and inflammation were measured objectively.","A correlational study, because two variables are being measured for their relationship without manipulation.","A naturalistic observation, because researchers measured stress in people's natural lives.","A longitudinal study, because the researchers tracked stress and inflammation over a long period."],answer:"B",rationales:{A:"Incorrect. An experiment requires manipulation of an IV and random assignment — neither is present here.",B:"Correct. A correlational study measures the relationship between two naturally occurring variables without manipulation. This study fits that description exactly.",C:"Incorrect. Naturalistic observation involves observing behavior in natural settings without controlling any variables — here participants gave blood samples and self-reports in a structured study context.",D:'Incorrect. A longitudinal study follows the same participants over time — both variables were measured at the same time point ("at the same time in the same participants").'}},{skill:"1.B",lo:"5.3.A: Explain how cultural context applies to diagnosing disorders.",topic:"5.3: Explaining and Classifying Psychological Disorders",stem:"In a particular cultural community, individuals sometimes experience episodes of intense crying, shouting, trembling, and dissociation in response to acute stress. Community members view this as a culturally recognized distress syndrome, not as pathological. A clinician unfamiliar with this culture diagnoses these episodes as panic disorder. This scenario illustrates the importance of:",choices:["Biomedical assessment, because physiological markers should determine diagnosis regardless of cultural context.","Cultural context in diagnosis, because what counts as a disorder depends on cultural norms and understanding.","The biopsychosocial model, because biological, psychological, and social factors all contribute to the episodes.","Reliability of diagnosis, because different clinicians may reach different conclusions about the same symptoms."],answer:"B",rationales:{A:"Incorrect. Biomedical markers alone cannot resolve cultural misattribution — the issue is specifically that the clinician lacks cultural context to interpret the behavior correctly.",B:"Correct. The DSM emphasizes that clinicians must consider cultural context when diagnosing — behaviors that are culturally sanctioned or recognized expressions of distress may not constitute a disorder.",C:"Incorrect. While the biopsychosocial model is relevant, the specific issue here is cultural interpretation of behavior, not the multifactorial explanation of etiology.",D:"Incorrect. Reliability refers to consistency across raters using the same criteria — the core issue here is validity and cultural sensitivity of the diagnostic framework."}},{skill:"2.D",lo:"5.5.E: Evaluate ethical issues in treatment.",topic:"5.5: Treatment of Psychological Disorders",stem:"A psychologist treating a client for severe depression learns that her client has made a detailed plan to harm a specific colleague and has obtained the means to do so. The psychologist must now decide whether to break confidentiality. Under professional ethics, which principle takes precedence?",choices:["Confidentiality must be strictly maintained because the therapeutic relationship depends on trust.","The duty to protect overrides confidentiality when there is a credible, specific threat of serious harm to an identifiable person.","The psychologist must obtain the client's consent before sharing any information with third parties.","The psychologist should simply refer the client to a psychiatrist and have no further involvement."],answer:"B",rationales:{A:"Incorrect. Confidentiality has legally and ethically recognized limits — it is not absolute when there is a specific threat to a third party.",B:"Correct. The Tarasoff duty-to-protect principle establishes that mental health professionals must take reasonable steps to protect identifiable potential victims when clients make credible, specific threats of serious harm.",C:"Incorrect. In emergency situations involving a credible threat of serious harm, obtaining consent is not required before disclosing to protect a third party.",D:"Incorrect. Simply referring and withdrawing does not fulfill the psychologist's professional duty to take reasonable protective action."}},{skill:"3.C",lo:"5.2.B: Interpret data related to positive psychology.",topic:"5.2: Positive Psychology",stem:"A table of data shows that individuals who report high social support also score high on measures of well-being and resilience, while those with low social support score low on both measures. The data also shows a significant correlation between social support and lower rates of depression diagnosis (r = –0.61). Which interpretation is most accurate?",choices:["Having high social support causes people to be happier and more resilient.","There is a strong negative relationship between social support and depression, suggesting they are inversely related.","Social support is the only factor that determines individual resilience and well-being.","The negative correlation means social support has a harmful relationship with well-being."],answer:"B",rationales:{A:"Incorrect. Correlational data cannot establish causation — it is possible that happier people attract more social support, or a third variable explains both.",B:"Correct. A correlation of r = –0.61 indicates a strong negative relationship: as social support increases, depression rates decrease. This is an accurate interpretation of a correlation coefficient.",C:"Incorrect. Social support is one factor among many — the data do not establish it as the sole determinant.",D:"Incorrect. A negative correlation (–0.61) means as one variable increases, the other decreases — it does not mean the relationship is harmful. This is a common misconception about negative correlations."}}]},EXAM_FRQS={u0:{title:"FRQ 1 — Article Analysis Question (AAQ)",points:8,intro:"Using the source provided, respond to all parts of the question.\n\nIntroduction\nResearchers examined the effects of classroom seating arrangement on academic engagement and quiz performance in high school students.\n\nParticipants\nParticipants were 147 students (73 male, 74 female) from six 10th-grade classrooms in two public high schools in the midwest United States. The average age was 15.6 years (SD = 0.71). All participants were from the same socioeconomic backgrounds (free and reduced lunch eligibility rates: 41% and 44% across the two schools).\n\nMethod\nResearchers randomly assigned classrooms to one of two seating conditions: traditional rows (facing forward) or collaborative clusters (groups of four desks). All other classroom factors (teacher, curriculum, lesson length) were held constant. Academic engagement was measured using a validated 12-item observation checklist completed by a trained observer unaware of the study hypothesis. Each student also completed a 15-item quiz at the end of each week over 8 weeks. The researchers obtained IRB approval, and all participants provided informed consent or informed assent.\n\nTable 1: Participant Demographics by Condition\nCondition | N | % Female | Mean Age\nRow seating | 74 | 49.3% | 15.5 yrs\nCluster seating | 73 | 50.7% | 15.7 yrs\n\nTable 2: Outcome Measures by Condition (Mean ± SD)\nMeasure | Row seating | Cluster seating\nWeekly quiz score (%) | 71.3 ± 9.4 | 78.1 ± 8.7\nAcademic engagement score | 62.4 ± 11.2 | 74.6 ± 9.8\n\nResults\nStudents in cluster seating scored significantly higher on weekly quizzes (p < .05) and showed significantly higher engagement scores (p < .01) than students in row seating. These differences held even after controlling for school, teacher, and student gender.",parts:[{label:"A",points:1,q:"Identify the research method used in this study.",rubric:'<strong>Earns 1 point:</strong> Accurately identifies the research method as an experiment (true experiment / experimental study).<br><em>Example:</em> "The researchers used an experimental method, because they manipulated the seating arrangement (IV) and randomly assigned classrooms to conditions."',helpOptions:[{text:"The researchers used a correlational study because they found a relationship between seating arrangement and quiz scores.",correct:!1,explain:"Incorrect — a correlational study only measures naturally occurring relationships without manipulation. The researchers actively manipulated seating and randomly assigned classrooms to conditions, which are the defining features of an experiment."},{text:"The researchers used an experiment because they randomly assigned classrooms to seating conditions (the IV) and measured quiz scores and engagement (the DVs).",correct:!0,explain:"Correct — a true experiment requires manipulation of an IV and random assignment to conditions. Both are present here. This allows causal conclusions about the effect of seating arrangement on performance."},{text:"The researchers used naturalistic observation because the students were observed in their real classrooms during normal school hours.",correct:!1,explain:"Incorrect — naturalistic observation means watching behavior without any manipulation. Here the researchers changed the seating arrangement, which is a manipulation. A real-world setting alone does not make a study naturalistic observation."},{text:"The researchers used a case study because they focused on a specific group of 147 students in two schools.",correct:!1,explain:"Incorrect — a case study is an in-depth investigation of a single individual or small group. This study compared two conditions across 147 participants with statistical analysis — that is an experiment, not a case study."}]},{label:"B",points:1,q:"State the operational definition of academic engagement as used in this study.",rubric:'<strong>Earns 1 point:</strong> States a specific measurable definition of academic engagement as it was measured in the study.<br><em>Example:</em> "Academic engagement was operationally defined as each student\'s score on a validated 12-item observation checklist completed by a trained observer." ',helpOptions:[{text:"Academic engagement was operationally defined as how much students participated in class discussions and raised their hands.",correct:!1,explain:"Incorrect — participation and hand-raising were not the measurement. The study used a specific validated checklist completed by an observer. Operational definitions must describe the actual tool used, not a plausible alternative."},{text:"Academic engagement was operationally defined as each student's score on a validated 12-item observation checklist completed by a trained observer who was unaware of the study hypothesis.",correct:!0,explain:"Correct — this captures every required element: the specific tool (12-item checklist), who completed it (trained observer), and the blinding procedure (unaware of hypothesis). All three are needed for a complete operational definition."},{text:"Academic engagement was operationally defined as each student's weekly quiz score out of 15 items.",correct:!1,explain:"Incorrect — quiz scores are a separate DV measuring academic performance, not engagement. The study measured both separately. Confusing the two earns zero points."},{text:"Academic engagement was operationally defined as the total time students spent paying attention during each lesson.",correct:!1,explain:"Incorrect — time-on-task was not described. The study used a 12-item standardized checklist. Always anchor your operational definition to the actual measurement tool described in the study."}]},{label:"C",points:1,q:"Describe the meaning of the standard deviation for the weekly quiz score in the row seating condition.",rubric:'<strong>Earns 1 point:</strong> Accurately describes what the SD of 9.4 means in context (spread/variability of scores around the mean of 71.3).<br><em>Example:</em> "A standard deviation of 9.4 indicates that most students in the row seating condition scored within about 9.4 percentage points above or below the mean score of 71.3%, showing the variability in that group\'s quiz performance."',helpOptions:[{text:"The SD of 9.4 means the row seating group scored 9.4 points lower than the cluster seating group on average.",correct:!1,explain:"Incorrect — that between-group difference is found by subtracting means (78.1 minus 71.3). Standard deviation describes spread within one group, not differences between groups."},{text:"The SD of 9.4 means most row seating students scored within approximately 9.4 percentage points of the group mean of 71.3%, indicating moderate variability within that group.",correct:!0,explain:"Correct — SD describes spread around the mean. About 68% of row seating students scored between roughly 61.9% and 80.7%. A larger SD indicates more variability; a smaller SD means scores cluster more tightly."},{text:"The SD of 9.4 means the row seating quiz results were not statistically significant.",correct:!1,explain:"Incorrect — standard deviation and statistical significance are entirely separate concepts. Significance is determined by p-values. The SD simply tells us how much scores in the row seating group varied around the mean of 71.3%."},{text:"The SD of 9.4 means 9.4% of students in the row seating group scored below passing on the quiz.",correct:!1,explain:"Incorrect — SD is not a percentage of students who failed. It is a measure of variability in the same units as the data. Knowing how many students scored below passing would require a specific cutoff score."}]},{label:"D",points:1,q:"Identify one ethical guideline described in the study. Describe one way the researchers applied it.",rubric:'<strong>Earns 1 point:</strong> Identifies one ethical guideline AND describes how it was applied.<br><em>Examples:</em> "The researchers obtained IRB approval, which means a professional board reviewed the study design to ensure it was ethical before it began." OR "Informed assent was obtained, meaning underage participants agreed to participate and knew they could stop at any time."',helpOptions:[{text:"Random assignment was the ethical guideline — it ensured every student had a fair chance to be in either condition.",correct:!1,explain:"Incorrect — random assignment is a methodological technique for controlling confounds, not an ethical guideline. Ethical guidelines address participant rights: informed consent, right to withdraw, IRB approval, confidentiality."},{text:"The researchers obtained IRB approval, meaning an independent review board examined the study design and confirmed it protected participants before data collection began.",correct:!0,explain:"Correct — IRB approval is a core APA ethical safeguard requiring independent review before the study begins. Identifying informed assent or consent also earns full credit here."},{text:"The researchers kept all quiz scores confidential, protecting students who performed poorly from embarrassment and harm.",correct:!1,explain:"Plausible but not explicitly described in the study. Earn this point by identifying a guideline clearly stated or implied in the passage — IRB approval and informed assent are both explicitly mentioned."},{text:"The researchers used a double-blind procedure so neither the students nor the teachers knew which seating condition they were in.",correct:!1,explain:"Incorrect — students and teachers clearly knew their seating condition. The observer was blind to the hypothesis, not the participants. Describing a procedure not present in the study earns no credit."}]},{label:"E",points:1,q:"Explain the extent to which the research findings may or may not be generalizable, using specific evidence from the study.",rubric:'<strong>Earns 1 point:</strong> Makes a claim about generalizability AND supports it with specific participant or methodological evidence.<br><em>Example:</em> "The findings may have limited generalizability because all participants were 10th-grade students from only two midwestern schools with similar SES backgrounds, leaving out students from other grade levels, regions, or socioeconomic contexts."',helpOptions:[{text:"The findings are fully generalizable because random assignment was used, which makes the results representative of all students.",correct:!1,explain:"Incorrect — random assignment improves internal validity (causal conclusions), not external validity (generalizability). Generalizability depends on who was sampled — 10th graders from two midwestern schools."},{text:"Generalizability is limited because all 147 participants were 10th-grade students from two midwestern schools with similar SES backgrounds, so results may not apply to other grade levels, regions, or socioeconomic groups.",correct:!0,explain:"Correct — earns the point with a specific claim (limited) backed by specific evidence from the study (grade level, two schools, region, SES similarity). Both the claim and specific evidence are required."},{text:"The findings cannot be generalized because 147 students is too small a sample to draw any valid conclusions.",correct:!1,explain:"Incorrect — 147 is a reasonable sample size. Generalizability is about who the participants were, not just how many. A large sample from the same narrow population would still have limited generalizability."},{text:"The findings are generalizable because both schools had similar demographics, showing the sample was well-balanced internally.",correct:!1,explain:"Incorrect — similar demographics across schools actually narrows generalizability. It means findings apply to that specific type of school, not a broader and more diverse population."}]},{label:"F",points:2,q:"Using at least one specific result from the study, explain whether the findings support or refute the idea that physical learning environment affects student academic performance.",rubric:'<strong>Earns 2 points:</strong> Uses at least one specific result AND accurately interprets it in relation to the claim about learning environment and academic performance.<br><em>Example:</em> "The findings support the idea that physical environment affects academic performance because students in cluster seating scored significantly higher on weekly quizzes (78.1%) than students in row seating (71.3%), and the difference was statistically significant (p &lt; .05), suggesting the seating arrangement — part of the physical environment — influenced quiz scores." <br><em>Note: 1 point for specific result, 1 point for accurate interpretation linking result to the claim.</em>',helpOptions:[{text:"The findings support the idea. Students in cluster seating scored significantly higher on quizzes (78.1% vs 71.3%, p < .05) and engagement (74.6 vs 62.4, p < .01). Since classrooms were randomly assigned, the seating arrangement — a physical feature of the environment — caused these improvements.",correct:!0,explain:"Correct — earns both points: specific statistics (78.1% vs 71.3%, p < .05; 74.6 vs 62.4, p < .01) and accurate causal interpretation linking the physical environment change to better outcomes via random assignment."},{text:"The findings support the idea because cluster seating students did better on everything, which shows changing the physical environment makes students smarter.",correct:!1,explain:"Incorrect — seating did not make students smarter. It affected quiz performance and engagement in this context. Also lacks specific statistics needed to earn full credit."},{text:"The findings do not support the idea because the study only used 10th graders, so we cannot claim physical environment matters for all students.",correct:!1,explain:"Incorrect — generalizability limits are separate from what the findings show. Within this sample, the significant difference between conditions does support the claim that physical environment affects performance."},{text:"The findings are inconclusive because students in both conditions scored below 80%, meaning neither arrangement produced truly excellent results.",correct:!1,explain:"Incorrect — the question asks whether environment affects performance, not whether performance was excellent. A statistically significant difference (p < .05) is meaningful evidence for the claim regardless of absolute score levels."}]}]},u1:{title:"FRQ 1 — Article Analysis Question (AAQ)",points:8,intro:"Using the source provided, respond to all parts of the question.\n\nIntroduction\nSleep is critical for brain health. This study investigated whether sleep duration during a learning phase predicted performance on a subsequent memory test in college-aged adults.\n\nParticipants\nA total of 112 undergraduate students (60 female, 52 male) at a university in the southeastern United States volunteered for the study. Average age: 20.1 years (SD = 1.3). Participants were enrolled in at least 12 credit hours and had no diagnosed sleep disorders.\n\nMethod\nParticipants wore wrist actigraphs (motion-sensing devices that record sleep-wake patterns) for 7 consecutive nights while also keeping a nightly sleep diary. Sleep duration was calculated by averaging daily total sleep time across the 7-night period. On day 8, all participants studied a list of 40 novel word pairs for 20 minutes. 24 hours later (day 9), they completed a cued-recall test: they were shown the first word of each pair and asked to supply the second. Researchers divided participants into three groups based on their 7-night average sleep: Short sleepers (<6 hrs), Adequate sleepers (6–8 hrs), and Long sleepers (>8 hrs).\n\nTable 1: Participant Groups\nGroup | N | Mean nightly sleep (hrs) | Mean age\nShort sleepers | 37 | 5.3 ± 0.6 | 20.3\nAdequate sleepers | 45 | 7.1 ± 0.5 | 20.0\nLong sleepers | 30 | 8.8 ± 0.4 | 20.1\n\nTable 2: Memory Test Scores (% correct)\nGroup | Mean score | SD\nShort sleepers | 61.4 | 11.8\nAdequate sleepers | 78.2 | 9.3\nLong sleepers | 75.9 | 10.1\n\nResults\nAdequate and Long sleepers performed significantly better than Short sleepers on the memory test (p < .01). There was no significant difference between Adequate and Long sleepers. These results held after controlling for GPA, age, and course load.",parts:[{label:"A",points:1,q:"Identify the research method used in this study.",rubric:'<strong>Earns 1 point:</strong> Identifies the method as correlational/non-experimental (or quasi-experimental, as sleep group was not randomly assigned).<br><em>Example:</em> "This is a correlational/quasi-experimental study because the researchers measured naturally occurring sleep duration rather than randomly assigning participants to sleep conditions."',helpOptions:[{text:"The researchers used an experiment because they divided students into three sleep groups and compared their memory scores.",correct:!1,explain:"Incorrect — the groups were formed based on naturally occurring sleep habits, not random assignment. Without random assignment and manipulation, this cannot be a true experiment."},{text:"The researchers used a correlational or quasi-experimental study because sleep duration was naturally occurring — students were not randomly assigned to sleep a specific number of hours.",correct:!0,explain:"Correct — no variable was manipulated. Students were grouped by their own sleep habits. This design shows associations between sleep and memory but cannot establish that sleep duration caused the differences."},{text:"The researchers used a longitudinal study because they tracked participants across 7 nights and 2 test days.",correct:!1,explain:"Partially relevant — data was collected over multiple days. However, the key feature is grouping participants by natural sleep and comparing memory outcomes. The primary classification is correlational or quasi-experimental."},{text:"The researchers used a case study because they closely monitored each student's sleep using wrist actigraph devices.",correct:!1,explain:"Incorrect — a case study focuses on one individual or a very small group in depth. This study examined 112 participants in three comparison groups with statistical analysis, which is a quasi-experimental design."}]},{label:"B",points:1,q:"State the operational definition of sleep duration as used in this study.",rubric:'<strong>Earns 1 point:</strong> States the measurable definition of sleep duration in this study.<br><em>Example:</em> "Sleep duration was operationally defined as the average total nightly sleep time (in hours) calculated from wrist actigraph data and sleep diary records over 7 consecutive nights."',helpOptions:[{text:"Sleep duration was operationally defined as how rested each participant reported feeling each morning on a subjective scale.",correct:!1,explain:"Incorrect — subjective feelings of restedness were not measured. The study used objective tools: wrist actigraphs and sleep diaries. Operational definitions must match the actual instruments described."},{text:"Sleep duration was operationally defined as the average total nightly sleep time in hours, calculated from wrist actigraph data and sleep diary entries over 7 consecutive nights.",correct:!0,explain:"Correct — captures the specific tool (actigraph + diary), the unit (hours), the method (average), and the time frame (7 nights). Every element of the operational definition is present."},{text:"Sleep duration was operationally defined as which group a participant was assigned to: short sleeper, adequate sleeper, or long sleeper.",correct:!1,explain:"Incorrect — those groups are derived categories. The operational definition describes how sleep was originally measured: actigraph and diary averages over 7 nights."},{text:"Sleep duration was operationally defined as the number of hours slept the night before the memory test on day 8.",correct:!1,explain:"Incorrect — sleep was averaged across 7 nights to capture habitual patterns, not just the night before the test. Basing the definition on one night misrepresents the study design."}]},{label:"C",points:1,q:"Describe the meaning of the standard deviation of memory test scores for the Short sleeper group.",rubric:"<strong>Earns 1 point:</strong> Accurately describes the SD of 11.8 in context of the Short sleeper group's memory scores.<br><em>Example:</em> \"The standard deviation of 11.8 indicates that Short sleepers' memory scores varied considerably around their group mean of 61.4 — about 68% of Short sleepers scored between 49.6 and 73.2.\"",helpOptions:[{text:"The SD of 11.8 means short sleepers scored 11.8 percentage points below adequate sleepers on the memory test.",correct:!1,explain:"Incorrect — that between-group difference is found by subtracting means (78.2 minus 61.4 = 16.8). Standard deviation describes variability within the short sleeper group only."},{text:"The SD of 11.8 means short sleepers' memory scores were spread around their group mean of 61.4%, with most scores falling within approximately 11.8 percentage points above or below that mean.",correct:!0,explain:"Correct — SD describes spread within a group. About 68% of short sleepers scored between roughly 49.6% and 73.2%. The larger SD compared to the other groups (9.3 and 10.1) indicates more variability in short sleepers' performance."},{text:"The SD of 11.8 means the short sleeper group's memory results were not statistically significant.",correct:!1,explain:"Incorrect — SD and statistical significance are completely separate statistics. The study did find significant between-group differences (p < .01). SD only tells us about variability within the short sleeper group."},{text:"The SD of 11.8 means 11.8 students in the short sleeper group scored below the group average.",correct:!1,explain:"Incorrect — SD is not a count of students. It is expressed in the same units as the data (percentage points) and describes how far individual scores vary from the group mean."}]},{label:"D",points:1,q:"Identify one ethical guideline described or implied in the study. Describe one way the researchers applied it.",rubric:'<strong>Earns 1 point:</strong> Identifies one ethical guideline AND describes application.<br><em>Example:</em> "Informed consent was applied because participants volunteered for the study, implying they were given information about the procedures and agreed before participating."',helpOptions:[{text:"The researchers used a control group, which is ethically required to protect participants from being harmed by unproven experimental conditions.",correct:!1,explain:"Incorrect — having a comparison group is a methodological choice, not an ethical guideline. Ethical guidelines address participant rights: informed consent, right to withdraw, IRB approval, confidentiality."},{text:"Informed consent was applied because participants volunteered for the study, indicating they agreed to participate after being given information about the procedures.",correct:!0,explain:"Correct — because participants volunteered, informed consent is implied. Name the guideline (informed consent) and describe its application (volunteering after being informed). This is a core APA ethical principle."},{text:"The researchers protected anonymity by using group labels (short, adequate, long sleeper) rather than publishing individual names or scores.",correct:!1,explain:"Plausible but not explicitly described. To earn this point, identify a guideline clearly stated or implied in the passage. Informed consent (volunteering) is the most directly supported by the study description."},{text:"The study was ethical because memory tests are harmless and did not put participants at any physical or psychological risk.",correct:!1,explain:"This reasoning does not identify a specific APA ethical guideline. Name a recognized principle — informed consent, IRB approval, right to withdraw, debriefing — and describe how it was applied."}]},{label:"E",points:1,q:"Explain the extent to which findings may or may not be generalizable, using specific evidence from the study.",rubric:'<strong>Earns 1 point:</strong> Makes a claim about generalizability with supporting evidence.<br><em>Example:</em> "Generalizability is limited because all participants were undergraduates at a single southeastern university, excluding adults who are not in higher education or are from different regions and demographic backgrounds."',helpOptions:[{text:"The findings are fully generalizable because sleep affects everyone's memory the same way regardless of age or background.",correct:!1,explain:"Incorrect — this is a general assumption rather than evidence-based reasoning. Use specific sample details (age, institution type, region) from the study to evaluate who the findings apply to."},{text:"Generalizability is limited because all participants were undergraduates at one southeastern U.S. university, so results may not apply to older adults, non-students, people with sleep disorders, or students from other regions.",correct:!0,explain:"Correct — earns the point with a specific claim (limited) and specific evidence from the study (undergrads, single university, southeastern U.S., exclusion of those with sleep disorders)."},{text:"Generalizability is strong because the study controlled for GPA, age, and course load, removing those as potential confounds.",correct:!1,explain:"Incorrect — controlling for variables improves internal validity (ruling out alternative explanations), not external validity. The sample still came from one specific type of institution."},{text:"The findings cannot be generalized because the study did not use random assignment to sleep conditions.",correct:!1,explain:"Incorrect — random assignment affects internal validity, not generalizability. Generalizability is about who was sampled, not how groups were formed."}]},{label:"F",points:2,q:"Using at least one specific result, explain whether the findings support or refute the idea that sleep quality after learning plays a more important role in memory than sleep duration before learning.",rubric:'<strong>Earns 2 points:</strong> Uses at least one specific result AND accurately interprets it in context.<br><em>Example:</em> "The findings partially address but do not fully test this idea. The study shows that adequate sleep duration BEFORE the memory test (during encoding) predicts better recall — Short sleepers scored significantly lower (61.4%) than Adequate sleepers (78.2%, p &lt; .01). However, because the study measured sleep before studying rather than sleep after studying, it cannot directly support or refute the claim about post-learning sleep quality versus duration."',helpOptions:[{text:"The findings support the claim. Short sleepers scored significantly lower (61.4% vs 78.2%, p < .01), proving that sleep quality after studying is the critical factor for memory.",correct:!1,explain:"Incorrect — the study measured sleep BEFORE studying (7 nights prior to the word-pair task), not after. Findings about pre-study sleep cannot directly address a claim about post-learning sleep quality vs. duration."},{text:"The findings cannot directly address this claim because sleep was measured before studying, not after. However, they show that adequate pre-study sleep duration predicts better recall: short sleepers scored significantly lower (61.4%) than adequate sleepers (78.2%, p < .01).",correct:!0,explain:"Correct — earns both points: a specific result with statistics (61.4% vs 78.2%, p < .01) and accurate interpretation that the design measured pre-study sleep, so it cannot test post-learning sleep quality vs. duration."},{text:"The findings refute the claim because long sleepers (75.9%) scored slightly lower than adequate sleepers (78.2%), proving more sleep is not always better.",correct:!1,explain:"Incorrect — that difference was not statistically significant. Drawing conclusions from non-significant differences is a critical AP error. This also does not address the post-learning sleep quality vs. duration claim."},{text:"The findings support the claim because students with adequate sleep performed best, which shows sleep quality is what determines memory consolidation.",correct:!1,explain:"Incorrect — the study measured duration (hours), not quality. Long sleepers did not significantly outperform adequate sleepers. This also lacks specific statistics and misidentifies what was measured."}]}]},u2:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,intro:'Using the three sources provided, develop and justify an argument about which study strategy is most effective for improving long-term memory retention in students.\n\nSource 1 — Study on Retrieval Practice\nIn a study of 120 university students (55 male, 65 female), researchers compared three study strategies for a chapter of biology content: re-reading, concept mapping, and practice testing (retrieval practice). After one initial study session, participants in each condition used their assigned strategy for 30 minutes. A retention test was administered one week later. The practice testing group scored significantly higher than re-reading and concept mapping groups (mean score: 78% vs. 61% and 67%; p < .01). Researchers concluded that actively retrieving information during study produces stronger long-term memory than passive re-exposure.\n\nSource 2 — Study on Distributed Practice (Spacing Effect)\nA meta-analysis of 47 studies (N = 3,200+ participants across K-12 and university settings) examined the effect of spacing study sessions across time versus massing study (cramming). Results showed that spaced practice produced, on average, 40% higher retention scores at one-month follow-up than massed practice. The advantage was consistent across academic subjects, age groups, and material types. The authors concluded that distributing study across multiple sessions over time is one of the most reliable and broadly applicable strategies for long-term retention.\n\nSource 3 — Study on Elaborative Interrogation\nResearchers assigned 85 high school students to study a list of science facts using one of two methods: simple rereading of each fact, or elaborative interrogation (answering "Why is this true?" for each fact). A test three days later showed that elaborative interrogation students scored significantly higher (mean: 74% vs. 58%). The researchers argued that prompting students to connect new information to prior knowledge through self-explanation promotes deeper semantic encoding, which enhances retrieval compared to shallow processing strategies like rereading.',parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about which study strategy best improves long-term memory retention, based on psychological science.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim relevant to the question.<br><em>Examples:</em> "Practice testing (retrieval practice) is the most effective study strategy for improving long-term memory retention." OR "Students should use spaced practice distributed over multiple sessions to maximize long-term memory retention." OR "Combining spaced retrieval practice is the most effective approach for long-term retention."',helpOptions:[{text:"No single strategy is best because students all have different learning styles and what works for one may not work for another.",correct:!1,explain:"Incorrect — the sources present specific comparative findings showing meaningful differences between strategies. Part A requires a specific, defensible claim, not a statement that avoids comparison. Commit to a strategy and defend it."},{text:"Retrieval practice (practice testing) is the most effective strategy for improving long-term memory retention because actively recalling information strengthens memory more than passive re-reading.",correct:!0,explain:"Correct — specific, defensible claim: names a strategy, states its advantage, and gives a reason. Source 1 provides direct evidence (78% vs 61% at one-week follow-up). Spaced practice or elaborative interrogation would also earn this point — commit to any one you can defend."},{text:"Spaced practice is the most effective strategy because distributing study sessions over time allows memory consolidation between sessions.",correct:!1,explain:"This is also a defensible claim that earns Part A — Source 2 provides strong su
