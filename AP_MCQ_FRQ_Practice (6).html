pport (40% higher retention at one-month follow-up). Either retrieval practice or spaced practice is a valid position. Pick one and defend it consistently through B and C."},{text:"Re-reading is actually the most effective strategy because students can review all the material methodically and it builds a solid foundation.",correct:!1,explain:"Incorrect — all three sources show re-reading produces the lowest retention scores. Source 1 found re-readers scored only 61% vs 78% for retrieval practice. This claim is directly contradicted by the evidence."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. Cite your source.",rubric:'<strong>Earns 1 point:</strong> Provides specific, accurate evidence from a correctly cited source.<br><em>Example:</em> "According to Source 1, students who used practice testing scored significantly higher on a one-week retention test (78%) compared to those who re-read (61%) or used concept maps (67%)."',helpOptions:[{text:"According to Source 1, students who used practice testing scored significantly higher (78%) than those who re-read (61%) or used concept maps (67%) on a retention test one week after the initial study session.",correct:!0,explain:"Correct — cites Source 1 with specific statistics (78%, 61%, 67%) and the time frame (one week). This directly supports a claim about retrieval practice being most effective for long-term retention."},{text:"The testing effect shows that students who test themselves consistently outperform students who just re-read their notes.",correct:!1,explain:"Incorrect — this is general background knowledge without citing a provided source. B(i) requires naming Source 1, 2, or 3 and providing a specific finding from it."},{text:"Source 2 found that spaced practice produced 40% higher retention than massed practice at a one-month follow-up across 47 studies.",correct:!1,explain:"Accurate evidence — but it supports spaced practice, not retrieval practice. If your Part A claim was retrieval practice, use Source 1 here to stay consistent with your argument. If your claim was spaced practice, this is your correct B(i) answer."},{text:"Source 3 showed that students who used elaborative interrogation scored 74% versus 58% for re-readers after three days.",correct:!1,explain:"Accurate — but this supports elaborative interrogation, not retrieval practice. Match your B(i) evidence to your specific Part A claim to keep your argument consistent."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets the evidence AND applies an appropriate psychological concept.<br><em>Example:</em> "This supports the claim because each time a student actively retrieves information, they strengthen the neural pathways associated with that knowledge — a process supported by the testing effect, which demonstrates that the act of retrieval itself enhances long-term storage beyond simply re-studying the material. This is also consistent with the levels of processing framework: active retrieval requires deeper semantic engagement with material than passive rereading."',helpOptions:[{text:"This supports the claim because testing yourself is more active than re-reading and therefore the brain has to work harder, which leads to better memory.",correct:!1,explain:"Too vague — 'works harder' is not a named psychological concept. Apply the testing effect or levels of processing framework to specify the mechanism by which retrieval practice strengthens memory."},{text:"This supports the claim because retrieval practice activates the testing effect — each retrieval attempt strengthens the memory trace more than passive re-exposure. This aligns with the levels of processing framework: retrieval requires deep semantic engagement, whereas re-reading is shallow, producing weaker long-term encoding.",correct:!0,explain:"Correct — earns both points: accurate interpretation (retrieval strengthens the memory trace) and application of the testing effect and levels of processing as explanatory concepts. Both are named AP Psychology concepts directly relevant to the mechanism."},{text:"This supports the claim because students in the retrieval practice condition were more motivated and studied harder than the re-reading group.",correct:!1,explain:"Incorrect — motivation and effort were not measured in Source 1. The mechanism is the retrieval act itself. Apply a named memory concept such as the testing effect or elaborative encoding."},{text:"This supports the claim because Source 1 had statistically significant results with a reasonable sample, making the finding reliable enough to act on.",correct:!1,explain:"Incorrect — reliability does not explain why retrieval practice strengthens memory. Apply the testing effect or levels of processing to explain the psychological mechanism behind the result."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of evidence from a DIFFERENT source than Part B(i). Cite the source.",rubric:'<strong>Earns 1 point:</strong> Provides different specific, accurate evidence from a different correctly cited source.<br><em>Example:</em> "A meta-analysis (Source 2) found that students who spaced their studying over time retained, on average, 40% more information at one-month follow-up than students who crammed."',helpOptions:[{text:"A meta-analysis (Source 2) found that spaced practice produced on average 40% higher retention at a one-month follow-up than massed practice, with consistent advantages across 47 studies, multiple age groups, and subject areas.",correct:!0,explain:"Correct — cites a different source (Source 2) with highly specific evidence (40% higher, 47 studies, one-month follow-up, consistency across subjects and ages). This strongly supports claims about long-term retention strategies."},{text:"Source 1 also showed that concept mapping (67%) beat re-reading (61%), providing more evidence for active strategies.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot cite it again here. Choose Source 2 or Source 3."},{text:"Research since Ebbinghaus has shown that distributed practice reduces forgetting over time better than massed practice.",correct:!1,explain:"Incorrect — this is background knowledge without citing a specific provided source. C(i) must name Source 1, 2, or 3 with a specific finding from that source."},{text:"According to Source 3, students who used elaborative interrogation scored 74% versus 58% for re-readers on a test three days later.",correct:!1,explain:"Accurate from Source 3 — but only use it if you did NOT cite Source 3 in B(i). C(i) must cite a different source from the one used in B(i)."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><em>Example:</em> "This supports the claim because distributing study sessions over time allows the hippocampus to consolidate memories during sleep intervals between sessions — each additional spaced session reactivates and strengthens the memory trace. This aligns with the spacing effect, one of the most robust findings in memory research, and connects to consolidation theory, which holds that memories are strengthened during sleep through hippocampal replay."',helpOptions:[{text:"This further confirms the claim because distributing study is more efficient than cramming, and efficient studying always produces better retention.",correct:!1,explain:"Incorrect — 'study efficiency' is not a named psychological concept explaining the memory mechanism. Apply the spacing effect and consolidation theory to explain WHY distributing practice produces better long-term retention."},{text:"This further supports the claim because spaced sessions allow sleep-based memory consolidation between them — the hippocampus replays and strengthens memory traces during sleep. This consolidation mechanism is distinct from the retrieval-based testing effect used in B(ii): it explains durability through biological rest rather than active recall.",correct:!0,explain:"Correct — earns both points: accurate interpretation (sleep consolidation between sessions strengthens memory traces) and application of consolidation theory as a concept distinct from the testing effect. Both are named AP Psychology concepts that work through different mechanisms."},{text:"This is the same point as B(ii) because both show that effortful studying leads to better memory.",correct:!1,explain:"Incorrect — C(ii) needs a different concept. Retrieval practice (testing effect) and spaced practice (consolidation during rest) work through different mechanisms and must be named separately to earn full credit."},{text:"This supports the claim because Source 2 was a meta-analysis of 47 studies, making it the most reliable source and therefore the most important evidence.",correct:!1,explain:"Incorrect — the credibility of the source is not a psychological concept explaining why spaced practice improves retention. Apply the spacing effect or consolidation theory as the mechanistic explanation."}]}]},u3:{title:"FRQ 1 — Article Analysis Question (AAQ)",points:8,intro:"Using the source provided, respond to all parts of the question.\n\nIntroduction\nParenting style has long been theorized to affect child development outcomes. This study examined whether authoritative parenting behaviors predicted adolescent academic achievement and social competence.\n\nParticipants\nParticipants were 215 parent-adolescent dyads recruited from four middle schools in a diverse urban school district. Adolescents ranged in age from 11 to 14 years (M = 12.4, SD = 0.92); 52% were female. The sample included participants from multiple racial and ethnic backgrounds: White/European American (38%), Black/African American (29%), Hispanic/Latino (21%), Asian/Asian American (8%), and other (4%).\n\nTable 1: Parent Education Levels\nHighest Level | Percentage\nGraduate or professional degree | 28%\nBachelor's degree | 33%\nSome college or associate's degree | 24%\nHigh school diploma or less | 15%\n\nMethod\nParents completed a 40-item Parenting Behavior Inventory measuring warmth, structure, and autonomy support — the three components of authoritative parenting. Adolescents self-reported their GPA and completed a validated 20-item Social Competence Scale measuring peer relationship quality and conflict resolution skills. All surveys were completed at school during a regular class period. IRB approval was obtained, and all parents signed consent forms and all adolescents signed assent forms.\n\nResults\nHigher levels of authoritative parenting were significantly associated with higher adolescent GPA (r = +0.48, p < .01) and higher social competence scores (r = +0.41, p < .01). These associations remained significant when controlling for family income, parent education, and adolescent age and gender.",parts:[{label:"A",points:1,q:"Identify the research method used in this study.",rubric:'<strong>Earns 1 point:</strong> Identifies the method as correlational or non-experimental.<br><em>Example:</em> "The researchers used a correlational study because they measured the naturally occurring relationship between parenting style and adolescent outcomes without manipulating any variable."',helpOptions:[{text:"The researchers used an experiment because they measured the effect of authoritative parenting on adolescent GPA and social competence.",correct:!1,explain:"Incorrect — measuring an effect does not make a study an experiment. The researchers observed parenting style as it naturally occurred without manipulating it. No random assignment = not an experiment."},{text:"The researchers used a correlational study because they measured the naturally occurring relationship between authoritative parenting behaviors and adolescent outcomes without manipulating any variable.",correct:!0,explain:"Correct — no variable was manipulated. Parenting style existed naturally before the study began. Measuring a naturally occurring relationship defines a correlational design."},{text:"The researchers used a longitudinal study because they tracked the same families across the entire academic school year.",correct:!1,explain:"Incorrect — there is no indication data was collected at multiple time points over time. The study appears to have collected all data at once (cross-sectional), not repeatedly over an extended period."},{text:"The researchers used a quasi-experiment because they compared families with high vs. low authoritative parenting scores, which is similar to having experimental conditions.",correct:!1,explain:"Incorrect — comparing naturally formed groups is not quasi-experimental. Parenting style was measured as it occurred; no grouping or assignment took place. This is a correlational study."}]},{label:"B",points:1,q:"State the operational definition of social competence as used in this study.",rubric:'<strong>Earns 1 point:</strong> States a specific measurable definition.<br><em>Example:</em> "Social competence was operationally defined as an adolescent\'s score on a validated 20-item Social Competence Scale measuring peer relationship quality and conflict resolution skills."',helpOptions:[{text:"Social competence was operationally defined as how well adolescents got along with their parents and siblings, based on parent reports.",correct:!1,explain:"Incorrect — family relationships were not the measure. The study assessed peer relationships and conflict resolution using a self-report scale completed by adolescents, not parents. Operational definitions must describe the actual tool."},{text:"Social competence was operationally defined as each adolescent's self-reported score on a validated 20-item Social Competence Scale measuring peer relationship quality and conflict resolution skills.",correct:!0,explain:"Correct — captures the instrument (20-item scale), what it measures (peer relationships and conflict resolution), who completed it (adolescent self-report), and that it was validated. All elements needed."},{text:"Social competence was operationally defined as whether the adolescent had been referred to a school counselor for behavioral or social difficulties.",correct:!1,explain:"Incorrect — counselor referrals were not described. Operational definitions must be grounded in what the study actually used to measure the variable."},{text:"Social competence was operationally defined as the correlation between parenting style and adolescent GPA.",correct:!1,explain:"Incorrect — a correlation is a statistical result, not a variable definition. Social competence and GPA are two separate outcome variables; neither is defined by their relationship with each other."}]},{label:"C",points:1,q:"Describe the meaning of the standard deviation of adolescent age in this study (SD = 0.92).",rubric:'<strong>Earns 1 point:</strong> Accurately describes the SD in context.<br><em>Example:</em> "A standard deviation of 0.92 means that most adolescents in the sample fell within approximately 0.92 years above or below the mean age of 12.4 years — the ages were relatively similar and clustered closely around the mean."',helpOptions:[{text:"The SD of 0.92 means the sample included adolescents ranging from 11 to 14 years old.",correct:!1,explain:"Incorrect — the range (11 to 14) is a separate statistic. The SD describes how tightly individual ages clustered around the mean of 12.4, not the full span between youngest and oldest."},{text:"The SD of 0.92 means most adolescents in the sample were within 0.92 years of the mean age of 12.4, indicating their ages were relatively homogeneous and tightly clustered.",correct:!0,explain:"Correct — a small SD indicates tight clustering. About 68% of adolescents were between 11.5 and 13.3 years old. This matters for generalizability — findings may not apply to significantly older or younger adolescents."},{text:"The SD of 0.92 means 92% of the adolescents were close to the average age of 12.4 years in the study.",correct:!1,explain:"Incorrect — SD is not a percentage of participants. It is a measure of spread in years. Saying 92% were close confuses standard deviation with a proportion or percentile."},{text:"The SD of 0.92 indicates that age was not a statistically significant predictor of outcomes in this study.",correct:!1,explain:"Incorrect — SD describes variability within a variable, not its predictive significance. Statistical significance requires a separate analysis. The researchers controlled for age, but that is different from what the SD indicates."}]},{label:"D",points:1,q:"Identify one ethical guideline from the study. Describe how the researchers applied it.",rubric:'<strong>Earns 1 point:</strong> Identifies one guideline AND describes application.<br><em>Example:</em> "Informed assent was obtained because all adolescent participants signed assent forms, indicating they agreed to participate and understood they could withdraw, even though parental consent was required for full ethical compliance."',helpOptions:[{text:"The researchers used a diverse sample with multiple racial and ethnic backgrounds, which is an ethical obligation to include all populations in psychological research.",correct:!1,explain:"Incorrect — sample diversity is a methodological and representational concern, not a named APA ethical guideline. Ethical guidelines address participant welfare: informed consent, IRB approval, right to withdraw."},{text:"Informed assent was applied — all adolescent participants signed assent forms indicating they understood the study and agreed to participate, while their parents also signed separate consent forms.",correct:!0,explain:"Correct — because participants were minors, both parental consent and adolescent assent are required. The study explicitly states both were obtained. This earns the point by naming the guideline and describing its application."},{text:"The researchers protected confidentiality by not publishing the names of individual schools or families in their report.",correct:!1,explain:"Plausible but not explicitly stated. Earn this point by identifying a guideline clearly described in the study itself — IRB approval and informed assent are both explicitly mentioned."},{text:"The study was ethical because self-report surveys are non-invasive and do not put participants at risk of harm.",correct:!1,explain:"This reasoning does not name a specific APA ethical principle. The AP exam requires identifying a recognized guideline (informed assent, IRB approval, right to withdraw, confidentiality) and describing how it was applied."}]},{label:"E",points:1,q:"Explain the extent to which the findings may or may not be generalizable, using specific evidence from the study.",rubric:'<strong>Earns 1 point:</strong> Makes a generalizability claim with specific supporting evidence.<br><em>Example:</em> "The findings may have greater generalizability than many studies because the sample included multiple racial and ethnic backgrounds from a diverse urban school district, though the urban setting may still limit applicability to rural or suburban communities."',helpOptions:[{text:"The findings are fully generalizable because the researchers controlled for family income, parent education, and gender, eliminating those as alternative explanations.",correct:!1,explain:"Incorrect — controlling for confounds strengthens internal validity, not external validity. The sample was still drawn from four urban middle schools, limiting applicability outside that context."},{text:"Generalizability is stronger than many studies because the sample included multiple racial and ethnic backgrounds; however, since all schools were in an urban district, findings may not apply to rural or suburban adolescents.",correct:!0,explain:"Correct — earns the point with a specific claim (stronger than most, but still limited) supported by specific evidence (diverse backgrounds = strength; urban-only schools = limitation)."},{text:"The findings are not generalizable because self-report surveys are always biased and produce unreliable data.",correct:!1,explain:"Incorrect — self-report has limitations but generalizability is about who was studied, not measurement method. Self-report bias is a validity concern, not an external validity concern."},{text:"The findings generalize well because 215 participants is a large enough sample to represent all U.S. adolescents.",correct:!1,explain:"Incorrect — sample size alone does not establish generalizability. These 215 students were from four urban middle schools in one district, which limits how broadly results apply regardless of sample size."}]},{label:"F",points:2,q:"Using at least one specific result, explain whether the findings support or refute the idea that environmental factors play a more significant role in adolescent development than biological ones.",rubric:'<strong>Earns 2 points:</strong> Uses at least one specific result AND accurately interprets it in context of the nature-nurture claim.<br><em>Example:</em> "The findings support the importance of environmental factors: the significant correlation between authoritative parenting (an environmental variable — r = +0.48, p &lt; .01) and academic achievement suggests that the quality of the caregiving environment influences development outcomes. However, the study cannot rule out the contribution of genetic factors — children\'s innate temperament might influence both parenting behavior and academic success simultaneously (third variable problem), so the findings do not allow us to conclude that environment is more important than biology."',helpOptions:[{text:"The findings prove environment matters more than biology because authoritative parenting (r = +0.48, p < .01) significantly predicted GPA, showing that how parents raise children determines outcomes.",correct:!1,explain:"Incorrect — a correlation cannot prove causal priority. The third-variable problem applies: a child's innate temperament could influence both parenting behavior and academic success, meaning biology could be an unmeasured confound."},{text:"The findings support the role of environment: authoritative parenting correlated significantly with higher GPA (r = +0.48, p < .01) and social competence (r = +0.41, p < .01). However, the correlational design cannot rule out biological factors like temperament as third variables.",correct:!0,explain:"Correct — earns both points: specific results with statistics and accurate interpretation that acknowledges environmental support while noting the correlational limitation (cannot rule out biological confounds)."},{text:"The findings refute the role of environment because r = +0.48 and r = +0.41 are only moderate correlations, so biology must account for most of the remaining variance.",correct:!1,explain:"Incorrect — moderate correlations are still meaningful evidence for environmental influence. The unexplained variance could come from many sources; calling it all 'biology' is an unsupported assumption."},{text:"The findings are not relevant to nature vs. nurture because the study only measured parenting and did not include any biological variables.",correct:!1,explain:"Incorrect — authoritative parenting is a clear environmental variable, making the study directly relevant to the nature-nurture debate. The absence of biological measures is a limitation, but does not make the findings irrelevant."}]}]},u4:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,intro:"Using the three sources provided, develop and justify an argument about whether situational or dispositional factors better explain why ordinary people engage in unethical behavior.\n\nSource 1 — Milgram Obedience Studies (1963)\nIn Milgram's classic research, 65% of participants administered what they believed were maximum-level (450-volt) electric shocks to a confederate learner when instructed to do so by an authority figure (the experimenter). The participants were ordinary adults from diverse occupations. Variations of the study showed that obedience dropped significantly (to ~20%) when the authority figure was physically absent, when the victim was in the same room, or when a second confederate refused to continue. Milgram concluded that the power of the immediate situation — authority, proximity, and social pressure — overwhelmed individual moral dispositions.\n\nSource 2 — Stanford Prison Experiment (Zimbardo, 1971)\nZimbardo randomly assigned 24 psychologically screened, healthy male college students to roles of either prisoner or guard in a simulated prison environment. Within 36 hours, guards began behaving cruelly toward prisoners — denying bathroom privileges, humiliating them, and inventing sadistic punishments. Prisoners showed signs of severe distress. The study was terminated after 6 days (planned for 14). Zimbardo concluded that the role and setting created a social situation so powerful that it fundamentally altered participants' behavior regardless of their personality. Note: The SPE has faced significant criticism — Zimbardo served as prison superintendent rather than neutral observer, some guards reported being coached to act tough, and many did not behave abusively. These limitations should be acknowledged when using this source as evidence.\n\nSource 3 — Study on Moral Disengagement and Organizational Wrongdoing\nA survey of 312 employees at a financial services company measured individual scores on moral disengagement (a cognitive tendency to justify unethical behavior — e.g., \"it's not really harming anyone\"), perceived organizational pressure to meet performance targets, and self-reported instances of boundary-pushing behavior in the past year. Results showed that both moral disengagement scores AND perceived organizational pressure significantly predicted unethical behavior. A regression analysis showed that situational pressure explained twice as much variance in unethical behavior as individual moral disengagement scores.",parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about whether situational or dispositional factors better explain why ordinary people engage in unethical behavior.",rubric:'<strong>Earns 1 point:</strong> Proposes a clear, defensible claim.<br><em>Examples:</em> "Situational factors better explain why ordinary people engage in unethical behavior." OR "Both situational and dispositional factors contribute to unethical behavior, but situational factors have the stronger demonstrated influence."',helpOptions:[{text:"No definitive answer is possible because situational and dispositional factors always interact, making it impossible to say one matters more than the other.",correct:!1,explain:"Incorrect — this avoids taking a position and earns no credit. Part A requires a specific, defensible claim. The sources show measurable comparative findings. Commit to a stance: situational, dispositional, or a nuanced claim that situational factors have the stronger demonstrated influence."},{text:"Situational factors better explain why ordinary people engage in unethical behavior, as demonstrated by a consistent pattern across multiple research contexts showing that environmental pressures override individual moral dispositions.",correct:!0,explain:"Correct — specific, defensible claim: names situational factors, asserts superiority, and gives a reason. Sources 1 (Milgram), 2 (Stanford Prison Experiment), and 3 (organizational pressure explaining twice the variance) all support this. A nuanced claim acknowledging both but prioritizing situational factors also earns credit."},{text:"Both situational and dispositional factors contribute equally to unethical behavior, as shown by Source 3 finding both variables were significant predictors.",correct:!1,explain:"This is a defensible position that earns Part A. However, note that Source 3 showed situational pressure explained TWICE as much variance as moral disengagement, making a pure 'equally' claim harder to defend in Parts B and C."},{text:"Dispositional factors best explain unethical behavior because people with strong moral character consistently resist situational pressure.",correct:!1,explain:"Defensible but difficult — Sources 1 and 2 show ordinary, psychologically healthy people committing harmful acts under situational pressure. Source 3 found situational pressure explained twice as much variance as moral disengagement. Make sure you can find evidence that clearly supports this claim before committing to it."}]},{label:"B(i)",points:1,q:"Support your claim with specific, relevant evidence from one of the sources. Cite your source.",rubric:'<strong>Earns 1 point:</strong> Specific, accurate, correctly cited evidence.<br><em>Example:</em> "According to Source 1, 65% of ordinary adults administered what they believed were lethal-level shocks when instructed by an authority figure, and this rate dropped dramatically when situational conditions changed — such as when the authority was absent."',helpOptions:[{text:"According to Source 1 (Milgram), 65% of ordinary adults administered what they believed were maximum-level electric shocks when instructed by an authority figure, and this rate dropped to approximately 20% when situational conditions changed — such as when the authority figure was absent.",correct:!0,explain:"Correct — cites Source 1 with specific statistics (65%, ~20%) and the key situational variable (authority figure presence). This directly supports the claim that situational factors drive behavior, showing how dramatically compliance changes when the situation changes."},{text:"Situational factors are powerful because Milgram's participants felt pressured and didn't know how to refuse authority.",correct:!1,explain:"Incorrect — this is an interpretation without citing specific evidence. B(i) requires naming Source 1, 2, or 3 and providing specific statistics or findings from it."},{text:"According to Source 2 (Stanford Prison Experiment), psychologically healthy college students assigned to guard roles began behaving cruelly within 36 hours, and the study had to be terminated after 6 days instead of the planned 14.",correct:!1,explain:"Accurate evidence from Source 2 — this would be a strong B(i) answer. Use this if you prefer Source 2 as your primary evidence. Save Source 1 or 3 for C(i)."},{text:"According to Source 3, a regression analysis showed that perceived organizational pressure explained twice as much variance in unethical behavior as individual moral disengagement scores.",correct:!1,explain:"Accurate and powerful evidence from Source 3 — particularly strong because it directly quantifies the comparison between situational and dispositional factors. Use this if Source 3 is your primary support. Save Source 1 or 2 for C(i)."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies an appropriate psychological concept.<br><em>Example:</em> "This supports the situational explanation because it demonstrates the power of obedience to authority — a situational force that overrides individual moral judgment. The fundamental attribution error helps explain why observers wrongly assume participants must have been cruel by disposition, when in fact the situation (an authoritative command structure, perceived legitimacy, incremental escalation) was primarily responsible for their behavior."',helpOptions:[{text:"This supports the claim because people in Milgram's study were weak-willed and easily manipulated, which shows that most people lack strong moral character.",correct:!1,explain:"Incorrect — attributing the behavior to personal weakness commits the fundamental attribution error. The point is that situational forces overrode normal moral judgment in ordinary, psychologically healthy people. Apply obedience to authority or the fundamental attribution error as the explanatory concept."},{text:"This supports the situational explanation because it demonstrates the power of obedience to authority — a situational force that overrides individual moral judgment. The fundamental attribution error helps explain why observers wrongly assume participants must have been cruel by disposition, when in fact the situation (authority, legitimacy, incremental escalation) was primarily responsible.",correct:!0,explain:"Correct — earns both points: accurate interpretation (situational authority overrides moral judgment) and application of obedience to authority and the fundamental attribution error as AP Psychology concepts. Both are directly relevant and named."},{text:"This supports the claim because the study showed people obey authority, which is a natural human instinct that evolved for survival in social groups.",correct:!1,explain:"Too vague — evolutionary reasoning is speculative here. Name the specific concept: obedience to authority. Explain how Milgram's findings demonstrate situational pressure overriding individual moral disposition."},{text:"This supports the claim because Milgram's study was a true experiment with manipulation and control, making the causal findings more reliable than observational evidence.",correct:!1,explain:"Incorrect — the design type is not a psychological concept explaining the mechanism. Apply obedience to authority or the fundamental attribution error to explain WHY the situational factors produced the behavior."}]},{label:"C(i)",points:1,q:"Support your claim using different specific, relevant evidence from a DIFFERENT source. Cite the source.",rubric:'<strong>Earns 1 point:</strong> Different specific, accurate, correctly cited evidence.<br><em>Example:</em> "Source 3 found that perceived organizational pressure explained twice as much variance in unethical workplace behavior as individual moral disengagement scores, even in a real-world setting."',helpOptions:[{text:"According to Source 3, a regression analysis of 312 employees showed that perceived organizational pressure explained twice as much variance in unethical workplace behavior as individual moral disengagement scores.",correct:!0,explain:"Correct — cites a different source with specific evidence (312 employees, regression analysis, twice as much variance). This powerfully quantifies the relative strength of situational vs. dispositional factors in a real-world context, extending the argument beyond classic lab studies."},{text:"Source 1 also showed that obedience dropped when the victim was in the same room, which is more evidence for situational factors.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source from the one used in B(i). If you cited Source 1 in B(i), you cannot use it again here. Choose Source 2 or Source 3."},{text:"We know from psychology that situations are powerful because people generally conform to social norms even when those norms are harmful.",correct:!1,explain:"Incorrect — this is general background knowledge without citing a specific provided source. C(i) requires naming Source 1, 2, or 3 and providing a specific finding from that source."},{text:"According to Source 2 (Stanford Prison Experiment), psychologically healthy college students randomly assigned to guard roles began behaving cruelly within 36 hours, and the study was terminated after 6 days instead of the planned 14.",correct:!1,explain:"Accurate from Source 2 — use this if you did NOT cite Source 2 in B(i). C(i) must come from a different source than B(i). If you used Source 1 in B(i), Source 2 or 3 both work here."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological concept than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><em>Example:</em> "This further supports the situational explanation because it shows that external pressures in the social environment (organizational pressure to perform) are stronger predictors of unethical behavior than individual psychological traits like moral disengagement. This is consistent with the concept of normative social influence — when organizations signal that a behavior is expected, employees conform to that social norm even if it conflicts with their personal values. The situation, not the person, is the primary driver."',helpOptions:[{text:"This further supports the claim because organizational pressure makes people feel they have no choice, and when people feel powerless they always do what they are told.",correct:!1,explain:"Too informal and overstated — 'always do what they are told' is not supported. Apply normative social influence or social role theory to explain the specific mechanism. Use a different concept from the one in B(ii)."},{text:"This further supports the situational explanation because organizational pressure represents normative social influence — when the workplace signals that boundary-pushing behavior meets performance norms, employees conform to those expectations even against their personal ethics. This is distinct from B(ii)'s obedience-to-authority concept: normative influence operates through perceived social norms rather than direct commands from an authority figure.",correct:!0,explain:"Correct — earns both points: accurate interpretation (organizational pressure = normative social influence shaping behavior) and application of normative social influence as a concept clearly distinct from obedience to authority used in B(ii). The distinction between the two concepts is explicitly named."},{text:"This makes the same point as B(ii) — both Milgram and Source 3 show that external pressure causes unethical behavior.",correct:!1,explain:"Incorrect — C(ii) requires a DIFFERENT concept. Obedience to authority (direct commands, B(ii)) and normative social influence (conforming to perceived social norms, C(ii)) are distinct mechanisms. Name the new one and explain why it is different."},{text:"This further supports the claim because the Source 3 survey used regression analysis, making the finding more statistically rigorous than the case-study methods in Sources 1 and 2.",correct:!1,explain:"Incorrect — statistical method comparisons are not a psychological concept explaining the mechanism. Apply normative social influence, deindividuation, or social role theory to explain WHY organizational situational pressure predicts unethical behavior."}]}]},u5:{title:"FRQ 1 — Article Analysis Question (AAQ)",points:8,intro:"Using the source provided, respond to all parts of the question.\n\nIntroduction\nPsychological disorders affect millions of people worldwide, yet many never receive treatment. This study examined whether cognitive-behavioral therapy (CBT) or pharmacotherapy (medication) was more effective in reducing symptoms of generalized anxiety disorder (GAD) over a 12-week period.\n\nParticipants\nParticipants were 148 adults (82 female, 66 male) diagnosed with GAD according to DSM-5 criteria. Average age was 34.7 years (SD = 9.8). Participants were recruited from outpatient mental health clinics in two metropolitan cities and were randomly assigned to one of two treatment conditions.\n\nTable 1: Treatment Groups\nCondition | N | Mean age | % Female\nCBT | 74 | 34.3 yrs | 55.4%\nPharmacotherapy | 74 | 35.1 yrs | 55.4%\n\nMethod\nThe CBT group received 12 weekly sessions with a trained CBT therapist focusing on identifying and restructuring maladaptive thought patterns and developing behavioral coping strategies. The pharmacotherapy group received a commonly prescribed SSRI (selective serotonin reuptake inhibitor) monitored by a psychiatrist. Participants were assessed at baseline and at week 12 using the GAD-7 (a validated 7-item self-report scale; higher scores = more severe anxiety symptoms, range 0–21). Participants were told only that they were in a treatment study but were not told about the other condition.\n\nTable 2: GAD-7 Scores\nGroup | Baseline M (SD) | Week 12 M (SD) | Change\nCBT | 16.2 (2.8) | 8.4 (3.1) | –7.8\nPharmacotherapy | 16.5 (2.6) | 9.7 (3.4) | –6.8\n\nResults\nBoth groups showed significant reductions in GAD-7 scores from baseline to week 12 (p < .001 for both). The CBT group showed a slightly larger reduction than the pharmacotherapy group, but this difference was not statistically significant (p = .18). The study was approved by an institutional review board, and all participants provided written informed consent.",parts:[{label:"A",points:1,q:"Identify the research method used in this study.",rubric:'<strong>Earns 1 point:</strong> Identifies the method as an experiment or true experiment.<br><em>Example:</em> "The researchers used an experimental method because they randomly assigned participants to treatment conditions and measured the effect of the independent variable (treatment type) on the dependent variable (GAD-7 scores)."',helpOptions:[{text:"The researchers used a correlational study because they measured the relationship between treatment type and changes in GAD-7 scores.",correct:!1,explain:"Incorrect — correlational studies measure naturally occurring relationships without manipulation. Here, treatment type was actively manipulated and participants were randomly assigned. Both features define a true experiment."},{text:"The researchers used a true experiment because participants were randomly assigned to CBT or pharmacotherapy, allowing treatment type (IV) to be manipulated and its effect on GAD-7 scores (DV) to be measured causally.",correct:!0,explain:"Correct — random assignment plus manipulation of an IV defines a true experiment. This allows causal conclusions: any difference in GAD-7 scores can be attributed to treatment type rather than pre-existing participant differences."},{text:"The researchers used a quasi-experiment because participants knew which treatment they were receiving, which could have biased their responses.",correct:!1,explain:"Incorrect — a quasi-experiment lacks random assignment. Random assignment was clearly used here. Knowing your treatment condition does not change the design classification."},{text:"The researchers used a clinical case study because they examined real patients with GAD in an outpatient setting over 12 weeks.",correct:!1,explain:"Incorrect — a case study examines one individual or small group in depth. This study had 148 participants, used random assignment, and compared two groups statistically — that is an experiment."}]},{label:"B",points:1,q:"State the operational definition of GAD symptom severity as used in this study.",rubric:'<strong>Earns 1 point:</strong> States a specific measurable definition.<br><em>Example:</em> "GAD symptom severity was operationally defined as a participant\'s score on the GAD-7, a validated 7-item self-report scale ranging from 0 to 21, with higher scores indicating more severe anxiety symptoms."',helpOptions:[{text:"GAD symptom severity was operationally defined as whether participants still met DSM-5 criteria for GAD after 12 weeks of treatment.",correct:!1,explain:"Incorrect — DSM-5 diagnosis was used to select participants before the study, not to measure severity during it. The operational definition of the DV must describe how severity was measured: the GAD-7 scale."},{text:"GAD symptom severity was operationally defined as each participant's score on the GAD-7, a validated 7-item self-report scale ranging from 0 to 21, with higher scores indicating greater anxiety severity.",correct:!0,explain:"Correct — captures the specific instrument (GAD-7), its format (7 items, 0-21 scale), who completed it (self-report), and what scores indicate. Every element of a complete operational definition is present."},{text:"GAD symptom severity was operationally defined as the change in GAD-7 score from baseline to week 12 (the improvement score).",correct:!1,explain:"Incorrect — the change score is a derived analytical outcome, not the operational definition of the variable. The operational definition describes how severity was measured at each time point: the raw GAD-7 score."},{text:"GAD symptom severity was operationally defined as clinicians' weekly ratings of each participant's anxiety level during therapy sessions.",correct:!1,explain:"Incorrect — no weekly clinician ratings are described. The study used participant self-report on the GAD-7 at baseline and week 12. Inventing a plausible-sounding measure not in the study earns no credit."}]},{label:"C",points:1,q:"Describe the meaning of the standard deviation of the baseline GAD-7 scores for the CBT group (SD = 2.8).",rubric:'<strong>Earns 1 point:</strong> Accurately describes the SD in context.<br><em>Example:</em> "A standard deviation of 2.8 for the CBT group\'s baseline scores means that the GAD-7 scores of participants in that group were relatively similar, with most scores falling within 2.8 points above or below the mean of 16.2."',helpOptions:[{text:"The SD of 2.8 means the CBT group scored 2.8 points lower on the GAD-7 than the pharmacotherapy group at baseline.",correct:!1,explain:"Incorrect — that comparison requires subtracting means (16.5 minus 16.2 = 0.3 points). Standard deviation describes spread within the CBT group only, not comparison between groups."},{text:"The SD of 2.8 means the CBT group's baseline GAD-7 scores were closely clustered around the mean of 16.2, with most participants scoring between approximately 13.4 and 19.0.",correct:!0,explain:"Correct — a small SD indicates tight clustering. About 68% of CBT participants had baseline scores within 2.8 points of 16.2. This suggests the two groups were well-matched in symptom severity before treatment began."},{text:"The SD of 2.8 means CBT reduced anxiety symptoms by 2.8 points over the 12 weeks of treatment.",correct:!1,explain:"Incorrect — treatment reduction is shown by the change score (16.2 minus 8.4 = 7.8 points). The SD of 2.8 was measured at baseline before any treatment and describes variability among participants, not improvement."},{text:"The SD of 2.8 means the CBT group's baseline results were statistically significant at the p < .05 level.",correct:!1,explain:"Incorrect — SD and statistical significance are completely separate statistics. SD describes variability around the mean; p-values indicate whether between-group differences are likely due to chance."}]},{label:"D",points:1,q:"Identify one ethical guideline from the study. Describe one way the researchers applied it.",rubric:'<strong>Earns 1 point:</strong> Identifies one guideline AND describes application.<br><em>Examples:</em> "Informed consent was applied because all participants provided written informed consent before the study began." OR "IRB approval was obtained, meaning a professional board reviewed the study design to ensure it was ethical and appropriate before researchers began collecting data."',helpOptions:[{text:"Random assignment was the ethical guideline because it ensured all participants had equal access to either treatment regardless of their background.",correct:!1,explain:"Incorrect — random assignment is a methodological technique for internal validity, not an ethical guideline. The AP exam expects a recognized APA principle (informed consent, IRB approval, right to withdraw) with its application described."},{text:"All participants provided written informed consent before the study began, meaning they were given information about the study procedures and voluntarily agreed to participate before any data was collected.",correct:!0,explain:"Correct — informed consent is a core APA ethical requirement. The study explicitly states written informed consent was obtained. Names the guideline and describes its application."},{text:"The researchers kept both treatment conditions confidential from participants so they could not compare their experiences and develop biased expectations.",correct:!1,explain:"Incorrect — participants were told they were in a treatment study; the two treatments (CBT vs. medication) are inherently distinguishable. Blinding participants is a methodological goal, not an ethical guideline."},{text:"The study was ethical because both CBT and SSRIs are established treatments, so no participant was denied access to a proven therapy.",correct:!1,explain:"Clinically relevant but not a named APA ethical principle. The AP exam requires identifying a specific guideline (informed consent, IRB approval, right to withdraw, confidentiality) and describing how it was applied in this study."}]},{label:"E",points:1,q:"Explain the extent to which the findings may or may not be generalizable, using specific evidence from the study.",rubric:'<strong>Earns 1 point:</strong> Makes a claim about generalizability with specific supporting evidence.<br><em>Example:</em> "The findings may have limited generalizability because all participants were adults with GAD recruited from outpatient mental health clinics in two metropolitan cities — the results may not apply to children, adolescents, or people with GAD in rural areas or those who do not seek clinical treatment."',helpOptions:[{text:"The findings generalize well because CBT and SSRIs are widely used treatments across many countries and cultures.",correct:!1,explain:"Incorrect — the global adoption of these treatments does not establish that this study's specific sample findings generalize broadly. Generalizability depends on who was in the sample: adults with GAD from two metropolitan outpatient clinics."},{text:"Generalizability is limited because all participants were adults with GAD recruited from outpatient clinics in two metropolitan cities — results may not apply to adolescents, people in rural areas, or those with GAD who never seek treatment.",correct:!0,explain:"Correct — earns the point with a specific claim (limited) backed by specific sample characteristics from the study (adults, GAD diagnosis, outpatient clinics, two metropolitan cities)."},{text:"Generalizability is strong because random assignment was used, making the sample representative of the broader GAD population.",correct:!1,explain:"Incorrect — random assignment creates equivalence between conditions, not between the sample and the broader population. Generalizability requires representative sampling from the target population."},{text:"The findings cannot be generalized because 12 weeks is not long enough to know whether the treatments work permanently.",correct:!1,explain:"Duration raises a valid long-term effectiveness question, but this addresses temporal limitations, not population generalizability. Use sample characteristics to evaluate who the findings apply to."}]},{label:"F",points:2,q:"Using at least one specific result, explain whether the findings support or refute the claim that psychological treatments are equally effective as biological treatments for anxiety disorders.",rubric:'<strong>Earns 2 points:</strong> Uses at least one specific result AND accurately interprets it.<br><em>Example:</em> "The findings support the claim that psychological and biological treatments are roughly equally effective: both CBT (–7.8 points on the GAD-7) and pharmacotherapy (–6.8 points) produced significant reductions in anxiety symptoms, and the difference between the two groups was not statistically significant (p = .18). This suggests that CBT and SSRI pharmacotherapy are comparably effective treatments for GAD over a 12-week period, consistent with research showing both approaches are evidence-based."',helpOptions:[{text:"The findings prove CBT is more effective because it produced a larger reduction (-7.8 vs -6.8), showing psychological treatment outperforms biological treatment.",correct:!1,explain:"Incorrect — that difference was NOT statistically significant (p = .18). Claiming superiority from a non-significant difference is a critical AP statistical error."},{text:"The findings support the claim: both CBT (-7.8 points) and pharmacotherapy (-6.8 points) produced significant symptom reductions (p < .001 for both), and the difference between them was not statistically significant (p = .18), indicating comparable effectiveness over 12 weeks.",correct:!0,explain:"Correct — earns both points: specific results (-7.8 vs -6.8, p < .001 for both, p = .18 for the comparison) and accurate interpretation (both effective, not significantly different = comparable)."},{text:"The findings refute the claim because neither treatment reduced GAD-7 scores to zero, meaning neither fully cured participants' anxiety.",correct:!1,explain:"Incorrect — the claim is about relative effectiveness between treatments, not whether either achieves a perfect cure. Both showed large, significant improvements from baseline."},{text:"The findings are inconclusive because there was no no-treatment control group to show whether participants might have improved on their own.",correct:!1,explain:"The absent control group is a genuine limitation, but the question asks whether findings support the equal-effectiveness claim — which they do. The non-significant comparison (p = .18) directly addresses that claim."}]}]}};let examCurrentUnit=null,examTab="mcq",examMCQQueue=[],examMCQIndex=0,examMCQScore=0,examMCQAnswered=!1,examInited=!1;function initExamView(){examInited||(renderExamHome(),examInited=!0)}function renderExamHome(){const e=document.getElem const EXAM_FRQS_EBQ={u0:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about which research method provides the strongest evidence for drawing conclusions about the causes of human behavior.",sources:[{label:"Source 1",title:"Study on Screen Time and Childhood Aggression",body:"In a 3-year longitudinal survey study, parents of 1,840 children (ages 4–10) reported their children's daily screen time and rated their aggressive behavior at three annual time points. Researchers found that higher reported screen time at Year 1 was positively associated with parent-reported aggression at Years 2 and 3 (r = +0.41 and r = +0.38). The researchers note that all measures were parent-reported and that family environment variables such as parenting stress and household conflict were not controlled for in the initial analyses. When controlling for parenting stress, the association between screen time and aggression was reduced but remained significant. The researchers concluded that screen time may be a risk factor for childhood aggression but acknowledged that directionality cannot be confirmed."},{label:"Source 2",title:"Randomized Controlled Trial on Mindfulness Training and Stress",body:"A randomized controlled trial assigned 240 college students to either an 8-week mindfulness-based stress reduction (MBSR) program or a waitlist control group. Students were randomly assigned to conditions. Trained instructors delivered the MBSR curriculum; waitlist participants received no intervention. Before and after the 8-week period, both groups completed a validated stress questionnaire. Students in the MBSR group showed significantly lower stress scores at post-test compared to waitlist participants. The researchers used random assignment, standardized delivery of the intervention, and blind raters to score questionnaires. They concluded that MBSR caused a reduction in perceived stress in this student sample."},{label:"Source 3",title:"Case Study of a Patient with Severe Anterograde Memory Impairment",body:"Neuropsychologists conducted an in-depth, decade-long investigation of a single patient, referred to as Patient K.C., who sustained bilateral hippocampal damage in a motorcycle accident at age 30. Prior to the accident, K.C. had no history of neurological or psychiatric conditions. Following the accident, K.C. showed a complete inability to form new episodic (autobiographical) memories while retaining intact language, spatial reasoning, and procedural skills. Researchers administered over 200 standardized assessments across 10 years. The findings contributed significantly to scientific understanding of the anatomical basis of episodic versus procedural memory systems. The researchers note that findings from a single unique case cannot be directly generalized to other individuals or groups."}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about which research method provides the strongest evidence for drawing causal conclusions about human behavior.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim relevant to the question. A claim that earns the point does not need to be supported yet — it just needs to be a clear, arguable position.<br><br><em>Examples that earn 1 point:</em><br>• "Experimental research provides the strongest evidence for causal conclusions about human behavior because it is the only method that can control for confounds."<br>• "True experiments are the most powerful method for establishing cause-and-effect relationships in psychology."<br>• "While case studies offer deep insight, experiments provide stronger causal evidence due to their use of controlled conditions and random assignment."',helpOptions:[{text:"Biological factors are more important because genes are fixed at birth and cannot be changed, so they have a stronger influence on outcomes than the environment.",correct:!1,explain:"This is a defensible claim that earns Part A. However, Source 1 shows heritability for depression is only 37-42%, meaning environment explains the majority of variance. Any specific arguable stance earns the point — just defend it with evidence."},{text:"Neither biology nor environment alone determines behavior — both interact, as demonstrated by gene-environment interaction research and the effects of childhood adversity on brain structure.",correct:!0,explain:"Correct — specific, defensible interactionist claim. Commits to a position (interaction model) and previews the evidence. This is the most defensible stance given all three sources."},{text:"Environmental factors are more important because behavior is learned and can be changed through experience, while genes cannot.",correct:!1,explain:"This is a defensible claim that earns Part A. Source 2's findings about environment reshaping brain structure can support it. Any specific arguable position earns the point — commit and defend."},{text:"The nature vs. nurture debate is impossible to resolve because biology and environment are completely inseparable from each other.",correct:!1,explain:"Incorrect — while interactions make separation difficult, the sources do quantify relative contributions and show specific gene-environment patterns. Saying the question is unresolvable avoids taking a position."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Provides specific, accurate evidence from a correctly cited source. Citing the source title alone or paraphrasing inaccurately does not earn the point.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 2, researchers who used random assignment and a controlled intervention found that MBSR caused a significant reduction in stress compared to the waitlist control group."<br>• "Source 1 found a positive association between screen time and aggression (r = +0.41), but because no variables were manipulated, the researchers acknowledged that directionality could not be confirmed."',helpOptions:[{text:"Source 3 found that the serotonin transporter gene variant only predicted significantly elevated anxiety in individuals who also experienced high-stress life events — carriers in low-stress environments showed no significant increase in anxiety.",correct:!0,explain:"Correct — cites Source 3 with specific evidence (gene variant + high stress = elevated anxiety; gene alone = no significant effect). Directly supports an interactionist claim."},{text:"Source 1 found that the heritability of depression is 37-42%, which proves genes are the primary driver of mental health outcomes.",correct:!1,explain:"Incorrect — 37-42% heritability means genes account for roughly that proportion of variance. It does NOT mean genes are primary. The remaining 58-63% is environmental. Misinterpreting heritability is a common AP exam error."},{text:"Source 2 proves that environment shapes the brain because adults who experienced childhood adversity had smaller hippocampal volumes.",correct:!1,explain:"Incorrect — 'proves' overstates what a correlational design can show. Source 2 found an association, not proof of causation. Use precise language: 'was significantly associated with.'"},{text:"Research on the nature-nurture debate shows that both genes and the environment contribute to psychological traits and outcomes.",correct:!1,explain:"Incorrect — general background knowledge without citing a specific source. B(i) requires naming Source 1, 2, or 3 and providing a specific finding from it."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets the evidence AND applies an appropriate psychological concept. 1 point for interpretation only, 2 points for interpretation + correct concept application.<br><br><em>Examples that earn 2 points:</em><br>• "This supports the claim that experiments provide the strongest causal evidence because random assignment — used in Source 2 — eliminates pre-existing differences between groups, meaning the observed change in stress can only be attributed to the MBSR program itself. This directly addresses the third-variable problem, which limits correlational designs like Source 1 where uncontrolled factors such as parenting stress could explain the screen time–aggression association."<br>• "The fact that Source 1 researchers acknowledge they cannot confirm directionality illustrates the directionality problem inherent in correlational research — we cannot tell whether screen time causes aggression, or whether aggressive children are given more screen time by frustrated parents. Only an experiment like Source 2 can resolve this."',helpOptions:[{text:"This supports the claim because we have always known that both nature and nurture matter, and this source confirms that.",correct:!1,explain:"Incorrect — too vague. Apply the diathesis-stress model or epigenetics to explain HOW the gene-environment interaction produces anxiety outcomes and why this supports an interactionist claim."},{text:"This supports the interactionist claim because it demonstrates the diathesis-stress model: the gene variant (diathesis — biological vulnerability) only produces elevated anxiety when combined with environmental stress. Neither factor alone was sufficient, showing biology and environment must interact rather than operating independently.",correct:!0,explain:"Correct — earns both points: accurate interpretation (gene only matters in high-stress environments) and application of the diathesis-stress model as the explanatory concept."},{text:"This supports the claim because serotonin is the 'feel-good' neurotransmitter, and people with the short allele variant produce less serotonin, making them more prone to anxiety.",correct:!1,explain:"Incorrect — this background knowledge about serotonin does not explain how the interaction finding supports an interactionist claim. Apply the diathesis-stress model to connect the evidence to the concept."},{text:"This supports the claim because a meta-analysis of 62 studies is more reliable than a single study, giving it more weight.",correct:!1,explain:"Incorrect — reliability speaks to the quality of the finding, not the mechanism. Apply a named concept explaining WHY genes and environment interact to produce psychological outcomes."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Provides different specific, accurate evidence from a different correctly cited source.<br><br><em>Examples that earn 1 point:</em><br>• "Source 3 describes a detailed case study of Patient K.C., who showed a complete inability to form new autobiographical memories after hippocampal damage, while retaining language and procedural skills intact across 10 years of assessment."<br>• "According to Source 1, when family environment variables like parenting stress were controlled for, the association between screen time and aggression was reduced, suggesting a possible confounding variable in the original findings."',helpOptions:[{text:"Source 2 found that adults who experienced significant childhood adversity showed significantly smaller hippocampal volumes and greater amygdala reactivity compared to matched controls who had not experienced adversity.",correct:!0,explain:"Correct — cites a different source with specific evidence (smaller hippocampus, greater amygdala reactivity, compared to matched controls). Shows environment physically alters brain structure, supporting an interactionist view."},{text:"Source 3 also shows that environmental stressors affect mental health outcomes when combined with genetic vulnerabilities.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 3 in B(i), you cannot cite it again."},{text:"Decades of adoption and twin studies have established that both genes and environment contribute significantly to psychological traits.",correct:!1,explain:"Incorrect — this is background knowledge without citing a provided source. C(i) must name Source 1, 2, or 3 with a specific finding."},{text:"Source 1 found that identical twins had only 37% concordance for depression while fraternal twins had 26%, showing genes do matter but do not determine outcomes alone.",correct:!1,explain:"Accurate evidence — but check whether you used Source 1 in B(i). If so, you must use a different source. C(i) must cite a different source than B(i)."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets the evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "While Source 3\'s case study of K.C. provided groundbreaking insight into hippocampal function, its findings cannot support causal conclusions because the \'injury\' was not experimentally manipulated — it was a naturally occurring event. This illustrates a fundamental limitation of case study methodology: without experimental control, we cannot rule out alternative explanations. An experiment can establish causation precisely because all conditions except the independent variable are held constant, making it the gold standard for causal inference in science."<br>• "The case study in Source 3 demonstrates the value of naturalistic observation of rare cases, but it also shows the limits of generalizability — as the researchers themselves note, findings from one unique patient cannot be extended to others. This highlights why sampling and control are important in psychological research: a well-designed experiment with representative random assignment allows conclusions to extend beyond a single participant."',helpOptions:[{text:"This further supports the claim because a difficult childhood is well-known to cause mental health problems later in life, showing environment matters.",correct:!1,explain:"Incorrect — too general, no named concept. Apply neuroplasticity or epigenetics to explain HOW childhood adversity physically altering brain structure supports an interactionist claim."},{text:"This further supports the interactionist claim because it demonstrates neuroplasticity — the brain's ability to be structurally changed by environmental experience. Adversity physically altering hippocampal volume shows that environment does not merely trigger pre-existing traits but actively reshapes biological substrate — a different mechanism from the diathesis-stress model in B(ii).",correct:!0,explain:"Correct — earns both points: accurate interpretation (adversity changes brain structure = environment reshapes biology) and application of neuroplasticity as a concept distinct from the diathesis-stress model."},{text:"This is the same point as B(ii) — both show that genes and environment together produce psychological outcomes.",correct:!1,explain:"Incorrect — C(ii) must use a different concept. Diathesis-stress (genetic vulnerability activated by stress) and neuroplasticity (environment physically restructuring the brain) are distinct mechanisms."},{text:"This supports the claim because Source 2 used MRI technology, which is the most scientifically advanced brain imaging method available.",correct:!1,explain:"Incorrect — technological sophistication does not explain the psychological mechanism. Apply neuroplasticity or epigenetics to explain why environmental adversity changing brain structure supports an interactionist view."}]}]},u1:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about whether biological or environmental factors play a greater role in shaping human behavior and mental processes.",sources:[{label:"Source 1",title:"Twin Study on Heritability of Major Depression",body:"A large population-based twin registry study compared rates of major depression in 4,200 identical (monozygotic) and fraternal (dizygotic) twin pairs. Researchers found that when one identical twin had major depression, the other had it approximately 37% of the time. For fraternal twins, the concordance rate was approximately 26%. Using quantitative genetic modeling, researchers estimated the heritability of major depression at approximately 37–42%, meaning genetic factors account for roughly 37–42% of the variance in depression risk. The remaining variance was attributed to individual-specific environmental experiences (such as personal trauma or life stressors) and shared family environment. Researchers noted that even with a genetic predisposition, environmental triggers are required for most people to develop the disorder."},{label:"Source 2",title:"Neuroimaging Study on Effects of Childhood Adversity on Brain Structure",body:"Researchers used MRI to compare brain structure in 95 adults who had experienced significant childhood adversity (abuse, neglect, or parental loss before age 12) with 95 adults matched for age, sex, and education who had not experienced childhood adversity. Adults with childhood adversity showed significantly smaller hippocampal volumes and greater amygdala reactivity to emotional stimuli compared to controls. The researchers noted that the hippocampus is highly sensitive to stress hormones (glucocorticoids) released during prolonged childhood stress. They concluded that early adverse environments physically alter brain structure in ways that persist into adulthood, suggesting that environmental experiences shape the biological substrate of behavior."},{label:"Source 3",title:"Review on Gene-Environment Interactions in Anxiety",body:"A review of 62 studies on the development of anxiety disorders found that having a variant of the serotonin transporter gene (5-HTTLPR short allele) was associated with increased anxiety sensitivity — but only in individuals who had also experienced high-stress life events. In low-stress environments, carriers of the short allele showed no significantly elevated anxiety compared to those without it. Conversely, individuals in high-stress environments without the genetic variant showed elevated anxiety but at lower rates than those with both the genetic variant and high stress. The reviewers concluded that neither genes nor environment alone determines anxiety outcomes — rather, the interaction between genetic predisposition and environmental conditions is the strongest predictor of anxiety disorder development."}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about whether biological or environmental factors play a greater role in shaping human behavior and mental processes.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim.<br><br><em>Examples that earn 1 point:</em><br>• "Biological and environmental factors interact to shape human behavior, and neither operates independently."<br>• "Environmental factors play an equally important role as biology in shaping behavior, as shown by research on brain plasticity and gene-environment interactions."<br>• "Both biological predisposition and environmental experience are necessary for most psychological outcomes, making an interactionist view most defensible."',helpOptions:[{text:"Punishment is the most effective behavior change strategy because immediate consequences stop unwanted behavior more quickly than any other method.",correct:!1,explain:"Incorrect — punishment has significant drawbacks (aggression, avoidance, fear) and produces only temporary suppression. This claim is not well-supported by the sources, which focus on reinforcement and observational learning."},{text:"Operant conditioning is the most effective approach for producing lasting behavior change because reinforcement directly and reliably strengthens target behaviors through their consequences.",correct:!0,explain:"Correct — specific, defensible claim: names an approach, states its advantage, and gives a reason. Sources 1 and 2 can both support this position."},{text:"Observational learning is more powerful than operant conditioning because humans naturally imitate others without needing direct reinforcement.",correct:!1,explain:"This is a defensible claim that earns Part A — Source 3 provides direct support. Any specific arguable position qualifies. Commit to a stance you can defend consistently with sources."},{text:"All three approaches are equally effective depending on the behavior being targeted and the individual being treated.",correct:!1,explain:"Incorrect — the sources present comparative findings showing differences in effectiveness and durability. Saying 'all are equal' avoids taking the position Part A requires."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Provides specific, accurate evidence from a correctly cited source.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 3, the serotonin transporter gene variant was only associated with elevated anxiety in individuals who also experienced high-stress life events — in low-stress environments, the genetic variant produced no significant increase in anxiety."<br>• "Source 1 found that identical twins showed only 37–42% heritability for major depression, meaning the majority of the variance in depression risk is explained by environmental rather than genetic factors."',helpOptions:[{text:"According to Source 1, a token economy program using operant reinforcement produced significant and targeted behavior change that generalized across diverse settings and types of prosocial behavior.",correct:!0,explain:"Correct — cites Source 1 with specific evidence (token economy, operant reinforcement, generalization across settings and behaviors). Directly supports a claim about operant conditioning's effectiveness."},{text:"Skinner's research proved that reinforcement reliably shapes behavior, which is why operant conditioning is used in schools, therapy, and animal training worldwide.",correct:!1,explain:"Incorrect — B(i) requires evidence from a provided source, not from background knowledge about Skinner's research. Cite Source 1, 2, or 3."},{text:"Source 3 showed that children who observed an adult model sharing a toy later spontaneously imitated that behavior in novel situations without receiving any direct reward.",correct:!1,explain:"Accurate evidence from Source 3 — but if your Part A claim was operant conditioning, using observational learning evidence in B(i) contradicts your own argument. Match evidence to your claim."},{text:"Behavior modification programs based on operant principles are among the most widely used and studied interventions in psychology.",correct:!1,explain:"Incorrect — general background knowledge without citing a specific provided source. B(i) requires a specific finding from Source 1, 2, or 3."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets the evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "This supports an interactionist view because it demonstrates the diathesis-stress model in action: the genetic variant (diathesis) creates a vulnerability, but environmental stress (stressor) is required to activate it. This means that biology sets the stage but environment determines whether a disorder develops — neither factor is sufficient alone."<br>• "The fact that even identical twins — who share 100% of their genetic material — show only a 37% concordance rate for depression (Source 1) demonstrates that genes alone cannot determine behavior. This is consistent with the nature-nurture interactionist perspective, which holds that genetic predispositions require environmental conditions to be expressed."',helpOptions:[{text:"This supports the claim because when students get tokens for good behavior, they want to keep earning tokens, which motivates continued good behavior.",correct:!1,explain:"Incorrect — 'wanting to earn tokens' is too informal. Apply the specific mechanism from operant conditioning: the contingent relationship between behavior and a reinforcing consequence strengthens that behavior according to the law of effect."},{text:"This supports the claim because the token economy used positive reinforcement — providing a desired reward contingent on specific prosocial behaviors — which strengthens the frequency and durability of those behaviors through the operant conditioning principle of reinforcement contingency.",correct:!0,explain:"Correct — earns both points: accurate interpretation (tokens as contingent reinforcers that strengthen behavior) and application of positive reinforcement and operant conditioning principles."},{text:"This supports the claim because the token economy created extrinsic motivation, and we know from psychology that external rewards produce reliable, lasting behavior change.",correct:!1,explain:"Incorrect — extrinsic motivation can actually undermine intrinsic motivation through the overjustification effect, and it does not always produce lasting change. Apply operant conditioning principles, not motivation theory."},{text:"This supports the claim because Source 1 had
