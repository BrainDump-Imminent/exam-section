 significant results and a large enough sample, making the token economy findings reliable.",correct:!1,explain:"Incorrect — reliability does not explain the psychological mechanism. Apply the reinforcement contingency of operant conditioning to explain WHY the token economy produced lasting behavior change."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Provides different specific, accurate evidence from a different correctly cited source.<br><br><em>Examples that earn 1 point:</em><br>• "Source 2 found that adults who experienced childhood adversity showed measurably smaller hippocampal volumes and greater amygdala reactivity compared to adults without such adversity — physical brain differences attributable to early environmental experience."<br>• "According to Source 1, researchers noted that even individuals with a genetic predisposition to depression typically require environmental triggers to develop the disorder."',helpOptions:[{text:"Source 2 found that pairing a behavior with a strongly positive or aversive emotional experience produced extremely durable behavioral change that persisted without continued reinforcement.",correct:!0,explain:"Correct — cites a different source with specific evidence (emotional conditioning, durable change, persistence without continued reinforcement). Adds a different mechanism supporting behavior change durability."},{text:"Source 1 also showed that the behavior changes from the token economy were maintained over time, confirming operant conditioning produces lasting results.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot use it again."},{text:"Bandura's Bobo Doll study proved that children imitate aggressive behavior they observe, establishing that observational learning is a powerful mechanism for behavior change.",correct:!1,explain:"Incorrect — background knowledge about Bandura does not substitute for citing a provided source. Source 3 covers observational learning — cite it as 'Source 3' with specific details from the passage."},{text:"Source 3 found that children who observed the model sharing later applied that sharing behavior spontaneously in novel, unprompted situations.",correct:!1,explain:"Accurate — but only use Source 3 here if you did NOT use it in B(i). C(i) must cite a different source."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 2\'s finding that childhood adversity physically alters hippocampal volume and amygdala reactivity supports the interactionist position by demonstrating neuroplasticity — the brain\'s ability to be structurally changed by experience. This shows that the environment does not merely trigger pre-existing biological traits; it actively reshapes the biological substrate of behavior itself. Environment and biology are therefore not independent forces competing against one another, but are continuously influencing each other."<br>• "This evidence illustrates epigenetics: adverse early environments can alter how genes are expressed — for example, by upregulating stress-hormone production — without changing the DNA sequence itself. The resulting changes in hippocampal structure show that environmental experience becomes biologically embedded, further supporting the view that biology and environment cannot be meaningfully separated."',helpOptions:[{text:"This further supports the claim because emotional experiences create vivid memories that stick with people for a long time even without further reinforcement.",correct:!1,explain:"Incorrect — too vague, no named concept. Apply classical conditioning to explain HOW pairing a behavior with an emotional response creates a durable conditioned association."},{text:"This further supports the claim because pairing a behavior with a strong emotional experience follows classical conditioning principles — the emotional response becomes conditioned to the behavior, creating a durable conditioned emotional response. This is a different mechanism from the contingent-consequence reinforcement in B(ii): it works through emotional association rather than reward contingency.",correct:!0,explain:"Correct — earns both points: accurate interpretation (emotional pairing creates durable conditioned response) and application of classical conditioning as a concept distinct from operant conditioning used in B(ii)."},{text:"This is the same point as B(ii) — both involve conditioning, just with different stimuli.",correct:!1,explain:"Incorrect — C(ii) requires a specifically different concept. Classical conditioning (emotional pairing) and operant conditioning (contingent reinforcement) differ in mechanism, antecedents, and the type of learning involved."},{text:"This supports the claim because Source 2 used a well-controlled experimental design, making its findings about emotional conditioning more valid than observational approaches.",correct:!1,explain:"Incorrect — methodological quality does not explain the mechanism. Apply classical conditioning principles to explain why emotional pairing produces durable behavior change."}]}]},u2:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about whether people can reliably trust their own judgments and perceptions when making important decisions.",sources:[{label:"Source 1",title:"Research on Eyewitness Identification Accuracy",body:'Researchers conducted a meta-analysis of 30 studies involving over 5,000 eyewitnesses to staged crimes or filmed events. Witnesses were asked to identify the perpetrator from a lineup immediately after the event, one week later, and one month later. Overall accuracy at immediate testing was 54%; at one week it dropped to 41%; and at one month it dropped to 28%. Accuracy was further reduced when witnesses were exposed to post-event questioning that included suggestive details — for example, when investigators described the perpetrator as "nervous" before witnesses described what they saw, witnesses were significantly more likely to describe the perpetrator as appearing nervous even if their original description contained no such detail. The researchers concluded that eyewitness testimony is subject to significant error and is highly malleable in the face of post-event information.'},{label:"Source 2",title:"Study on Overconfidence in Expert Prediction",body:'Researchers followed 284 professional forecasters — including economists, political analysts, and public health officials — over 20 years, tracking 28,000 specific predictions they made about economic trends, election outcomes, and policy effects. The forecasters were also asked to rate their confidence in each prediction on a scale of 0–100%. Results showed that predictions rated as "90% certain" were correct only 70% of the time. Predictions rated "100% certain" were wrong approximately 15% of the time. The gap between expressed confidence and actual accuracy was largest for the most famous and publicly prominent experts, who tended to make bold, sweeping predictions with high stated certainty. The researchers concluded that expertise does not eliminate overconfidence and that confident-sounding judgments are systematically more certain than the evidence warrants.'},{label:"Source 3",title:"Experiment on the Influence of Framing on Financial Decisions",body:'Researchers presented 180 undergraduate students with a hypothetical financial decision. Half were told: "This investment has a 70% chance of yielding a gain." The other half were told: "This investment has a 30% chance of resulting in a loss." Both descriptions were mathematically identical. Students presented with the gain frame rated the investment as significantly more attractive and were more likely to choose it (68%) than students presented with the loss frame (41%). In a follow-up condition, participants who were shown both framings simultaneously still showed a preference for the gain-framed version when asked which sounded better, despite acknowledging the descriptions were equivalent. The researchers concluded that how information is presented — not just what information is presented — systematically biases judgment and decision-making.'}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about whether people can reliably trust their own judgments and perceptions when making important decisions.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim.<br><br><em>Examples that earn 1 point:</em><br>• "People cannot fully trust their own judgments and perceptions when making important decisions, because psychological biases systematically distort how we perceive and interpret information."<br>• "Human judgment is unreliable because perception is constructed rather than recorded — it is vulnerable to suggestion, framing effects, and overconfidence."<br>• "While people often feel confident in their perceptions and judgments, research demonstrates consistent and predictable errors that should make us cautious about trusting unexamined intuitions."',helpOptions:[{text:"People engage in unethical behavior because of poor moral character that was not developed properly during childhood and adolescence.",correct:!1,explain:"Incorrect — childhood development history is different from immediate situational forces. The sources focus on situational context (authority, role, organizational pressure) and present-moment traits, not developmental history."},{text:"Situational factors better explain why ordinary people engage in unethical behavior, as demonstrated by evidence that most people comply with authority and role demands even when doing so violates their personal values.",correct:!0,explain:"Correct — specific, defensible claim: names a factor, states comparative advantage, and previews the evidence. The most defensible position given Sources 1 and 2."},{text:"Both situational and dispositional factors are equally important and interact to produce unethical behavior.",correct:!1,explain:"While nuanced, this avoids a directional comparative position. A stronger claim: 'Both matter, but situational factors have stronger demonstrated influence.' Part A requires committing to a specific comparative stance."},{text:"Unethical behavior is best explained by moral disengagement — a cognitive tendency to rationalize harmful actions — which is a stable personality trait.",correct:!1,explain:"This is a defensible dispositional claim that earns Part A. However, Source 3 found situational pressure explained twice as much variance as moral disengagement. Any specific arguable claim qualifies — commit and support it."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 1, eyewitness accuracy declined to just 28% after one month, and witnesses were significantly more likely to incorporate false details from post-event questioning into their accounts."<br>• "Source 2 found that expert forecasters who rated their predictions as \'100% certain\' were wrong approximately 15% of the time, demonstrating that confidence does not equal accuracy."',helpOptions:[{text:"According to Source 1, 65% of ordinary adults delivered what they believed were lethal-level shocks when instructed by an authority figure, and compliance dropped dramatically to approximately 20% when situational conditions changed — for instance, when the authority was physically absent.",correct:!0,explain:"Correct — cites Source 1 with specific statistics (65%, ~20%) and shows how varying the situation changed behavior — the strongest evidence for situational influence."},{text:"Milgram proved that humans are fundamentally obedient and will follow authority no matter what the consequences.",correct:!1,explain:"Incorrect — general background knowledge rather than evidence from a provided source. Also 'no matter what' is contradicted by the data: compliance dropped to ~20% when conditions changed."},{text:"Source 2 found that healthy students randomly assigned to the guard role became psychologically cruel within 36 hours, despite being screened as psychologically normal.",correct:!1,explain:"Strong evidence — but if you cited Source 1 in Part A, use Source 1 here for consistency. Save Source 2 for C(i)."},{text:"Source 3 showed that moral disengagement predicted unethical behavior, with higher scorers engaging in more boundary-pushing at work.",correct:!1,explain:"This supports dispositional factors, which undermines a situational claim. Use this as C(i) evidence to show that even the strongest dispositional predictor explains less variance than situational pressure."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:"<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a correct psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• \"This supports the claim because it demonstrates the misinformation effect — post-event information from investigators altered witnesses' original perceptions. This happens because memory is constructive, not reproductive: each time a memory is retrieved, it can be modified by new information, which means eyewitnesses' subjective certainty about what they saw does not reflect the accuracy of what they actually encoded.\"<br>• \"Source 2's finding that professionals' predictions rated '100% certain' were wrong 15% of the time directly illustrates overconfidence — the well-documented tendency to believe we know more than we do. Because people cannot detect the gap between their felt certainty and actual accuracy, they are particularly vulnerable to this bias when stakes are highest.\"",helpOptions:[{text:"This supports the claim because when someone tells you to do something, you feel obligated to obey, especially if they seem to have authority.",correct:!1,explain:"Incorrect — informally restates the behavior without applying a named psychological concept. Apply obedience to authority and the fundamental attribution error to explain the mechanism."},{text:"This supports the situational claim because it demonstrates obedience to authority — a legitimate authority figure created situational pressure strong enough to override participants' personal moral dispositions. The fundamental attribution error explains why observers wrongly assume participants must have been cruel by nature, when the situation was the primary driver.",correct:!0,explain:"Correct — earns both points: accurate interpretation (authority overrode moral dispositions) and application of obedience to authority plus the fundamental attribution error."},{text:"This supports the claim because Milgram's participants were stressed and frightened, impairing their judgment and causing them to make poor ethical decisions.",correct:!1,explain:"Incorrect — stress and fear were not the key variables. The mechanism is obedience to a legitimate authority figure, not impaired judgment due to stress. Apply the named concept."},{text:"This proves that situations are always more powerful than individual character, which means people cannot be held responsible for behavior that occurs under authority.",correct:!1,explain:"Incorrect — this is a normative/legal argument rather than a psychological concept. Apply obedience to authority as the mechanism, not a philosophical claim about moral responsibility."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:"<strong>Earns 1 point:</strong> Different specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• \"Source 3 found that students rated an investment as significantly more attractive when it was described as having a '70% chance of gain' than an identical option described as having a '30% chance of loss' — even when participants acknowledged both descriptions were equivalent.\"<br>• \"According to Source 2, the most prominent and publicly visible expert forecasters showed the largest gaps between their expressed confidence and actual accuracy.\"",helpOptions:[{text:"Source 3 found that in a survey of 312 financial services employees, perceived organizational pressure to meet performance targets explained twice as much variance in unethical behavior as individual moral disengagement scores.",correct:!0,explain:"Correct — cites a different source with specific evidence (312 employees, organizational pressure = twice the variance of moral disengagement). Powerfully supports situational over dispositional factors in a real-world setting."},{text:"Source 1 also showed that varying the situational conditions in the Milgram experiment drastically changed compliance rates, further demonstrating situational power.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot use it again."},{text:"Zimbardo's Stanford Prison Experiment is one of the most dramatic demonstrations of how social roles override individual character.",correct:!1,explain:"Incorrect — cite Source 2 by name with specific details from the passage, not from general background knowledge about Zimbardo."},{text:"According to Source 2, college students randomly assigned to play prison guards became psychologically cruel within 36 hours, and the study was terminated after 6 days rather than the planned 14.",correct:!1,explain:"Strong evidence from Source 2 — but only cite it here if you did NOT use Source 2 in B(i). C(i) must cite a different source."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 3 illustrates the framing effect — a form of decision-making bias in which the same objective information produces different judgments depending on how it is presented. This is significant because even when participants in the follow-up condition were shown both frames simultaneously and acknowledged they were identical, they still preferred the gain-framed version. This demonstrates that the bias operates even under conditions of full awareness, meaning that \'knowing better\' is not sufficient to override it. This challenges the assumption that rational reflection can fully correct for perceptual and judgmental errors."<br>• "The framing effect shown in Source 3 is explained by heuristic thinking — specifically, loss aversion: people weight potential losses more heavily than equivalent gains, making loss-framed options feel more threatening even when logically equivalent. This systematic error in judgment is a product of the mental shortcuts we use for quick decision-making, and it occurs even in educated participants who can recognize the logical equivalence — confirming that human judgment is not as reliable as it subjectively feels."',helpOptions:[{text:"This further supports the claim because companies have enormous influence over employees, and when employers expect unethical behavior, employees go along with it.",correct:!1,explain:"Incorrect — too general, no named concept. Apply normative social influence to explain specifically why perceived organizational expectations override individual ethical standards."},{text:"This further supports the situational claim because it demonstrates normative social influence — when an organization signals that meeting performance targets is expected, employees conform to that norm even at the cost of ethical behavior. This mechanism operates through perceived group expectations rather than direct commands, making it distinct from obedience to explicit authority in B(ii).",correct:!0,explain:"Correct — earns both points: accurate interpretation (organizational norms create conformity pressure overriding ethics) and application of normative social influence as a concept distinct from obedience to authority."},{text:"This further supports the same point from B(ii) — in both cases an authority, whether an experimenter or an employer, pressured people to act unethically.",correct:!1,explain:"Incorrect — C(ii) must use a different concept. Obedience to direct explicit authority (B(ii)) and conforming to perceived group norms without direct commands (C(ii)) are distinct social psychological mechanisms."},{text:"This supports the claim because regression analysis is a sophisticated statistical technique that produces more accurate results than simpler comparisons.",correct:!1,explain:"Incorrect — statistical sophistication is not a psychological concept explaining the mechanism. Apply normative social influence or social role theory."}]}]},u3:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about which type of learning — direct experience, observation, or reward-based conditioning — is most powerful in shaping human behavior.",sources:[{label:"Source 1",title:"Study on Observational Learning and Prosocial Behavior in Children",body:"Researchers recruited 156 children (ages 5–8) and randomly assigned them to one of three conditions: (1) watched a short video of a peer sharing toys with another child and being praised, (2) received a small sticker reward for sharing during a practice session, or (3) watched a neutral video unrelated to sharing. One week later, all children were placed in a room with toys and another child and observed for 10 minutes. Children in the observational learning condition shared toys for an average of 4.1 minutes, significantly more than children in the direct reward condition (2.8 minutes) or the control condition (1.9 minutes). Children in the observational condition also shared in more varied and spontaneous ways. The researchers concluded that observing a rewarded model produced more durable and generalized prosocial behavior than direct reward experience."},{label:"Source 2",title:"Meta-Analysis on the Effectiveness of Behavior Modification Programs",body:"A meta-analysis synthesized findings from 85 studies using operant conditioning-based behavior modification programs in clinical, educational, and organizational settings. Programs included token economies, differential reinforcement schedules, and shaping procedures. Across all settings, behavior modification produced large average improvements in targeted behaviors: classroom compliance in children with ADHD, self-injurious behavior reduction in clinical populations, and productivity improvements in workplace settings. The researchers noted that improvements were most robust when reinforcement was delivered immediately and consistently, and that behaviors often needed re-intervention when the reinforcement program ended. The meta-analysis concluded that operant conditioning is an exceptionally powerful and reliable tool for producing specific behavioral change in controlled settings."},{label:"Source 3",title:"Longitudinal Study on Trauma and Conditioned Fear Responses",body:"A 10-year follow-up study tracked 312 adults who had experienced a significant traumatic event (vehicle accidents, natural disasters, or violent crime) in their mid-20s. All participants completed validated fear and avoidance assessments at 1 month, 1 year, 5 years, and 10 years post-trauma. Approximately 31% developed persistent conditioned fear responses (avoidance of trauma-related stimuli, heightened startle responses, intrusive associations) that remained measurable at the 10-year follow-up. Among the remaining 69%, conditioned responses diminished significantly over time without formal intervention. The researchers concluded that a single traumatic event can produce lasting conditioned fear responses in a substantial minority of individuals, demonstrating that powerful emotional learning from direct experience can be remarkably resistant to natural extinction."}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about which type of learning is most powerful in shaping human behavior.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim.<br><br><em>Examples that earn 1 point:</em><br>• "Observational learning is the most powerful mechanism for shaping durable and generalized human behavior."<br>• "Direct experiential learning — particularly through powerful emotional events — produces the most lasting behavioral changes because they are resistant to change over time."<br>• "All three types of learning are situationally powerful, but operant conditioning is the most reliable and broadly applicable tool for producing targeted behavior change across diverse settings."',helpOptions:[{text:"Medication is more effective than psychotherapy because it directly corrects the neurochemical imbalances that cause mental disorders.",correct:!1,explain:"This is a defensible claim that earns Part A. However, the sources suggest comparable or lower durability for medication. Any specific arguable position qualifies. Commit to a stance you can defend with evidence."},{text:"Psychological treatments like CBT are more effective and durable than biological treatments because they change underlying thought patterns rather than temporarily suppressing symptoms.",correct:!0,explain:"Correct — specific, defensible claim: names a treatment type, states its advantage (more durable, addresses underlying causes), and gives a reason. Sources supporting durability of CBT can defend this."},{text:"Both CBT and medication are equally effective, so the best approach is to prescribe them together for maximum impact.",correct:!1,explain:"Incorrect — combined treatment is a different question from which individual approach provides stronger benefits. Part A requires a comparative position on which approach is more effective or durable on its own."},{text:"Neither CBT nor medication works long-term because anxiety is a chronic condition that cannot be fully treated.",correct:!1,explain:"Incorrect — all sources provide evidence that both CBT and pharmacotherapy produce significant improvements. A claim that neither works is directly contradicted by the evidence provided."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 1, children who observed a peer being rewarded for sharing showed significantly more sharing behavior one week later (4.1 minutes) than children who were directly rewarded for sharing (2.8 minutes), and their behavior was more varied and spontaneous."<br>• "Source 3 found that 31% of trauma survivors showed persistent conditioned fear responses still measurable 10 years after a single traumatic event — suggesting that direct emotional experience can produce extremely durable behavioral change."',helpOptions:[{text:"According to Source 1, both treatments reduced symptoms significantly, but at a 12-month follow-up, the CBT group maintained significantly lower anxiety levels while the pharmacotherapy group showed greater symptom return — demonstrating greater long-term durability for psychological treatment.",correct:!0,explain:"Correct — cites Source 1 with specific evidence (12-month follow-up, greater relapse in pharmacotherapy group). Directly supports a claim about CBT's superior durability over biological treatment."},{text:"CBT teaches patients to identify negative automatic thoughts, challenge cognitive distortions, and develop behavioral coping strategies that they carry with them after therapy ends.",correct:!1,explain:"Incorrect — this describes how CBT works in general, not a specific finding from a provided source. B(i) requires citing Source 1, 2, or 3 and providing a specific result."},{text:"Research consistently shows that CBT has lower relapse rates than medication because the skills learned in therapy can be used for life.",correct:!1,explain:"Incorrect — general background knowledge without a source citation. B(i) requires a specific finding from a provided source."},{text:"According to Source 3, patients who completed CBT reported that their therapy skills were still actively helping them manage anxiety two years after treatment ended.",correct:!1,explain:"Verify what Source 3 actually says — if this is not explicitly stated, you are misrepresenting the source. Only base your answers on findings explicitly described in the provided sources."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a correct psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "This supports the claim that observational learning is the most powerful mechanism for shaping generalized behavior because it demonstrates vicarious reinforcement: by watching a peer receive praise for sharing, children learned both that sharing leads to positive outcomes AND what sharing looks like across different contexts. Unlike direct reward — which only tells the learner \'do this specific thing,\' observational learning provides a fuller model of behavior that can be flexibly applied in novel situations."<br>• "Source 3 demonstrates that a single powerful direct experience can produce behavioral change more durable than many weeks of scheduled conditioning, because the high arousal during trauma enhances one-trial learning — the same biological preparedness that allows taste aversions to form in a single pairing. This suggests that the emotional intensity of direct experience, not the frequency of reinforcement, is what makes certain learned behaviors so resistant to change."',helpOptions:[{text:"This supports the claim because CBT gives patients tools they can use on their own, while medication just temporarily masks the symptoms.",correct:!1,explain:"Partially correct direction but too informal. Apply cognitive restructuring or the cognitive triad to explain precisely what CBT changes cognitively and why that produces lasting protection against relapse."},{text:"This supports the claim because CBT targets the cognitive triad — negative automatic thoughts about self, world, and future — and restructuring these core schemas provides lasting protection against relapse. Unlike medication, which reduces anxiety neurochemically without changing underlying thought patterns, CBT creates durable cognitive change.",correct:!0,explain:"Correct — earns both points: accurate interpretation (CBT changes cognitive schemas, providing lasting protection) and application of the cognitive triad and cognitive restructuring as explanatory concepts."},{text:"This supports the claim because CBT requires more work and effort from patients, and when people invest more effort in something they value it more and maintain gains better.",correct:!1,explain:"Incorrect — patient effort is not a named psychological concept explaining why CBT produces durable neurological or cognitive change. Apply cognitive restructuring as the mechanism."},{text:"This supports the claim because CBT is endorsed by major psychological associations as the evidence-based treatment of choice for anxiety and depression.",correct:!1,explain:"Incorrect — professional endorsements speak to credibility, not to the mechanism by which CBT produces durable change. Apply a named concept from cognitive-behavioral psychology."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Different specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "Source 2\'s meta-analysis across 85 studies found that behavior modification programs using operant conditioning produced large, consistent behavioral improvements across clinical, educational, and organizational settings."<br>• "According to Source 2, behavior modification improvements were most robust when reinforcement was immediate and consistent, but behaviors often needed re-intervention once reinforcement programs ended."',helpOptions:[{text:"Source 2 found that participants who received exposure therapy showed a 40% reduction in anxiety symptoms compared to 27% in the medication group, and this gap widened further at a 6-month follow-up — demonstrating greater durability for psychological treatment.",correct:!0,explain:"Correct — cites a different source with specific evidence (40% vs 27% reduction, 6-month widening gap). Strongly supports the claim about psychological treatment's superior durability."},{text:"Source 1 also showed a larger reduction for CBT (-7.8) than pharmacotherapy (-6.8), providing more evidence that psychological treatment is superior.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot use it again."},{text:"Many therapists and researchers have documented that CBT skills outlast medication effects because cognitive changes are more permanent than neurochemical adjustments.",correct:!1,explain:"Incorrect — general background knowledge without a source citation. C(i) must name one of the three provided sources."},{text:"Source 3 found that when CBT and medication were combined, patients had significantly better outcomes than either treatment alone.",correct:!1,explain:"Verify what Source 3 actually says. If combined treatment outcomes are not described, do not cite it. Only base answers on what the sources explicitly state."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 2 shows that operant conditioning is highly effective for producing targeted behavioral change in controlled settings — but the finding that behaviors often required re-intervention when reinforcement ended reveals a critical limitation: behaviors maintained by extrinsic reinforcement may not become self-sustaining. This is consistent with the overjustification effect: when external rewards are removed, people may lose motivation to continue behavior that was previously intrinsically valued. In contrast, observational learning (Source 1) produced behavior that was spontaneous and varied, suggesting the children had internalized the behavior rather than merely performing it for a reward — making it more self-sustaining."<br>• "The meta-analysis in Source 2 demonstrates that reinforcement schedules are among the most reliable tools for producing specific behaviors — consistent with Skinner\'s finding that variable ratio schedules produce the highest and most persistent response rates. However, this strength is also a limitation: because the behavior is tied to reinforcement contingencies, it may not transfer to new situations without reprogramming. This contrasts with the more flexible and generalizable behaviors produced by observational learning in Source 1, where children applied sharing in novel, unprompted ways."',helpOptions:[{text:"This further supports the claim because behavioral treatments are safer with fewer side effects, and patients are more likely to continue treatments that do not make them feel worse.",correct:!1,explain:"Incorrect — side effects are a practical concern, not a psychological concept explaining the mechanism. Apply extinction or classical conditioning to explain WHY exposure therapy produces more durable reduction of anxiety."},{text:"This further supports the claim because exposure therapy uses extinction — repeated non-reinforced exposure to feared stimuli eliminates the conditioned fear response over time. Unlike medication, which suppresses anxiety neurochemically without extinguishing the underlying learned association, exposure therapy removes the conditioned fear directly, explaining the lower relapse rate.",correct:!0,explain:"Correct — earns both points: accurate interpretation (exposure therapy extinguishes the conditioned fear response) and application of extinction as a concept distinct from cognitive restructuring used in B(ii)."},{text:"This is essentially the same point as B(ii) because both show that therapy changes something fundamental that medication does not address.",correct:!1,explain:"Incorrect — C(ii) must use a different concept. Cognitive restructuring (B(ii)) changes thought patterns; extinction (C(ii)) eliminates conditioned fear responses through repeated non-reinforced exposure. These are distinct mechanisms."},{text:"This supports the claim because Source 2 had a rigorous design and used objective symptom measures, making the exposure therapy findings particularly trustworthy.",correct:!1,explain:"Incorrect — methodological rigor speaks to validity of the finding, not to the psychological mechanism. Apply extinction or classical conditioning principles."}]}]},u4:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about whether a person's behavior in social situations is more strongly determined by their personality traits or by the situation they are in.",sources:[{label:"Source 1",title:"Study on Personality Consistency Across Situations",body:"A series of studies by researchers at the University of California tracked 147 adults across 7 different social situations (job interview, family dinner, sports game, work meeting, first date, religious service, party) over 6 weeks. Observers who knew participants rated their behavior in each setting; strangers who observed only one setting also rated participants. Results showed that self-reported Big Five personality scores — especially conscientiousness and agreeableness — significantly predicted observer-rated behavior across all seven settings (r = 0.42 to 0.56). Participants who scored high on conscientiousness were rated as more organized, responsible, and prepared across all contexts, even by strangers who had no prior knowledge of them. The researchers concluded that personality traits exert a meaningful cross-situational influence on behavior."},{label:"Source 2",title:"Experimental Study on Situational Demand and Helping Behavior",body:"In a well-known field experiment, researchers at a theological seminary asked 40 students to give a talk on the topic of the Good Samaritan — a biblical parable about stopping to help someone in need. Half the students were told they were running late and needed to hurry to reach the lecture hall; the other half were told they had plenty of time. On their way across campus, each student encountered a confederate slumped in a doorway, apparently in distress. Among students who were running late, only 10% stopped to help. Among students who had time, 63% stopped. Notably, whether a student had just been thinking about the Good Samaritan parable — a prosocial concept — had no significant effect on helping rates. The researchers concluded that situational urgency powerfully overrode both stable values and momentarily primed prosocial thoughts."},{label:"Source 3",title:"Survey Study on Personality and Moral Decision-Making",body:"A large online survey of 2,400 adults across six countries measured Big Five personality traits using a validated 60-item inventory and presented participants with a series of 10 ethical dilemma scenarios (e.g., whether to lie to protect a friend, whether to report a colleague's minor dishonesty). Agreeableness scores significantly predicted more cooperative and protective moral choices (β = 0.38, p < .001), while conscientiousness predicted more rule-following and reportive choices (β = 0.29, p < .001). However, the researchers also found that across all personality profiles, participants' moral choices shifted dramatically when the scenario specified that \"most people in your group\" had made a particular choice — indicating that perceived social norms significantly moderated the relationship between personality and behavior."}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about whether personality traits or situational factors more strongly determine behavior in social situations.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim.<br><br><em>Examples that earn 1 point:</em><br>• "Situational factors more strongly determine behavior in social situations, as demonstrated by the power of urgency, authority, and social norms to override individual personality."<br>• "Both personality and situation shape behavior, but their relative influence depends on the strength of the situational forces involved."<br>• "Personality traits provide a meaningful baseline for behavior, but strong situational pressures can substantially override these dispositions in the moment."',helpOptions:[{text:"No single strategy is best because learning is individual and what works for one student may not work for another.",correct:!1,explain:"Incorrect — the sources present direct comparisons showing meaningful differences between strategies. Part A requires a specific, defensible claim, not a statement that avoids comparison."},{text:"Retrieval practice (practice testing) is the most effective strategy for long-term memory retention because actively recalling information strengthens the memory trace far more than passive re-reading.",correct:!0,explain:"Correct — specific, defensible claim: names a strategy, states its advantage, and gives a reason. Source 1 provides direct evidence with a one-week follow-up comparison."},{text:"Spaced practice is the most effective strategy because distributing study sessions over time produces 40% higher retention than cramming.",correct:!1,explain:"This is also a defensible claim that earns Part A — Source 2 supports it directly. Either retrieval practice or spaced practice is valid. Commit to one and defend it consistently."},{text:"All three strategies work equally well, so students should combine them all for maximum benefit.",correct:!1,explain:"Incorrect — combining strategies is a different recommendation from identifying which one is most effective. Part A requires a comparative position based on the evidence provided."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 2, students who were running late helped a person in distress only 10% of the time, compared to 63% of students who had plenty of time — and whether students had just been thinking about the Good Samaritan parable had no significant effect on helping."<br>• "Source 1 found that Big Five personality scores predicted observer-rated behavior across seven different social situations, with correlations ranging from r = 0.42 to 0.56, even when rated by strangers who knew nothing about the participants."',helpOptions:[{text:"According to Source 1, students who used practice testing scored significantly higher (78%) than those who re-read (61%) or concept-mapped (67%) on a one-week retention test.",correct:!0,explain:"Correct — cites Source 1 with specific statistics (78%, 61%, 67%) and the follow-up time frame (one week). Directly supports a claim about retrieval practice."},{text:"The testing effect is a well-documented finding showing that retrieval practice consistently outperforms passive study methods for long-term retention.",correct:!1,explain:"Incorrect — this is background knowledge without citing a specific provided source. B(i) must name Source 1, 2, or 3 with a concrete finding."},{text:"Source 2 found that spaced practice produced 40% higher retention than massed practice at one month, across 47 studies.",correct:!1,explain:"Accurate evidence — but it supports spaced practice, not retrieval practice. If your Part A claim was retrieval practice, use Source 1 here."},{text:"Source 3 showed elaborative interrogation students scored 74% versus 58% for re-readers after 3 days.",correct:!1,explain:"Accurate evidence from Source 3 — but check whether it matches your Part A claim, and save a different source for C(i)."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a correct psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "This strongly supports the situational view because it illustrates the power of the situation to override stable internal dispositions. Even seminary students who had literally just been thinking about the moral imperative to help were largely unhelpful when under time pressure. This is consistent with the fundamental attribution error in reverse — rather than assuming these students were morally indifferent (a dispositional explanation), the evidence shows the situation was decisive. Milgram\'s obedience research similarly demonstrated that ordinary, presumably decent people will engage in harmful behavior when situational forces (authority, gradual escalation) are sufficiently powerful."<br>• "Source 1 shows that personality traits provide meaningful cross-situational consistency — even strangers who observed one setting could detect personality through behavior (r = 0.42–0.56). This is consistent with trait theory: the Big Five describes stable patterns of thinking, feeling, and behaving that express themselves across contexts. Conscientiousness, for example, predicts organized, responsible behavior whether someone is at a job interview or a family dinner."',helpOptions:[{text:"This supports the claim because testing yourself requires more mental effort than re-reading, and greater effort produces stronger memories.",correct:!1,explain:"Incorrect — effort is not a named psychological concept. Apply the testing effect or levels of processing framework to explain the specific mechanism."},{text:"This supports the claim because retrieval practice engages the testing effect — each retrieval attempt strengthens the memory trace beyond what re-reading produces. This aligns with levels of processing theory: retrieval requires deep semantic processing, whereas re-reading is shallow, producing weaker encoding.",correct:!0,explain:"Correct — earns both points: accurate interpretation (retrieval strengthens memory trace) and application of the testing effect and levels of processing as explanatory concepts."},{text:"This supports the claim because Source 1 had 120 participants and statistically significant results, making the findings reliable.",correct:!1,explain:"Incorrect — reliability does not explain the mechanism. Apply a named memory concept to explain WHY retrieval practice improves long-term retention."},{text:"This supports the claim because students who tested themselves probably studied more frequently, which naturally leads to better retention.",correct:!1,explain:"Incorrect — study frequency was not measured. The mechanism is the retrieval act itself, not frequency. Apply the testing effect as the psychological explanation."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Different specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "Source 3 found that across all personality profiles, participants\' moral choices shifted dramatically when the scenario specified that \'most people in your group\' had made a particular choice — demonstrating that perceived social norms moderated the personality–behavior relationship."<br>• "According to Source 1, conscientiousness and agreeableness predicted behavior across all seven social contexts, even when rated by strangers, suggesting these traits exert real cross-situational influence."',helpOptions:[{text:"A meta-analysis (Source 2) found that spaced practice produced on average 40% higher retention at a one-month follow-up than massed practice, and this advantage was consistent across 47 studies, multiple age groups, and subject areas.",correct:!0,explain:"Correct — cites a different source with highly specific evidence (40%, 47 studies, one-month, consistency across subjects and ages). Strongly supports long-term retention."},{text:"Source 1 also showed that concept mapping (67%) outperformed re-reading (61%), further supporting active over passive strategies.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot cite it again."},{text:"Ebbinghaus demonstrated that spaced repetition dramatically slows forgetting, which has been replicated thousands of times.",correct:!1,explain:"Incorrect — background knowledge about Ebbinghaus is not evidence from a provided source. C(i) must cite Source 1, 2, or 3 specifically."},{text:"According to Source 3, students who used elaborative interrogation scored 74% versus 58% for re-readers on a test 3 days later.",correct:!1,explain:"Accurate — but only use Source 3 here if you did NOT cite it in B(i). C(i) must cite a different source."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 3\'s finding that perceived social norms shifted moral choices across all personality types illustrates the concept of normative social influence — people conform to group norms to gain approval and avoid rejection, even when their own personality would predict a different choice. The fact that this norm effect operated across all personality profiles — even those scoring high on conscientiousness, who tend toward rule-following — suggests that situational social pressure can override personality-driven dispositions. This is consistent with Asch\'s conformity research, where even individuals who knew the correct answer went along with an obvious group error to avoid social rejection."<br>• "Source 3 demonstrates that even when personality traits are strong predictors of behavior in the absence of social influence, the addition of perceived group norms dramatically changes behavioral outcomes. This supports Bandura\'s concept of reciprocal determinism — behavior is not determined by personality (personal factor) alone, but by the ongoing interaction between personal factors, behavior, and environment. When the environment signals a strong social norm, it becomes the dominant input in the behavioral equation."',helpOptions:[{text:"This further confirms the claim because studying a little every day is more efficient than cramming, and efficient students always retain more.",correct:!1,explain:"Incorrect — efficiency is not a psychological concept explaining the memory mechanism. Apply consolidation theory or the spacing effect to explain WHY distributed practice produces better retention."},{text:"This further supports the claim because spaced sessions allow sleep-based memory consolidation between them — the hippocampus replays and strengthens memory traces during sleep. This consolidation mechanism is distinct from the retrieval-based testing effect in B(ii): it explains durability through biological rest rather than active recall.",correct:!0,explain:"Correct — earns both points: accurate interpretation (sleep consolidation between sessions strengthens traces) and application of consolidation theory as a concept distinct from the testing effect."},{text:"This is the same point as B(ii) — both show that more active or effortful studying leads to better long-term memory.",correct:!1,explain:"Incorrect — C(ii) needs a different concept. Retrieval practice (testing effect) and spaced practice (consolidation during rest) operate through distinct mechanisms. Make the distinction explicit."},{text:"This supports the claim because Source 2 was a meta-analysis of 47 studies, making it the most reliable and trustworthy source in the set.",correct:!1,explain:"Incorrect — source reliability does not explain the psychological mechanism. Apply consolidation theory or the spacing effect."}]}]},u5:{title:"FRQ 2 — Evidence-Based Argument Question (EBQ)",points:7,prompt:"Using the three sources provided, develop and justify an argument about which approach to treating psychological disorders — psychological therapy, biological treatment, or community/social support — is most effective in promoting long-term mental health.",sources:[{label:"Source 1",title:"Long-Term Outcomes Study: CBT vs. Antidepressant Medication for Depression",body:"A clinical trial followed 240 adults with moderate-to-severe major depressive disorder for 2 years after a 16-week acute treatment phase. Patients were randomly assigned to receive either cognitive-behavioral therapy (CBT) or antidepressant medication (an SSRI) during the acute phase. At the end of 16 weeks, response rates were similar (CBT: 58%; medication: 61%). However, at 2-year follow-up, patients who had received CBT showed significantly lower relapse rates (26%) than patients who had received medication alone (46%). Patients in the medication group who continued taking the antidepressant throughout the 2-year period showed relapse rates (28%) similar to the CBT group. The researchers concluded that CBT's effects persist after treatment ends because patients acquire transferable coping skills, while the protective effects of medication depend on continued use."},{label:"Source 2",title:"Review on Social Support and Mental Health Outcomes",body:"A review of 74 prospective studies (N = 180,000+ participants, follow-up periods of 2–20 years) examined the relationship between social support quality and mental health outcomes. Studies consistently found that individuals with high-quality social support networks showed significantly lower rates of depression, anxiety, and post-traumatic stress symptoms over time compared to individuals with low social support. The association held across age groups, genders, and cultural contexts. Longitudinal analyses suggested that social support acts as a buffer against the mental health effects of stressful life events — individuals with strong social networks showed smaller increases in depression and anxiety following job loss, bereavement, or health crises. The reviewers noted the difficulty of separating whether social support causes better mental health or whether better mental health enables stronger social connections (bidirectionality)."},{label:"Source 3",title:"Study on Combined Treatment (Therapy + Medication) for OCD",body:"A multi-site randomized clinical trial assigned 128 adults with obsessive-compulsive disorder to one of four conditions: (1) exposure and response prevention therapy (ERP) alone, (2) SSRI medication alone, (3) combined ERP + SSRI, or (4) placebo pill control. After 12 weeks, response rates were: ERP alone = 62%; SSRI alone = 42%; combined = 70%; placebo = 8%. At 6-month follow-up after treatment ended, ERP alone maintained at 54% response, SSRI alone dropped to 27%, combined maintained at 64%. Participants who had received ERP (alone or combined) showed significantly lower relapse rates than those who received medication only. The researchers concluded that exposure-based psychological treatment produces more durable OCD remission than medication alone, and that combined treatment offers the strongest acute response while preserving the durability benefits of psychological therapy."}],parts:[{label:"A",points:1,q:"Propose a specific and defensible claim about which approach — psychological therapy, biological treatment, or community/social support — is most effective in promoting long-term mental health.",rubric:'<strong>Earns 1 point:</strong> Proposes a specific, defensible claim.<br><br><em>Examples that earn 1 point:</em><br>• "Psychological therapy produces the most durable long-term mental health outcomes because it equips patients with transferable coping skills that continue working after treatment ends."<br>• "A combined approach of psychological therapy and biological treatment produces the strongest overall outcomes for psychological disorders."<br>• "Social support is the most broadly applicable approach to promoting long-term mental health because its benefits extend across disorders, age groups, and cultures."',helpOptions:[{text:"People engage in unethical behavior because of bad character that was not developed properly during their upbringing.",correct:!1,explain:"Incorrect — developmental history is different from immediate situational or dispositional factors. The sources focus on present-moment contextual forces and stable traits, not childhood development."},{text:"Situational factors better explain why ordinary people engage in unethical behavior, as shown by evidence that most people comply with authority and role demands even when doing so violates their own values.",correct:!0,explain:"Correct — specific, defensible claim: names a factor, states comparative advantage, and previews supporting evidence. This is the most defensible position given Sources 1 and 2."},{text:"Both situational and dispositional factors are equally important and neither can be said to matter more in all cases.",correct:!1,explain:"Incorrect — 'equally important' avoids a comparative position. Source 3 found situational pressure explained twice as much variance. Part A requires committing to a specific directional stance."},{text:"Unethical behavior is best explained by moral disengagement — a stable cognitive tendency to justify harmful actions — since it predicts behavior across many contexts.",correct:!1,explain:"This is a defensible dispositional claim. Source 3 provides some support (moral disengagement does predict behavior). However, situational pressure still explained twice as much variance. Any specific arguable position earns Part A."}]},{label:"B(i)",points:1,q:"Support your claim using at least one piece of specific and relevant evidence from one of the sources. You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "According to Source 1, patients who received CBT showed a significantly lower 2-year relapse rate (26%) than patients who received antidepressant medication alone (46%), even after the active treatment period ended."<br>• "Source 3 found that patients who received exposure and response prevention therapy (ERP) alone for OCD maintained a 54% response rate at 6-month follow-up, while those who received medication only dropped to 27% — demonstrating greater durability of psychological treatment."',helpOptions:[{text:"According to Source 1, 65% of ordinary adults administered what they believed were lethal-level electric shocks when ordered by an authority figure, and this compliance dropped dramatically to approximately 20% when situational conditions changed — such as when the authority was physically absent.",correct:!0,explain:"Correct — cites Source 1 with specific statistics (65%, ~20%) and shows that varying the situation changed behavior — the strongest evidence for situational influence."},{text:"Milgram showed that most people will harm others when told to, proving that humans are fundamentally obedient by nature.",correct:!1,explain:"Incorrect — background knowledge rather than evidence from a provided source. 'Fundamentally obedient' is also contradicted by the finding that obedience dropped to ~20% when conditions changed."},{text:"Source 2 found that healthy college students assigned to the guard role became psychologically cruel within 36 hours despite prior psychological screening.",correct:!1,explain:"Strong evidence — but if you cited Source 1 in Part A, use Source 1 consistently in B(i). Save Source 2 for C(i)."},{text:"Source 3 showed that moral disengagement was a significant predictor of unethical behavior, with higher scores correlating with more frequent boundary-pushing at work.",correct:!1,explain:"This supports dispositional factors, which undermines a situational claim in B(i). Use Source 3 in C(i) instead to show that even the strongest dispositional predictor explained less variance than situational pressure."}]},{label:"B(ii)",points:2,q:"Explain how the evidence from Part B(i) supports your claim using a psychological perspective, theory, concept, or research finding from AP Psychology.",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a correct psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 1\'s lower relapse rate for CBT (26%) compared to medication alone (46%) supports the claim that psychological therapy produces more durable outcomes because it teaches patients to identify and restructure the negative cognitive triad — the maladaptive patterns of thinking about the self, world, and future that maintain depression. Unlike medication, which manages symptoms biochemically, CBT gives patients active tools to apply in future situations. When the medication ends, the biochemical support ends; when CBT ends, the learned skills remain."<br>• "This supports the claim that psychological therapy is most effective for long-term outcomes because exposure and response prevention (ERP) works through the principles of counterconditioning — by exposing patients to obsession triggers without allowing compulsive rituals, the anxiety response is gradually extinguished. This is a fundamentally learned change: the patient\'s brain literally re-learns that the feared stimulus is not dangerous. This re-learned response persists because it has replaced the original conditioned fear, unlike medication that simply suppresses anxiety without addressing the underlying conditioning."',helpOptions:[{text:"This supports the claim because people do what authority figures tell them to do because they feel they have no choice and do not want to get in trouble.",correct:!1,explain:"Incorrect — 'do not want to get in trouble' is too informal and not a named psychological concept. Apply obedience to authority and the fundamental attribution error to explain the mechanism."},{text:"This supports the situational claim because it demonstrates obedience to authority — the legitimate authority figure created situational pressure strong enough to override participants' moral dispositions. The fundamental attribution error explains why observers wrongly assume participants must have been cruel by nature, when the situation was the primary driver.",correct:!0,explain:"Correct — earns both points: accurate interpretation (authority overrode moral dispositions) and application of obedience to authority plus the fundamental attribution error."},{text:"This supports the claim because the Milgram experiment was conducted under high-pressure conditions, and stress impairs ethical decision-making.",correct:!1,explain:"Incorrect — stress and pressure were not the key variables. The mechanism is the presence of a legitimate authority figure. Apply the named concept of obedience to authority."},{text:"This proves that situations are always more powerful than individual character, which means people cannot be held personally responsible for behavior that occurs under authority.",correct:!1,explain:"Incorrect — this is a normative/philosophical argument, not a psychological concept. Apply obedience to authority as the named mechanism, not a claim about moral responsibility."}]},{label:"C(i)",points:1,q:"Support your claim using an additional piece of specific and relevant evidence from a DIFFERENT source than the one used in Part B(i). You must cite the source.",rubric:'<strong>Earns 1 point:</strong> Different specific, accurate, correctly cited evidence.<br><br><em>Examples that earn 1 point:</em><br>• "Source 2\'s review of over 74 prospective studies found that individuals with high-quality social support networks showed significantly lower rates of depression, anxiety, and post-traumatic stress over follow-up periods of up to 20 years, across all age groups, genders, and cultural contexts."<br>• "According to Source 3, the combined ERP + SSRI condition produced the highest acute response rate (70%) and maintained a 64% response at 6-month follow-up, suggesting that combining treatments may offer both immediate strength and durable protection."',helpOptions:[{text:"Source 3 found that in a survey of 312 financial services employees, perceived organizational pressure to meet performance targets explained twice as much variance in unethical behavior as individual moral disengagement scores.",correct:!0,explain:"Correct — cites a different source with specific evidence (312 employees, organizational pressure = twice the variance of moral disengagement). Powerfully supports situational over dispositional factors in a real-world context."},{text:"Source 1 also showed that situational variations — like whether the authority was present — produced dramatic changes in compliance.",correct:!1,explain:"Incorrect — C(i) must cite a DIFFERENT source than B(i). If you used Source 1 in B(i), you cannot use it again."},{text:"The Stanford Prison Experiment by Zimbardo is one of the most dramatic demonstrations that social roles transform behavior.",correct:!1,explain:"Incorrect — cite Source 2 by name with specific details from the passage, not from general background knowledge."},{text:"According to Source 2, randomly assigned college students playing the guard role became psychologically cruel within 36 hours, and the study was terminated after 6 days rather than the planned 14.",correct:!1,explain:"Strong evidence from Source 2 — but only use it here if you did NOT cite Source 2 in B(i). C(i) must cite a different source."}]},{label:"C(ii)",points:2,q:"Explain how the evidence from Part C(i) supports your claim using a DIFFERENT psychological perspective, theory, concept, or research finding than the one used in Part B(ii).",rubric:'<strong>Earns 2 points:</strong> Correctly interprets evidence AND applies a different appropriate psychological concept.<br><br><em>Examples that earn 2 points:</em><br>• "Source 2\'s finding that high social support was associated with lower mental health symptom rates across 20-year follow-ups — and that social networks buffered the impact of stressful life events — supports the claim that community-based support may be the most broadly accessible long-term mental health resource. This is consistent with the biopsychosocial model: mental health is not determined solely by biological or psychological factors but is also shaped by social context. Social support addresses the sociocultural dimension of this model by providing emotional validation, practical resources, and a sense of belonging — all of which serve as protective factors against depression and anxiety even in the absence of formal treatment."<br>• "Source 2 demonstrates that social support acts as a stress buffer — reducing the mental health impact of job loss, bereavement, and health crises. This connects to the concept of resilience in positive psychology: social support is one of the most consistently identified protective factors that allows individuals to recover from adversity without developing clinical-level disorders. Unlike therapy or medication, social support is continuously available and self-reinforcing — strong relationships encourage individuals to seek help and maintain healthy behaviors, making it a uniquely powerful long-term protective force."',helpOptions:[{text:"This further supports the claim because organizations have a lot of power over employees, and when employers expect unethical behavior, most employees simply go along with it.",correct:!1,explain:"Incorrect — too general, no named concept. Apply normative social influence to explain why perceived group expectations override individual ethical standards."},{text:"This further supports the situational claim because it demonstrates normative social influence — when an organization signals that meeting targets is expected, employees conform to that norm even at the cost of ethics. This operates through perceived group expectations rather than direct commands, making it a distinct mechanism from obedience to explicit authority in B(ii).",correct:!0,explain:"Correct — earns both points: accurate interpretation (organizational norms create conformity pressure overriding ethics) and application of normative social influence as a concept distinct from obedience to authority."},{text:"This makes the same point as B(ii) because in both cases an authority — an experimenter or an employer — pressured individuals to act unethically.",correct:!1,explain:"Incorrect — C(ii) must use a different concept. Direct obedience to an explicit authority (B(ii)) and conformity to perceived group norms without direct commands (C(ii)) are distinct social psychological mechanisms."},{text:"This supports the claim because Source 3 used regression analysis, which is a more sophisticated statistical technique that produces more accurate results.",correct:!1,explain:"Incorrect — statistical sophistication is not a psychological concept. Apply normative social influence or social role theory to explain how organizational context drives unethical behavior."}]}]}}
